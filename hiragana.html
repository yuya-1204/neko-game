<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ねこといっしょに ひらがな 🐱</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
    background:linear-gradient(#cdeefb,#e8f7d8);
    -webkit-user-select:none;user-select:none;touch-action:manipulation;}
  #app{max-width:520px;height:100%;margin:0 auto;display:flex;flex-direction:column;position:relative;}

  /* ===== ホーム画面 ===== */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:16px;text-align:center;}
  h1{font-size:30px;color:#4a3f35;text-shadow:0 2px 0 #fff;}
  .modeBtn{
    font-family:inherit;width:min(320px,86%);padding:18px 10px;border:none;border-radius:22px;
    font-size:24px;font-weight:bold;color:#fff;cursor:pointer;letter-spacing:3px;
  }
  .modeBtn small{display:block;font-size:13px;font-weight:normal;letter-spacing:1px;margin-top:3px;opacity:.95;}
  #btnNormal{background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 6px 0 #3f8a3f;}
  #btnHard{background:linear-gradient(#ffa36b,#ff7e4f);box-shadow:0 6px 0 #d95f33;}
  #btnVeryHard{background:linear-gradient(#b388eb,#9b6dd6);box-shadow:0 6px 0 #7a4ddb;}
  .modeBtn:active{transform:translateY(4px);box-shadow:none !important;}

  /* ===== ゲーム画面 ===== */
  #gameScreen{justify-content:flex-start;display:none;}
  #topBar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:4px 2px;}
  #backBtn{
    font-family:inherit;font-size:15px;font-weight:bold;color:#4a3f35;border:none;border-radius:999px;
    background:#fff;padding:8px 16px;cursor:pointer;box-shadow:0 3px 0 #cbbfae;
  }
  #backBtn:active{transform:translateY(3px);box-shadow:none;}
  #progress{font-size:17px;font-weight:bold;color:#4a3f35;background:rgba(255,255,255,.7);
    border-radius:999px;padding:6px 14px;}
  #muteBtn{font-size:18px;background:#fff;border:none;border-radius:50%;
    width:40px;height:40px;cursor:pointer;box-shadow:0 3px 0 #cbbfae;}
  #muteBtn:active{transform:translateY(3px);box-shadow:none;}

  #pictureBox{margin-top:2px;display:none;flex-direction:column;align-items:center;gap:2px;}
  #pictureEmoji{font-size:84px;line-height:1.1;cursor:pointer;filter:drop-shadow(0 4px 4px rgba(0,0,0,.15));}
  #pictureHint{font-size:13px;color:#4a3f35;background:rgba(255,255,255,.7);border-radius:999px;padding:3px 12px;}

  #slots{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
  .slot{
    width:62px;height:62px;border-radius:16px;border:3px dashed #b9ac98;
    background:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;
    font-size:38px;font-weight:bold;color:#4a3f35;
  }
  .slot.filled{border:3px solid #5cab5c;background:#eaf8e4;animation:pop .3s;}
  @keyframes pop{0%{transform:scale(.3);}70%{transform:scale(1.15);}100%{transform:scale(1);}}

  #cards{position:relative;display:flex;gap:12px;justify-content:center;align-content:center;margin-top:auto;margin-bottom:auto;
    flex-wrap:wrap;padding:8px;}
  .card{
    position:relative;width:88px;height:104px;border-radius:20px;border:none;cursor:pointer;
    background:linear-gradient(#fffdf5,#ffeecb);box-shadow:0 6px 0 #d9c9a8, 0 8px 14px rgba(90,70,40,.18);
    font-family:inherit;font-size:52px;font-weight:bold;color:#4a3f35;
  }
  .card:active{transform:translateY(4px);box-shadow:0 2px 0 #d9c9a8;}
  .card.used{opacity:0;pointer-events:none;transform:scale(.3) translateY(-30px);transition:all .35s;}
  .card.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}
    40%{transform:translateX(9px);}60%{transform:translateX(-7px);}80%{transform:translateX(7px);}}
  .maru{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:86px;color:#2eb84d;font-weight:bold;pointer-events:none;
    animation:maruPop .55s forwards;text-shadow:0 0 8px #fff;
  }
  @keyframes maruPop{0%{opacity:0;transform:scale(.3);}30%{opacity:1;transform:scale(1.2);}
    70%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.1);}}

  #bigMaru{
    position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-size:200px;color:#2eb84d;pointer-events:none;text-shadow:0 0 20px #fff;z-index:8;
  }
  #bigMaru.show{display:flex;animation:maruPop .8s forwards;}

  #catsCanvas{display:block;margin:0 auto;}

  /* ===== クリア画面 ===== */
  #clearScreen{display:none;background:rgba(80,60,90,.45);backdrop-filter:blur(3px);z-index:10;}
  .card2{background:#fff8ec;color:#4a3f35;border-radius:24px;padding:26px 30px;
    box-shadow:0 10px 30px rgba(60,40,20,.35);border:4px solid #fff;}
  .card2 h2{font-size:28px;margin-bottom:6px;}
  .card2 .big{font-size:46px;}
  .go{
    font-family:inherit;font-size:19px;font-weight:bold;color:#fff;border:none;border-radius:999px;
    background:linear-gradient(#ffa36b,#ff7e4f);padding:13px 38px;cursor:pointer;
    box-shadow:0 6px 0 #d95f33;letter-spacing:2px;
  }
  .go:active{transform:translateY(4px);box-shadow:0 2px 0 #d95f33;}
</style>
</head>
<body>
<div id="app">

  <div id="homeScreen" class="screen">
    <h1>🐱 ねこといっしょに<br>ひらがな 🐾</h1>
    <canvas id="homeCats" width="300" height="110"></canvas>
    <button class="modeBtn" id="btnNormal">ふつう<small>「あ」から じゅんばんに</small></button>
    <button class="modeBtn" id="btnHard">むずかしい<small>ぎょうの じゅんばんが バラバラ</small></button>
    <button class="modeBtn" id="btnVeryHard">とてもむずかしい<small>えをみて なまえを つくろう</small></button>
  </div>

  <div id="gameScreen" class="screen">
    <div id="topBar">
      <button id="backBtn">◀ もどる</button>
      <div id="progress"></div>
      <button id="muteBtn">🔊</button>
    </div>
    <div id="pictureBox">
      <div id="pictureEmoji"></div>
      <div id="pictureHint">🔊 えを タップすると なまえが きけるよ</div>
    </div>
    <div id="slots"></div>
    <div id="cards"></div>
    <canvas id="catsCanvas" width="300" height="110"></canvas>
    <div id="bigMaru">⭕</div>
  </div>

  <div id="clearScreen" class="screen">
    <div class="card2">
      <h2 id="clearTitle">ぜんぶ できた!</h2>
      <div class="big">🐱🎉🐱🎉🐱</div>
      <p id="clearText" style="font-size:15px;"></p>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="go" id="againBtn">もういちど</button>
      <button class="go" id="homeBtn" style="background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 6px 0 #3f8a3f;">ホームへ</button>
    </div>
  </div>

</div>

<script>
"use strict";
/* ================= データ ================= */
const ROWS = [
  ["あ","い","う","え","お"],
  ["か","き","く","け","こ"],
  ["さ","し","す","せ","そ"],
  ["た","ち","つ","て","と"],
  ["な","に","ぬ","ね","の"],
  ["は","ひ","ふ","へ","ほ"],
  ["ま","み","む","め","も"],
  ["や","ゆ","よ"],
  ["ら","り","る","れ","ろ"],
  ["わ","を","ん"],
];
const ROW_NAMES = ["あぎょう","かぎょう","さぎょう","たぎょう","なぎょう",
                   "はぎょう","まぎょう","やぎょう","らぎょう","わぎょう"];

/* とてもむずかしい用:えとことば(3〜6もじ) */
const WORDS = [
  {w:"りんご",   e:"🍎"}, {w:"ばなな",   e:"🍌"}, {w:"すいか",   e:"🍉"},
  {w:"いちご",   e:"🍓"}, {w:"ぶどう",   e:"🍇"}, {w:"みかん",   e:"🍊"},
  {w:"うさぎ",   e:"🐰"}, {w:"ねずみ",   e:"🐭"}, {w:"きりん",   e:"🦒"},
  {w:"ぱんだ",   e:"🐼"}, {w:"とけい",   e:"⏰"}, {w:"めがね",   e:"👓"},
  {w:"ぼうし",   e:"🎩"}, {w:"くじら",   e:"🐳"}, {w:"こあら",   e:"🐨"},
  {w:"さかな",   e:"🐟"}, {w:"たまご",   e:"🥚"}, {w:"かえる",   e:"🐸"},
  {w:"おばけ",   e:"👻"},
  {w:"らいおん", e:"🦁"}, {w:"ひこうき", e:"✈️"}, {w:"おにぎり", e:"🍙"},
  {w:"たんぽぽ", e:"🌼"}, {w:"ひまわり", e:"🌻"}, {w:"ぺんぎん", e:"🐧"},
  {w:"ふくろう", e:"🦉"}, {w:"にんじん", e:"🥕"}, {w:"かみなり", e:"⚡"},
  {w:"かたつむり", e:"🐌"}, {w:"さくらんぼ", e:"🍒"}, {w:"こいのぼり", e:"🎏"},
  {w:"ゆきだるま", e:"⛄"}, {w:"かぶとむし", e:"🪲"}, {w:"すべりだい", e:"🛝"},
  {w:"てんとうむし", e:"🐞"}, {w:"しんかんせん", e:"🚄"}, {w:"おまわりさん", e:"👮"},
];
const PRAISES = ["すごい!", "やったね!", "じょうずだね!", "できたね!", "かんぺき!", "そのちょうし!"];

/* ================= サウンド ================= */
let audioCtx = null, muted = false;
function ensureAudio(){
  if (!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }
}
function beep(freq, dur, type, vol, delay){
  if (muted || !audioCtx) return;
  try{
    const t0 = audioCtx.currentTime + (delay || 0);
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.08, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur);
  }catch(e){}
}
const sndGood = () => { beep(660,.12,"triangle",.12); beep(990,.2,"triangle",.1,.08); };
const sndOops = () => beep(180,.25,"sine",.08);
const sndClear= () => [523,659,784,1047].forEach((f,i)=>beep(f,.28,"triangle",.12,i*0.13));

function speak(text, rate){
  if (muted) return;
  try{
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = rate || 0.85;
    u.pitch = 1.15;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= ねこたち(canvas) ================= */
function makeCatPainter(canvas){
  const c = canvas.getContext("2d");
  const types = ["kiji","shiro","cha"];
  const PAL = {
    cha:   { body:"#f7a94b", stripe:"#e8923c", belly:"#ffe6c2", ear:"#ffb6c1", striped:true  },
    kiji:  { body:"#9b7a52", stripe:"#5f4a33", belly:"#e3d3b4", ear:"#d8a0a8", striped:true  },
    shiro: { body:"#fdfdfb", stripe:"#e7e2d8", belly:"#f4efe6", ear:"#ffc2cc", striped:false },
  };
  let celebrate = 0;
  function drawCat(x, y, type, phase){
    const pal = PAL[type];
    const amp = celebrate > 0 ? 14 : 4;
    const hop = Math.abs(Math.sin(phase)) * amp;
    c.save();
    c.translate(x, y - hop);
    c.scale(1.5, 1.5);
    c.strokeStyle = pal.striped ? pal.stripe : pal.body;
    c.lineWidth = 6; c.lineCap = "round";
    c.beginPath(); c.moveTo(12,16); c.quadraticCurveTo(26, 12+Math.sin(phase*0.7)*4, 24, -2); c.stroke();
    c.fillStyle = pal.body;
    c.beginPath(); c.ellipse(0,12,15,13,0,0,6.29); c.fill();
    c.fillStyle = pal.belly;
    c.beginPath(); c.ellipse(0,15,8,8,0,0,6.29); c.fill();
    c.fillStyle = pal.body;
    c.beginPath(); c.moveTo(-14,-16); c.lineTo(-7,-28); c.lineTo(-2,-15); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(14,-16); c.lineTo(7,-28); c.lineTo(2,-15); c.closePath(); c.fill();
    c.fillStyle = pal.ear;
    c.beginPath(); c.moveTo(-11,-17); c.lineTo(-7.5,-24); c.lineTo(-4.5,-16); c.closePath(); c.fill();
    c.beginPath(); c.moveTo(11,-17); c.lineTo(7.5,-24); c.lineTo(4.5,-16); c.closePath(); c.fill();
    c.fillStyle = pal.body;
    c.beginPath(); c.ellipse(0,-8,15,13.5,0,0,6.29); c.fill();
    if (pal.striped){
      c.strokeStyle = pal.stripe; c.lineWidth = 2.4;
      c.beginPath();
      c.moveTo(-3,-20); c.lineTo(-3,-16); c.moveTo(0,-21); c.lineTo(0,-16.5); c.moveTo(3,-20); c.lineTo(3,-16);
      c.stroke();
    }
    c.fillStyle = "#3a2c20";
    c.beginPath(); c.arc(-5.5,-9,2.1,0,6.29); c.fill();
    c.beginPath(); c.arc(5.5,-9,2.1,0,6.29); c.fill();
    c.fillStyle = "#fff";
    c.beginPath(); c.arc(-4.9,-9.7,.8,0,6.29); c.fill();
    c.beginPath(); c.arc(6.1,-9.7,.8,0,6.29); c.fill();
    c.fillStyle = "rgba(255,150,160,.6)";
    c.beginPath(); c.arc(-9,-4.5,2.4,0,6.29); c.fill();
    c.beginPath(); c.arc(9,-4.5,2.4,0,6.29); c.fill();
    if (type === "shiro"){
      c.fillStyle = "#ff9eb0";
      c.beginPath(); c.arc(0,-6.5,1.5,0,6.29); c.fill();
    }
    c.strokeStyle = "#3a2c20"; c.lineWidth = 1.4;
    c.beginPath(); c.arc(-2,-4.2,2,.2,3); c.stroke();
    c.beginPath(); c.arc(2,-4.2,2,.2,3); c.stroke();
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(-13,-7); c.lineTo(-19,-8.5); c.moveTo(-13,-4.5); c.lineTo(-19,-4);
    c.moveTo(13,-7); c.lineTo(19,-8.5); c.moveTo(13,-4.5); c.lineTo(19,-4);
    c.stroke();
    c.restore();
  }
  function frame(t){
    c.clearRect(0,0,canvas.width,canvas.height);
    if (celebrate > 0){
      celebrate -= 1/60;
      c.font = "20px sans-serif";
      c.textAlign = "center";
      for (let i = 0; i < 5; i++){
        const hx = 30 + i*60 + Math.sin(t/300 + i)*8;
        const hy = 30 + Math.sin(t/200 + i*2)*10;
        c.fillText(["💖","⭐","🎵","💖","⭐"][i], hx, hy);
      }
    }
    drawCat(60,  88, "kiji",  t/200);
    drawCat(150, 88, "shiro", t/200 + 2);
    drawCat(240, 88, "cha",   t/200 + 4);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  return { cheer: (sec) => { celebrate = sec; } };
}
const homeCats = makeCatPainter(document.getElementById("homeCats"));
const gameCats = makeCatPainter(document.getElementById("catsCanvas"));

/* ================= ゲーム本体 ================= */
let mode = "normal";        // normal / hard / veryhard
let queue = [];             // ラウンドのならび
let roundIdx = 0;
let target = [];            // ただしいじゅんばんの文字
let pos = 0;                // いまなんもじめか
let busy = false;

const $ = id => document.getElementById(id);
function show(screenId){
  ["homeScreen","gameScreen","clearScreen"].forEach(s => $(s).style.display = (s === screenId) ? "flex" : "none");
}
function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startMode(m){
  ensureAudio();
  mode = m;
  if (m === "normal"){
    queue = ROWS.map((r,i)=>({chars:r, name:ROW_NAMES[i]}));
  } else if (m === "hard"){
    queue = shuffle(ROWS.map((r,i)=>({chars:r, name:ROW_NAMES[i]})));
  } else {
    // ことばを10こ。みじかいことばから ちょうせん
    queue = shuffle(WORDS).slice(0,10)
      .sort((a,b)=>a.w.length-b.w.length)
      .map(x=>({chars:x.w.split(""), name:x.w, emoji:x.e}));
  }
  roundIdx = 0;
  show("gameScreen");
  nextRound();
}

function nextRound(){
  busy = false;
  const r = queue[roundIdx];
  target = r.chars;
  pos = 0;
  $("progress").textContent = "🐾 " + (roundIdx+1) + " / " + queue.length;

  // え(とてもむずかしいのみ)
  if (mode === "veryhard"){
    $("pictureBox").style.display = "flex";
    $("pictureEmoji").textContent = r.emoji;
  } else {
    $("pictureBox").style.display = "none";
  }

  // うえのスロット
  const slots = $("slots");
  slots.innerHTML = "";
  target.forEach(() => {
    const d = document.createElement("div");
    d.className = "slot";
    slots.appendChild(d);
  });

  // したのカード(ただしいじゅんばんと同じにならないようシャッフル)
  let order = shuffle(target);
  let guard = 0;
  while (order.join("") === target.join("") && guard++ < 20) order = shuffle(target);
  const cards = $("cards");
  cards.innerHTML = "";
  order.forEach(ch => {
    const b = document.createElement("button");
    b.className = "card";
    b.textContent = ch;
    b.addEventListener("pointerdown", () => tapCard(b, ch));
    cards.appendChild(b);
  });

  // よみあげ
  if (mode === "veryhard"){
    setTimeout(()=>speak(r.name), 350);
  } else {
    setTimeout(()=>speak(r.name + "を じゅんばんに ならべてね"), 350);
  }
}

function tapCard(btn, ch){
  if (busy || btn.classList.contains("used")) return;
  ensureAudio();
  if (ch === target[pos]){
    // せいかい!
    btn.classList.add("used");
    const slots = $("slots").children;
    slots[pos].textContent = ch;
    slots[pos].classList.add("filled");
    // みどりの丸
    const m = document.createElement("div");
    m.className = "maru"; m.textContent = "⭕";
    btn.parentElement.appendChild(m);
    m.style.position = "absolute";
    m.style.left = (btn.offsetLeft) + "px";
    m.style.top = (btn.offsetTop) + "px";
    m.style.width = btn.offsetWidth + "px";
    m.style.height = btn.offsetHeight + "px";
    setTimeout(()=>m.remove(), 600);
    sndGood();
    speak(ch, 0.8);
    pos++;
    if (pos >= target.length) roundComplete();
  } else {
    // ちがうよ(やさしく)
    btn.classList.remove("shake");
    void btn.offsetWidth;
    btn.classList.add("shake");
    sndOops();
  }
}

function roundComplete(){
  busy = true;
  gameCats.cheer(2);
  $("bigMaru").classList.remove("show");
  void $("bigMaru").offsetWidth;
  $("bigMaru").classList.add("show");
  sndClear();
  const praise = PRAISES[Math.floor(Math.random()*PRAISES.length)];
  if (mode === "veryhard"){
    setTimeout(()=>speak(queue[roundIdx].name + "! " + praise), 250);
  } else {
    setTimeout(()=>speak(praise), 400);
  }
  setTimeout(() => {
    $("bigMaru").classList.remove("show");
    roundIdx++;
    if (roundIdx >= queue.length){
      allClear();
    } else {
      nextRound();
    }
  }, 1700);
}

function allClear(){
  show("clearScreen");
  homeCats.cheer(5); gameCats.cheer(5);
  sndClear();
  const names = {normal:"ふつう", hard:"むずかしい", veryhard:"とてもむずかしい"};
  $("clearTitle").textContent = "ぜんぶ できた!";
  $("clearText").textContent = "「" + names[mode] + "」を ぜんぶ クリアしたよ! すごい!";
  setTimeout(()=>speak("ぜんぶできたね! すごい! はなまる!"), 500);
}

/* ================= ボタン ================= */
$("btnNormal").addEventListener("click", () => startMode("normal"));
$("btnHard").addEventListener("click", () => startMode("hard"));
$("btnVeryHard").addEventListener("click", () => startMode("veryhard"));
$("backBtn").addEventListener("click", () => { try{speechSynthesis.cancel();}catch(e){} show("homeScreen"); });
$("againBtn").addEventListener("click", () => startMode(mode));
$("homeBtn").addEventListener("click", () => show("homeScreen"));
$("muteBtn").addEventListener("click", () => {
  muted = !muted;
  $("muteBtn").textContent = muted ? "🔇" : "🔊";
  if (muted){ try{speechSynthesis.cancel();}catch(e){} }
});

/* えをタップでなまえをよみあげ */
$("pictureEmoji").addEventListener("pointerdown", () => {
  if (mode === "veryhard") speak(queue[roundIdx].name);
});

show("homeScreen");
</script>
</body>
</html>
