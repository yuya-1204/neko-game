<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ネコの おさかな だいさくせん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FCF4E2;
    --paper2:#F6E9CB;
    --floor1:#FDF1D8;
    --floor2:#F7E3BD;
    --wall:#C49A6C;
    --wall-top:#D9B488;
    --wall-line:#A87E50;
    --ink:#5A4630;
    --ink-soft:#9A8159;
    --cat:#E8923A;
    --cat-deep:#CE7826;
    --home:#79B59B;
    --home-deep:#5C9A80;
    --danger:#F2867B;
    --danger-soft:#FBD3CD;
    --cream:#FFFDF6;
    --shadow:rgba(120,90,50,.28);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hiragino Maru Gothic ProN','ヒラギノ丸ゴ ProN','Yu Gothic Medium','YuGothic','Meiryo','M PLUS Rounded 1c',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 18% 12%, #FFF8E8 0%, transparent 45%),
      radial-gradient(circle at 82% 88%, #FBEAC8 0%, transparent 50%),
      var(--paper);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:10px 10px 18px;
    overscroll-behavior:none;
    touch-action:manipulation;
  }
  .title{
    font-family:'Mochiy Pop One', 'Hiragino Maru Gothic ProN', sans-serif;
    font-size:clamp(19px, 6.2vw, 29px);
    color:var(--cat-deep);
    text-shadow:2px 2px 0 #fff, 4px 4px 0 var(--paper2);
    margin:4px 0 2px; letter-spacing:.02em; text-align:center; line-height:1.2;
  }
  .title .fishy{display:inline-block; transform:translateY(2px);}
  .topbar{
    display:flex; gap:8px; align-items:center; justify-content:center;
    flex-wrap:wrap; margin:2px 0 6px;
  }
  .chip{
    background:var(--cream); border:2px solid var(--paper2);
    border-radius:999px; padding:5px 12px; font-size:14px; font-weight:700;
    box-shadow:0 2px 0 var(--paper2);
    display:flex; align-items:center; gap:5px;
  }
  .chip b{color:var(--cat-deep);}
  .iconbtn{
    background:var(--cream); border:2px solid var(--paper2);
    border-radius:14px; padding:6px 10px; font-size:15px; font-weight:700;
    color:var(--ink); cursor:pointer; box-shadow:0 3px 0 var(--paper2);
    transition:transform .05s, box-shadow .05s;
  }
  .iconbtn:active{transform:translateY(2px); box-shadow:0 1px 0 var(--paper2);}

  /* ---- board (サイズは JS が px で設定) ---- */
  #board{
    position:relative;
    width:280px; height:240px;       /* JS が上書き。念のための初期値 */
    --cell:40px;                     /* JS が上書き */
    margin:2px auto 0;
    border-radius:18px;
    background:var(--wall);
    box-shadow:0 10px 0 var(--wall-line), 0 16px 28px var(--shadow);
    overflow:hidden;
    touch-action:none;
    flex:0 0 auto;
  }
  .tiles{
    position:absolute; inset:0;
    display:grid;
    grid-template-columns:repeat(var(--cols),1fr);
    grid-template-rows:repeat(var(--rows),1fr);
    font-size:calc(var(--cell) * 0.62);
    line-height:1;
  }
  .cell{ position:relative; display:flex; align-items:center; justify-content:center; }
  .cell.floor.a{background:var(--floor1);}
  .cell.floor.b{background:var(--floor2);}
  .cell.wall{
    background:var(--wall);
    box-shadow:inset 0 0 0 2px var(--wall-line), inset 0 6px 0 -2px var(--wall-top);
    border-radius:6px;
  }
  .cell .fish{ filter:drop-shadow(0 2px 1px rgba(0,0,0,.12)); animation:bob 2.2s ease-in-out infinite;}
  .cell .home{
    width:78%; height:78%; border-radius:50% 50% 18% 18%;
    background:var(--home); box-shadow:inset 0 -5px 0 var(--home-deep);
    display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--cell) * 0.42);
    position:relative;
  }
  .cell .home .lock{position:absolute; bottom:-2px; right:-2px; font-size:calc(var(--cell) * 0.34);}
  .cell.open .home{animation:pulse 1.1s ease-in-out infinite; box-shadow:inset 0 -5px 0 var(--home-deep), 0 0 0 4px rgba(255,221,120,.7);}
  .cell .watch{
    position:absolute; inset:12%;
    border-radius:10px;
    background:radial-gradient(circle, var(--danger-soft) 0%, transparent 72%);
    box-shadow:inset 0 0 0 2px var(--danger);
    display:flex; align-items:flex-start; justify-content:center;
    animation:blink 1s steps(2,jump-none) infinite;
  }
  .cell .watch::after{content:"👀"; font-size:calc(var(--cell) * 0.30); margin-top:-4%;}

  /* ---- tokens ---- */
  .tokens{position:absolute; inset:0; pointer-events:none;}
  .tok{
    position:absolute; width:calc(100% / var(--cols)); height:calc(100% / var(--rows));
    display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--cell) * 0.72);
    transform:translate(-50%,-50%);
    transition:left .16s ease, top .16s ease;
    will-change:left,top;
  }
  .tok span{display:inline-block; animation:bob 1.8s ease-in-out infinite;}
  .tok.cat span{filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));}
  .tok.mouse span{filter:drop-shadow(0 2px 1px rgba(0,0,0,.14));}
  .tok.flip span{transform:scaleX(-1);}

  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7%)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  @keyframes blink{0%{opacity:.45}100%{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    .tok,.cell .fish,.tok span,.cell.open .home,.cell .watch{animation:none!important; transition:none!important;}
  }

  /* ---- controls ---- */
  .controls{ margin-top:14px; display:flex; gap:18px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .dpad{ display:grid; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,56px); gap:6px; }
  .dbtn{
    border:none; border-radius:16px; background:var(--cat); color:#fff;
    font-size:24px; font-weight:900; cursor:pointer;
    box-shadow:0 4px 0 var(--cat-deep);
    display:flex; align-items:center; justify-content:center;
    transition:transform .05s, box-shadow .05s;
  }
  .dbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--cat-deep);}
  .dbtn.wait{background:var(--home); box-shadow:0 4px 0 var(--home-deep); font-size:14px;}
  .dbtn.up{grid-area:1/2} .dbtn.left{grid-area:2/1}
  .dbtn.center{grid-area:2/2} .dbtn.right{grid-area:2/3} .dbtn.down{grid-area:3/2}
  .sidebtns{display:flex; flex-direction:column; gap:10px;}
  .bigbtn{
    border:2px solid var(--paper2); border-radius:16px; padding:12px 16px; font-size:15px; font-weight:800;
    cursor:pointer; color:var(--ink); background:var(--cream); box-shadow:0 4px 0 var(--paper2);
    transition:transform .05s, box-shadow .05s; min-width:120px;
  }
  .bigbtn:active{transform:translateY(3px); box-shadow:0 1px 0 var(--paper2);}

  .hint{margin-top:12px; font-size:13px; color:var(--ink-soft); text-align:center; max-width:440px; line-height:1.6;}

  /* ---- overlay ---- */
  .overlay{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(90,70,48,.40); z-index:50; padding:20px;
  }
  .overlay.show{display:flex;}
  .card{
    background:var(--cream); border-radius:24px; padding:26px 24px 22px;
    text-align:center; box-shadow:0 14px 0 var(--paper2), 0 22px 40px var(--shadow);
    max-width:340px; width:100%; border:3px solid var(--paper2);
    animation:pop .25s cubic-bezier(.2,1.4,.5,1);
  }
  @keyframes pop{from{transform:scale(.7); opacity:0}to{transform:scale(1); opacity:1}}
  .card .emoji{font-size:54px; line-height:1;}
  .card h2{font-family:'Mochiy Pop One',sans-serif; margin:10px 0 4px; font-size:23px; color:var(--cat-deep); line-height:1.3;}
  .card p{margin:4px 0 16px; color:var(--ink-soft); font-size:15px; line-height:1.6;}
  .card .row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap;}
  .card .go{background:var(--cat); color:#fff; box-shadow:0 4px 0 var(--cat-deep); border:none; font-size:18px; padding:14px 26px;}
  .card .go:active{box-shadow:0 1px 0 var(--cat-deep);}

  .stagepick{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:8px 0 2px;}
  .spbtn{
    width:34px; height:34px; border-radius:50%; border:2px solid var(--paper2);
    background:var(--cream); font-weight:800; color:var(--ink-soft); cursor:pointer;
    box-shadow:0 2px 0 var(--paper2);
  }
  .spbtn.cur{background:var(--cat); color:#fff; border-color:var(--cat-deep);}
</style>
</head>
<body>
  <div class="title"><span class="fishy">🐟</span> ネコの おさかな だいさくせん <span class="fishy">🐱</span></div>

  <div class="topbar">
    <div class="chip">🐟 おさかな <b id="fishCount">0 / 0</b></div>
    <div class="chip">ステージ <b id="stageNum">1</b></div>
    <button class="iconbtn" id="muteBtn" title="おと">🔊</button>
  </div>

  <div class="stagepick" id="stagePick"></div>

  <div id="board" style="--cols:7; --rows:6;">
    <div class="tiles" id="tiles"></div>
    <div class="tokens" id="tokens"></div>
  </div>

  <div class="controls">
    <div class="dpad">
      <button class="dbtn up"     data-dir="up">▲</button>
      <button class="dbtn left"   data-dir="left">◀</button>
      <button class="dbtn center wait" data-dir="wait">まつ⏳</button>
      <button class="dbtn right"  data-dir="right">▶</button>
      <button class="dbtn down"   data-dir="down">▼</button>
    </div>
    <div class="sidebtns">
      <button class="bigbtn" id="undoBtn">↩ ひとつもどる</button>
      <button class="bigbtn" id="resetBtn">🔄 やりなおし</button>
    </div>
  </div>

  <div class="hint">
    ネコをうごかして 🐟 を ぜんぶ あつめよう。<br>
    🐭 ねずみに みつからないように！ あかい 👀 のマスは あぶないよ。<br>
    ぜんぶ あつめたら おうち 🏠 へ かえろう。
  </div>

  <div class="overlay" id="overlay"><div class="card" id="card"></div></div>

<script>
/* ======================= ステージ定義 =======================
   # かべ / . ゆか / C ネコ(スタート) / F おさかな / H おうち(ゴール)
   mice: r,c=スタート位置, dr,dc=さいしょの向き(往復)
============================================================ */
const STAGES = [
  { name:"はじめての さんぽ",
    grid:[ "#######","#C..F.#","#.....#","#.F...#","#...H.#","#######" ],
    mice:[] },
  { name:"ねずみ あらわる",
    grid:[ "########","#C.....#","#......#","#.F..F.#","#......#","#.....H#","########" ],
    mice:[ {r:2,c:4,dr:0,dc:1} ] },
  { name:"たてに うろうろ",
    grid:[ "########","#C....H#","#......#","#F....F#","#......#","#.F....#","########" ],
    mice:[ {r:3,c:3,dr:1,dc:0} ] },
  { name:"ふたりの みはり",
    grid:[ "#########","#C.....H#","#.......#","#F.....F#","#.......#","#...F...#","#########" ],
    mice:[ {r:2,c:2,dr:0,dc:1}, {r:4,c:6,dr:0,dc:-1} ] },
  { name:"ねずみ だいぐんだん",
    grid:[ "#########","#F.....F#","#.......#","#..C.H..#","#.......#","#F.....F#","#...F...#","#########" ],
    mice:[ {r:2,c:1,dr:0,dc:1}, {r:4,c:7,dr:0,dc:-1}, {r:2,c:4,dr:1,dc:0} ] },
];

/* ======================= 状態 ======================= */
let stageIndex=0, rows=0, cols=0;
let walls=new Set(), fishStart=new Set(), collected=new Set();
let homePos={r:0,c:0}, cat={r:0,c:0}, mice=[];
let moves=0, locked=false, undoStack=[], watchSet=new Set();

const boardEl=document.getElementById('board');
const tilesEl=document.getElementById('tiles');
const tokensEl=document.getElementById('tokens');
const overlayEl=document.getElementById('overlay');
const cardEl=document.getElementById('card');

const key=(r,c)=>r+","+c;
const isWall=(r,c)=> r<0||c<0||r>=rows||c>=cols || walls.has(key(r,c));
const remaining=()=> fishStart.size - collected.size;

/* ---- 盤面サイズを px で確実に計算(ここが今回の修正点) ---- */
function sizeBoard(){
  if(!cols||!rows) return;
  const availW = Math.min(window.innerWidth*0.94, 470);
  const availH = Math.max(window.innerHeight*0.52, 200);
  let cell = Math.floor(Math.min(availW/cols, availH/rows));
  cell = Math.max(22, Math.min(cell, 70));
  boardEl.style.width  = (cell*cols)+'px';
  boardEl.style.height = (cell*rows)+'px';
  boardEl.style.setProperty('--cell', cell+'px');
}
window.addEventListener('resize', sizeBoard);
window.addEventListener('orientationchange', ()=>setTimeout(sizeBoard,150));

function loadStage(i){
  stageIndex=i;
  const st=STAGES[i], g=st.grid;
  rows=g.length; cols=g[0].length;
  walls=new Set(); fishStart=new Set(); collected=new Set();
  mice=[]; moves=0; undoStack=[]; locked=false;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const ch=g[r][c];
    if(ch==='#') walls.add(key(r,c));
    else if(ch==='C') cat={r,c};
    else if(ch==='F') fishStart.add(key(r,c));
    else if(ch==='H') homePos={r,c};
  }
  st.mice.forEach(m=>mice.push({r:m.r,c:m.c,dr:m.dr,dc:m.dc}));
  boardEl.style.setProperty('--cols',cols);
  boardEl.style.setProperty('--rows',rows);
  sizeBoard();
  computeWatch();
  buildTokens();
  render();
  hideOverlay();
  renderStagePick();
}

function computeWatch(){
  watchSet=new Set();
  for(const m of mice){
    const wr=m.r+m.dr, wc=m.c+m.dc;
    if(!isWall(wr,wc)) watchSet.add(key(wr,wc));
  }
}

function buildTiles(){
  tilesEl.innerHTML='';
  const open=remaining()===0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const d=document.createElement('div');
    d.className='cell';
    if(walls.has(key(r,c))){ d.classList.add('wall'); }
    else{
      d.classList.add('floor', (r+c)%2?'a':'b');
      if(fishStart.has(key(r,c)) && !collected.has(key(r,c))){
        const f=document.createElement('span'); f.className='fish'; f.textContent='🐟'; d.appendChild(f);
      }
      if(homePos.r===r && homePos.c===c){
        if(open) d.classList.add('open');
        const h=document.createElement('div'); h.className='home'; h.textContent='🏠';
        if(!open){ const l=document.createElement('span'); l.className='lock'; l.textContent='🔒'; h.appendChild(l); }
        d.appendChild(h);
      }
      if(watchSet.has(key(r,c))){ const w=document.createElement('div'); w.className='watch'; d.appendChild(w); }
    }
    tilesEl.appendChild(d);
  }
}

let catTok=null, mouseToks=[];
function buildTokens(){
  tokensEl.innerHTML=''; mouseToks=[];
  catTok=document.createElement('div'); catTok.className='tok cat'; catTok.innerHTML='<span>🐱</span>';
  tokensEl.appendChild(catTok);
  mice.forEach(()=>{ const t=document.createElement('div'); t.className='tok mouse'; t.innerHTML='<span>🐭</span>'; tokensEl.appendChild(t); mouseToks.push(t); });
  placeTokens();
}
function placeTok(t,r,c){ t.style.left=((c+0.5)/cols*100)+'%'; t.style.top=((r+0.5)/rows*100)+'%'; }
function placeTokens(){
  placeTok(catTok,cat.r,cat.c);
  mice.forEach((m,i)=>{ placeTok(mouseToks[i],m.r,m.c); mouseToks[i].classList.toggle('flip', m.dc<0); });
}

function render(){
  buildTiles(); placeTokens();
  document.getElementById('fishCount').textContent = collected.size+" / "+fishStart.size;
  document.getElementById('stageNum').textContent = (stageIndex+1);
}

function renderStagePick(){
  const wrap=document.getElementById('stagePick'); wrap.innerHTML='';
  STAGES.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='spbtn'+(i===stageIndex?' cur':''); b.textContent=(i+1);
    b.onclick=()=>{ playClick(); loadStage(i); };
    wrap.appendChild(b);
  });
}

/* ねずみ往復 */
function moveMouse(m){
  let nr=m.r+m.dr, nc=m.c+m.dc;
  if(isWall(nr,nc)){ m.dr*=-1; m.dc*=-1; nr=m.r+m.dr; nc=m.c+m.dc; if(isWall(nr,nc)) return; }
  m.r=nr; m.c=nc;
}
function mouseAt(r,c){ return mice.some(m=>m.r===r&&m.c===c); }

function pushUndo(){
  undoStack.push({ cat:{...cat}, mice:mice.map(m=>({...m})), collected:new Set(collected), moves });
  if(undoStack.length>200) undoStack.shift();
}

function act(dir){
  if(locked) return;
  let dr=0,dc=0,wait=false;
  if(dir==='up')dr=-1; else if(dir==='down')dr=1;
  else if(dir==='left')dc=-1; else if(dir==='right')dc=1;
  else if(dir==='wait')wait=true; else return;

  if(!wait){
    const nr=cat.r+dr, nc=cat.c+dc;
    if(isWall(nr,nc)) return;
    pushUndo(); cat.r=nr; cat.c=nc;
  } else { pushUndo(); }

  if(fishStart.has(key(cat.r,cat.c)) && !collected.has(key(cat.r,cat.c))){
    collected.add(key(cat.r,cat.c)); playFish();
  }
  if(mouseAt(cat.r,cat.c)) return doCaught();

  mice.forEach(moveMouse);
  if(mouseAt(cat.r,cat.c)) return doCaught();

  computeWatch();
  if(watchSet.has(key(cat.r,cat.c))) return doCaught();

  moves++;
  if(remaining()===0 && cat.r===homePos.r && cat.c===homePos.c){ render(); return doClear(); }
  render();
}

function doCaught(){
  computeWatch(); render(); locked=true; playCaught();
  catTok.animate(
    [{transform:'translate(-50%,-50%) rotate(0)'},{transform:'translate(-50%,-50%) rotate(-12deg)'},
     {transform:'translate(-50%,-50%) rotate(12deg)'},{transform:'translate(-50%,-50%) rotate(0)'}],
    {duration:380, iterations:1});
  showOverlay(`
    <div class="emoji">🙀</div>
    <h2>みつかっちゃった！</h2>
    <p>だいじょうぶ、もういちど ためそう。</p>
    <div class="row">
      <button class="bigbtn" onclick="doUndo()">↩ ひとつもどる</button>
      <button class="bigbtn go" onclick="restart()">やりなおし</button>
    </div>`);
}

function doClear(){
  locked=true; playClear();
  const last=stageIndex===STAGES.length-1;
  showOverlay(`
    <div class="emoji">${last?'👑':'🎉'}</div>
    <h2>${last?'ぜんぶ クリア！':'クリア！'}</h2>
    <p>${last?'すごい！ ねこちゃん だいまんぞく 🐱🐟':'おさかな ぜんぶ あつめたね！'}</p>
    <div class="row">
      ${last
        ? `<button class="bigbtn go" onclick="loadStage(0)">もういちど あそぶ</button>`
        : `<button class="bigbtn" onclick="restart()">もういちど</button>
           <button class="bigbtn go" onclick="nextStage()">つぎへ ▶</button>`}
    </div>`);
}

function nextStage(){ playClick(); loadStage(Math.min(stageIndex+1, STAGES.length-1)); }
function restart(){ playClick(); loadStage(stageIndex); }

function doUndo(){
  if(undoStack.length===0){ hideOverlay(); locked=false; return; }
  const s=undoStack.pop();
  cat={...s.cat}; mice=s.mice.map(m=>({...m})); collected=new Set(s.collected); moves=s.moves;
  locked=false; hideOverlay(); computeWatch(); render();
}

function showOverlay(html){ cardEl.innerHTML=html; overlayEl.classList.add('show'); }
function hideOverlay(){ overlayEl.classList.remove('show'); }

/* ---- スタート画面 ---- */
function showStart(){
  locked=true;
  showOverlay(`
    <div class="emoji">🐱🐟</div>
    <h2>ネコの おさかな<br>だいさくせん</h2>
    <p>ネコを うごかして おさかなを あつめよう！<br>🐭 ねずみに みつからないように。</p>
    <div class="row"><button class="bigbtn go" onclick="startGame()">▶ スタート</button></div>`);
}
function startGame(){ ac(); hideOverlay(); locked=false; playClick(); }

/* ======================= おと(ファイル不要) ======================= */
let actx=null, muted=false;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function beep(freq,dur,type='sine',vol=0.18,delay=0){
  if(muted) return; const a=ac(); if(!a) return;
  const t=a.currentTime+delay;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.02);
}
function playClick(){ beep(520,0.08,'triangle',0.12); }
function playFish(){ beep(660,0.09,'sine',0.18); beep(990,0.10,'sine',0.16,0.06); }
function playCaught(){ beep(300,0.16,'sawtooth',0.16); beep(180,0.22,'sawtooth',0.16,0.10); }
function playClear(){ [523,659,784,1046].forEach((f,i)=>beep(f,0.16,'triangle',0.18,i*0.10)); }

document.getElementById('muteBtn').onclick=function(){ muted=!muted; this.textContent=muted?'🔇':'🔊'; if(!muted) playClick(); };

/* ======================= 入力 ======================= */
document.querySelectorAll('.dbtn').forEach(b=>{ b.addEventListener('click',()=>{ ac(); act(b.dataset.dir); }); });
document.getElementById('undoBtn').onclick=()=>{ if(locked)return; doUndo(); };
document.getElementById('resetBtn').onclick=()=>{ restart(); };

window.addEventListener('keydown',(e)=>{
  const k=e.key.toLowerCase(); let handled=true;
  if(k==='arrowup'||k==='w') act('up');
  else if(k==='arrowdown'||k==='s') act('down');
  else if(k==='arrowleft'||k==='a') act('left');
  else if(k==='arrowright'||k==='d') act('right');
  else if(k===' '||k==='.') act('wait');
  else if(k==='u'||k==='z'){ if(!locked) doUndo(); }
  else if(k==='r') restart();
  else handled=false;
  if(handled) e.preventDefault();
},{passive:false});

/* スワイプ操作 */
let tStart=null;
boardEl.addEventListener('touchstart',(e)=>{ ac(); const t=e.changedTouches[0]; tStart={x:t.clientX,y:t.clientY}; },{passive:true});
boardEl.addEventListener('touchend',(e)=>{
  if(!tStart) return;
  const t=e.changedTouches[0]; const dx=t.clientX-tStart.x, dy=t.clientY-tStart.y;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(Math.max(ax,ay)<20){ tStart=null; return; }
  if(ax>ay) act(dx>0?'right':'left'); else act(dy>0?'down':'up');
  tStart=null;
},{passive:true});

/* ======================= スタート ======================= */
loadStage(0);   // 盤面を表示しておく
showStart();    // 上に「スタート」画面を出す

</script>
