<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ねこといっしょに カタカナ かきかた 🐱✏️</title>
<!-- 書き順データ: KanjiVG (c) Ulrich Apel, CC BY-SA 3.0 (https://kanjivg.tagaini.net) -->
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
    background:linear-gradient(#cdeefb,#e8f7d8);
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #app{max-width:520px;height:100%;margin:0 auto;display:flex;flex-direction:column;position:relative;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:13px;padding:14px;text-align:center;}
  h1{font-size:27px;color:#4a3f35;text-shadow:0 2px 0 #fff;}
  .modeBtn{
    font-family:inherit;width:min(320px,86%);padding:16px 10px;border:none;border-radius:22px;
    font-size:23px;font-weight:bold;color:#fff;cursor:pointer;letter-spacing:3px;
  }
  .modeBtn small{display:block;font-size:13px;font-weight:normal;letter-spacing:1px;margin-top:3px;opacity:.95;}
  #btnNormal{background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 6px 0 #3f8a3f;}
  #btnHard{background:linear-gradient(#ffa36b,#ff7e4f);box-shadow:0 6px 0 #d95f33;}
  #btnVeryHard{background:linear-gradient(#b388eb,#9b6dd6);box-shadow:0 6px 0 #7a4ddb;}
  .modeBtn:active{transform:translateY(4px);box-shadow:none !important;}
  .credit{font-size:10px;color:#8a8070;}

  /* 50音えらび */
  #pickerScreen{display:none;justify-content:flex-start;padding-top:10px;}
  #kanaGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;width:min(420px,94%);
    overflow-y:auto;padding:4px;}
  .kanaBtn{
    position:relative;font-family:inherit;font-size:27px;font-weight:bold;color:#4a3f35;
    background:linear-gradient(#fffdf5,#ffeecb);border:none;border-radius:14px;
    padding:10px 0;cursor:pointer;box-shadow:0 4px 0 #d9c9a8;
  }
  .kanaBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #d9c9a8;}
  .kanaBtn .done{position:absolute;top:1px;right:4px;font-size:13px;}

  /* ゲーム画面 */
  #gameScreen{display:none;justify-content:flex-start;gap:6px;}
  #topBar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:4px 2px;}
  .pillBtn{
    font-family:inherit;font-size:15px;font-weight:bold;color:#4a3f35;border:none;border-radius:999px;
    background:#fff;padding:8px 16px;cursor:pointer;box-shadow:0 3px 0 #cbbfae;
  }
  .pillBtn:active{transform:translateY(3px);box-shadow:none;}
  #progress{font-size:16px;font-weight:bold;color:#4a3f35;background:rgba(255,255,255,.7);
    border-radius:999px;padding:6px 14px;}
  #charLabel{
    font-size:34px;font-weight:bold;color:#4a3f35;background:#fff;border-radius:16px;
    padding:2px 18px;cursor:pointer;box-shadow:0 3px 0 #cbbfae;
  }
  #traceCanvas{background:#fffdf5;border-radius:20px;box-shadow:0 6px 16px rgba(90,70,40,.18);
    touch-action:none;}
  #hint{font-size:13.5px;color:#4a3f35;background:rgba(255,255,255,.75);border-radius:999px;
    padding:5px 16px;}

  /* なまえつきキャラ説明 */
  #legend{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;font-size:11.5px;color:#4a3f35;}
  .lg{background:rgba(255,255,255,.7);border-radius:999px;padding:3px 9px;}

  /* おわり画面 */
  #doneOverlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;background:rgba(80,60,90,.45);backdrop-filter:blur(3px);z-index:10;}
  .card2{background:#fff8ec;color:#4a3f35;border-radius:24px;padding:24px 28px;text-align:center;
    box-shadow:0 10px 30px rgba(60,40,20,.35);border:4px solid #fff;}
  .card2 h2{font-size:26px;margin-bottom:4px;}
  .card2 .big{font-size:44px;}
  .go{
    font-family:inherit;font-size:18px;font-weight:bold;color:#fff;border:none;border-radius:999px;
    background:linear-gradient(#ffa36b,#ff7e4f);padding:12px 30px;cursor:pointer;
    box-shadow:0 6px 0 #d95f33;letter-spacing:1px;
  }
  .go.green{background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 6px 0 #3f8a3f;}
  .go:active{transform:translateY(4px);box-shadow:none;}
</style>
</head>
<body>
<div id="app">

  <div id="homeScreen" class="screen">
    <h1>🐱 ねこといっしょに<br>カタカナ かきかた ✏️</h1>
    <div id="legend">
      <span class="lg">1かくめ 🟠ちゃとら</span><span class="lg">2かくめ ⚫くろ</span>
      <span class="lg">3かくめ ⚪しろ</span><span class="lg">4かくめ 🐭チューすけ</span>
    </div>
    <button class="modeBtn" id="btnNormal">ふつう<small>おてほんを みながら なぞる</small></button>
    <button class="modeBtn" id="btnHard">むずかしい<small>ランダムに 10もじ</small></button>
    <button class="modeBtn" id="btnVeryHard">とてもむずかしい<small>おてほんなし! スタートだけが たより</small></button>
    <div class="credit">もじのかたちデータ: KanjiVG (CC BY-SA 3.0)</div>
  </div>

  <div id="pickerScreen" class="screen">
    <div id="topBar" style="width:100%;">
      <button class="pillBtn" id="pickerBack">◀ もどる</button>
      <div id="progress" style="visibility:hidden;"></div>
      <div style="width:90px;"></div>
    </div>
    <div style="font-size:17px;color:#4a3f35;font-weight:bold;">れんしゅうしたい もじを えらんでね</div>
    <div id="kanaGrid"></div>
  </div>

  <div id="gameScreen" class="screen">
    <div id="topBar">
      <button class="pillBtn" id="backBtn">◀ もどる</button>
      <div id="charLabel">あ 🔊</div>
      <div id="progress"></div>
      <button class="pillBtn" id="muteBtn" style="border-radius:50%;width:40px;height:40px;padding:0;">🔊</button>
    </div>
    <canvas id="traceCanvas"></canvas>
    <div id="hint">スタートの キャラクターに ゆびをおいてね</div>
  </div>

  <div id="doneOverlay">
    <div class="card2">
      <h2 id="doneTitle"></h2>
      <div class="big" id="doneEmoji"></div>
      <p id="doneText" style="font-size:14px;"></p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button class="go" id="retryBtn">もういちど</button>
      <button class="go green" id="nextCharBtn">つぎのもじ ▶</button>
      <button class="go" id="exitBtn" style="background:linear-gradient(#b388eb,#9b6dd6);box-shadow:0 6px 0 #7a4ddb;">おわる</button>
    </div>
  </div>

</div>

/* ================= サウンド ================= */
let audioCtx = null, muted = false;
function ensureAudio(){
  if (!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
}
function beep(freq, dur, type, vol, delay){
  if (muted || !audioCtx) return;
  try{
    const t0 = audioCtx.currentTime + (delay || 0);
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    g.gain.setValueAtTime(vol || .08, t0);
    g.gain.exponentialRampToValueAtTime(.0001, t0 + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur);
  }catch(e){}
}
const sndStroke = () => { beep(660,.12,"triangle",.12); beep(990,.2,"triangle",.1,.08); };
const sndOops   = () => beep(180,.2,"sine",.06);
const sndClear  = () => [523,659,784,1047].forEach((f,i)=>beep(f,.28,"triangle",.12,i*.13));
function speak(text, rate){
  if (muted) return;
  try{
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = rate || .85; u.pitch = 1.15;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= キャンバス ================= */
const cv = $("traceCanvas");
const ctx = cv.getContext("2d");
let VIEW = 360;
function fitCanvas(){
  VIEW = Math.min(420, Math.min(window.innerWidth - 24, window.innerHeight - 190));
  cv.width = VIEW * devicePixelRatio;
  cv.height = VIEW * devicePixelRatio;
  cv.style.width = VIEW + "px";
  cv.style.height = VIEW + "px";
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (strokesPx.length) prepareChar(curChar); // サイズ変更時は座標を再計算
}
window.addEventListener("resize", () => fitCanvas());

/* ================= ゲーム状態 ================= */
let mode = "normal";             // normal / hard / veryhard
let queueChars = [], charIdx = 0;
let curChar = "あ";
let strokesPx = [];              // 画面座標の点列 [stroke][i] = {x,y}
let strokeIdx = 0, pIdx = 0;
let phase = "idle";              // idle / demo / trace / done
let demoT = 0;
let pointerDown = false, finger = {x:0,y:0};
let oopsCooldown = 0, cheer = 0, doneFlash = 0, marks = [];
let engaged = false;  // 書き始め位置にふれてからなぞりが始まる
let alongAccum = 0, prevFinger = null, strokeLens = [], engageFinger = null;  // 進行方向への移動量
const completed = new Set();
let inkWidth = 16;

function tolerance(){
  return mode === "normal" ? 30 : mode === "hard" ? 26 : 22;
}
function showGuide(){ return mode !== "veryhard"; }

function toPx(p){
  const pad = VIEW * 0.06;
  const s = (VIEW - pad*2) / 109;
  return { x: p[0]*s + pad, y: p[1]*s + pad };
}

function prepareChar(ch){
  curChar = ch;
  strokesPx = STROKES[ch].map(st => st.map(toPx));
  strokeLens = strokesPx.map(st => {
    let L = 0;
    for (let i = 1; i < st.length; i++) L += dist(st[i-1], st[i]);
    return L;
  });
  strokeIdx = 0; pIdx = 0; phase = "idle"; demoT = 0; marks = [];
  inkWidth = Math.max(12, VIEW * 0.045);
  $("charLabel").textContent = ch + " 🔊";
  $("hint").textContent = "スタートの キャラクターに ゆびをおいてね";
  setTimeout(()=>speak("「" + ch + "」を かいてみよう"), 300);
}

/* ================= キャラクターの絵 ================= */
function drawFrontFace(x, y, r, cfg, t){
  // スタートマーカー用のかお(正面)
  ctx.save();
  ctx.translate(x, y);
  const pulse = 1 + Math.sin(t*4) * .07;
  ctx.scale(pulse, pulse);
  if (cfg.kind === "cat"){
    ctx.fillStyle = cfg.body;
    ctx.beginPath(); ctx.moveTo(-r*.95,-r*.5); ctx.lineTo(-r*.55,-r*1.35); ctx.lineTo(-r*.15,-r*.6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*.95,-r*.5); ctx.lineTo(r*.55,-r*1.35); ctx.lineTo(r*.15,-r*.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = cfg.ear;
    ctx.beginPath(); ctx.moveTo(-r*.75,-r*.6); ctx.lineTo(-r*.55,-r*1.1); ctx.lineTo(-r*.3,-r*.62); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*.75,-r*.6); ctx.lineTo(r*.55,-r*1.1); ctx.lineTo(r*.3,-r*.62); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle = cfg.body;
    ctx.beginPath(); ctx.arc(-r*.8,-r*.8, r*.55, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.8,-r*.8, r*.55, 0, 6.29); ctx.fill();
    ctx.fillStyle = cfg.ear;
    ctx.beginPath(); ctx.arc(-r*.8,-r*.8, r*.32, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.8,-r*.8, r*.32, 0, 6.29); ctx.fill();
  }
  ctx.fillStyle = cfg.body;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.29); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,.12)"; ctx.lineWidth = 1.5; ctx.stroke();
  const eyeC = cfg.body === "#4a4441" ? "#ffe066" : "#3a2c20";
  ctx.fillStyle = eyeC;
  ctx.beginPath(); ctx.arc(-r*.34, -r*.1, r*.13, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(r*.34, -r*.1, r*.13, 0, 6.29); ctx.fill();
  ctx.fillStyle = "#ff8aa0";
  ctx.beginPath(); ctx.arc(0, r*.18, r*.12, 0, 6.29); ctx.fill();
  if (cfg.kind === "mouse"){
    ctx.fillStyle = "#fff";
    ctx.fillRect(-r*.16, r*.3, r*.15, r*.25);
    ctx.fillRect(r*.01, r*.3, r*.15, r*.25);
  }
  if (cfg.crown){
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath();
    ctx.moveTo(-r*.55,-r*1.0); ctx.lineTo(-r*.55,-r*1.5); ctx.lineTo(-r*.25,-r*1.15);
    ctx.lineTo(0,-r*1.6); ctx.lineTo(r*.25,-r*1.15); ctx.lineTo(r*.55,-r*1.5); ctx.lineTo(r*.55,-r*1.0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#e0a800"; ctx.lineWidth = 1; ctx.stroke();
  }
  ctx.restore();
}

function drawRunner(x, y, angle, cfg, t){
  // うえから見たすがた:あたまが進むほう、せなかとしっぽが見える
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  const wig = Math.sin(t*14) * .15;     // しっぽ・あしのうごき
  if (cfg.kind === "cat"){
    // しっぽ(うしろへ)
    ctx.strokeStyle = cfg.deco; ctx.lineWidth = 4.5; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-16, 0);
    ctx.quadraticCurveTo(-26, Math.sin(t*8)*6, -32, Math.sin(t*8+1)*4);
    ctx.stroke();
    // あし(ちらっ)
    ctx.fillStyle = cfg.body;
    for (const s of [-1,1]){
      ctx.beginPath(); ctx.ellipse(4 + wig*8*s, 10*s, 3.4, 2.6, 0, 0, 6.29); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-10 - wig*8*s, 9.4*s, 3.2, 2.5, 0, 0, 6.29); ctx.fill();
    }
    // からだ(せなか)
    ctx.fillStyle = cfg.body;
    ctx.beginPath(); ctx.ellipse(-5, 0, 14, 9.5, 0, 0, 6.29); ctx.fill();
    if (cfg.striped){
      ctx.strokeStyle = cfg.deco; ctx.lineWidth = 2.2;
      for (const dx of [-11,-5,1]){
        ctx.beginPath(); ctx.moveTo(dx, -7); ctx.quadraticCurveTo(dx+2, 0, dx, 7); ctx.stroke();
      }
    }
    // あたま+みみ(まえ)
    ctx.fillStyle = cfg.body;
    ctx.beginPath(); ctx.arc(9, 0, 8, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.moveTo(12,-6); ctx.lineTo(18,-9); ctx.lineTo(14,-1.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(12,6);  ctx.lineTo(18,9);  ctx.lineTo(14,1.5);  ctx.closePath(); ctx.fill();
    ctx.fillStyle = cfg.ear;
    ctx.beginPath(); ctx.moveTo(13,-5.5); ctx.lineTo(16.5,-7.5); ctx.lineTo(14,-2.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13,5.5);  ctx.lineTo(16.5,7.5);  ctx.lineTo(14,2.5);  ctx.closePath(); ctx.fill();
  } else {
    // ねずみ:しっぽほそく
    ctx.strokeStyle = "#e8a0a8"; ctx.lineWidth = 2.2; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-13, 0);
    ctx.quadraticCurveTo(-24, Math.sin(t*8)*7, -30, Math.sin(t*8+1)*5);
    ctx.stroke();
    ctx.fillStyle = cfg.body;
    for (const s of [-1,1]){
      ctx.beginPath(); ctx.ellipse(3 + wig*7*s, 8.4*s, 2.8, 2.2, 0, 0, 6.29); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-8 - wig*7*s, 8*s, 2.7, 2.1, 0, 0, 6.29); ctx.fill();
    }
    ctx.beginPath(); ctx.ellipse(-4, 0, 11, 8, 0, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(8, 0, 6.5, 0, 6.29); ctx.fill();
    // まるいみみ(よこ)
    ctx.fillStyle = cfg.body;
    ctx.beginPath(); ctx.arc(8, -7.5, 4.6, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(8, 7.5, 4.6, 0, 6.29); ctx.fill();
    ctx.fillStyle = cfg.ear;
    ctx.beginPath(); ctx.arc(8, -7.5, 2.6, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(8, 7.5, 2.6, 0, 6.29); ctx.fill();
    if (cfg.crown){
      ctx.fillStyle = "#ffd34d";
      ctx.beginPath();
      ctx.moveTo(5,-3.4); ctx.lineTo(13,-3.4); ctx.lineTo(13,3.4); ctx.lineTo(5,3.4);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#ffe9a0";
      ctx.beginPath(); ctx.arc(9, 0, 1.6, 0, 6.29); ctx.fill();
    }
  }
  ctx.restore();
}

/* ================= 描画ループ ================= */
function strokeColorGuide(){ return mode === "hard" ? "#e7e0d2" : "#ddd5c4"; }

function drawPolyline(pts, upto, width, color){
  if (upto < 1) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i <= upto; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
}

function render(ms){
  const t = ms/1000;
  ctx.clearRect(0,0,VIEW,VIEW);
  // ます目
  ctx.strokeStyle = "#efe7d6"; ctx.lineWidth = 1.5;
  ctx.setLineDash([7,7]);
  ctx.beginPath();
  ctx.moveTo(VIEW/2, 8); ctx.lineTo(VIEW/2, VIEW-8);
  ctx.moveTo(8, VIEW/2); ctx.lineTo(VIEW-8, VIEW/2);
  ctx.stroke();
  ctx.setLineDash([]);

  if (!strokesPx.length){ requestAnimationFrame(render); return; }

  // おてほん(うすいグレー)
  if (showGuide()){
    for (const st of strokesPx) drawPolyline(st, st.length-1, inkWidth, strokeColorGuide());
  }
  // かきおわった画(こいインク)
  for (let s = 0; s < strokeIdx; s++){
    drawPolyline(strokesPx[s], strokesPx[s].length-1, inkWidth, "#4a4a4a");
  }
  const st = strokesPx[strokeIdx];
  const cfg = STROKE_CHARS[strokeIdx % STROKE_CHARS.length];

  if (phase === "demo" && st){
    demoT = Math.min(1, demoT + 1/75);
    const di = Math.floor(demoT * (st.length-1));
    drawPolyline(st, di, inkWidth*.55, "#ffd166");
    const p = st[di], q = st[Math.min(di+1, st.length-1)];
    const ang = Math.atan2(q.y-p.y, q.x-p.x);
    drawRunner(p.x, p.y, ang, cfg, t);
    if (demoT >= 1){
      phase = "trace"; pIdx = 0; engaged = false; alongAccum = 0; prevFinger = null; engageFinger = null;
      $("hint").textContent = cfg.name + "と いっしょに ゆびで なぞってね";
    }
  }
  else if (phase === "trace" && st){
    drawPolyline(st, pIdx, inkWidth, "#4a4a4a");
    const p = st[pIdx], q = st[Math.min(pIdx+1, st.length-1)];
    const ang = pIdx >= st.length-1 ? Math.atan2(p.y-st[pIdx-1].y, p.x-st[pIdx-1].x)
                                    : Math.atan2(q.y-p.y, q.x-p.x);
    drawRunner(p.x, p.y, ang, cfg, t);
  }

  // つぎの画のスタートマーカー
  if ((phase === "idle") && st){
    drawFrontFace(st[0].x, st[0].y, Math.max(15, VIEW*.05), cfg, t);
    // かくすうバッジ
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(st[0].x + VIEW*.055, st[0].y - VIEW*.055, 10, 0, 6.29); ctx.fill();
    ctx.strokeStyle = "#cbbfae"; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = "#4a3f35"; ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(strokeIdx+1, st[0].x + VIEW*.055, st[0].y - VIEW*.055 + 1);
  }

  // おうえんだん(シロチューとネズミだいおう)
  drawFrontFace(VIEW*.07, VIEW*.94, 12, STROKE_CHARS[4], cheer > 0 ? t*3 : t*.7);
  drawFrontFace(VIEW*.93, VIEW*.94, 12, STROKE_CHARS[5], cheer > 0 ? t*3+1 : t*.7+1);
  if (cheer > 0){
    cheer -= 1/60;
    ctx.font = "15px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("💖", VIEW*.07, VIEW*.85 + Math.sin(t*6)*4);
    ctx.fillText("⭐", VIEW*.93, VIEW*.85 + Math.cos(t*6)*4);
  }

  // 緑の◯マーク
  marks = marks.filter(m => (m.life -= 1/60) > 0);
  for (const m of marks){
    ctx.globalAlpha = Math.min(1, m.life*2.2);
    const sc = 1 + (1 - Math.min(1, m.life*2)) * .25;
    ctx.strokeStyle = "#2eb84d"; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(m.x, m.y, 17*sc, 0, 6.29); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // もじ完成の大きな◯
  if (doneFlash > 0){
    doneFlash -= 1/60;
    ctx.globalAlpha = Math.min(1, doneFlash*1.5);
    ctx.strokeStyle = "#2eb84d"; ctx.lineWidth = 14;
    ctx.beginPath(); ctx.arc(VIEW/2, VIEW/2, VIEW*.34, 0, 6.29); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  oopsCooldown = Math.max(0, oopsCooldown - 1/60);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ================= なぞり判定 ================= */
function dist(a, b){ const dx = a.x-b.x, dy = a.y-b.y; return Math.hypot(dx, dy); }
function engageRadius(st){
  // みじかい画(「シ」のてんなど)は、おわり側からなぞれないように半径をせばめる
  const d = dist(st[0], st[st.length-1]);
  return Math.min(tolerance() * 1.2, Math.max(14, d * 0.55 + 8));
}

function pointerPos(e){
  const r = cv.getBoundingClientRect();
  return { x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left,
           y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top };
}

function onDown(e){
  e.preventDefault();
  ensureAudio();
  pointerDown = true;
  finger = pointerPos(e);
  const st = strokesPx[strokeIdx];
  if (!st) return;
  if (phase === "idle"){
    if (dist(finger, st[0]) < Math.max(34, VIEW*.1)){
      phase = "demo"; demoT = 0;
      const cfg = STROKE_CHARS[strokeIdx % STROKE_CHARS.length];
      $("hint").textContent = cfg.name + "が はしりかたを みせるよ! よくみてね";
      beep(520,.1,"triangle",.08);
    }
  } else if (phase === "trace"){
    const st2 = strokesPx[strokeIdx];
    if (!engaged && dist(finger, st2[pIdx]) < (pIdx === 0 ? engageRadius(st2) : tolerance() * 1.2)){
      engaged = true; engageFinger = {x:finger.x, y:finger.y};
    }
    if (engaged) tryAdvance();
  }
}
function onMove(e){
  if (!pointerDown) return;
  e.preventDefault();
  finger = pointerPos(e);
  if (phase === "trace"){
    const st2 = strokesPx[strokeIdx];
    if (!engaged && dist(finger, st2[pIdx]) < (pIdx === 0 ? engageRadius(st2) : tolerance() * 1.2)){
      engaged = true; engageFinger = {x:finger.x, y:finger.y};
    }
    if (engaged) tryAdvance();
  }
}
function onUp(){ pointerDown = false; }

cv.addEventListener("pointerdown", onDown);
window.addEventListener("pointermove", onMove);
window.addEventListener("pointerup", onUp);

function tryAdvance(){
  const st = strokesPx[strokeIdx];
  if (!st) return;
  const tol = tolerance();
  // ゆびが「すすむ方向」へ動いたぶんだけ加算(逆方向はマイナス)
  if (prevFinger){
    const di = Math.min(pIdx, st.length-2);
    const p0 = st[di], q = st[di+1];
    const dl = dist(p0, q) || 1;
    const dirx = (q.x-p0.x)/dl, diry = (q.y-p0.y)/dl;
    alongAccum += (finger.x-prevFinger.x)*dirx + (finger.y-prevFinger.y)*diry;
  }
  prevFinger = {x:finger.x, y:finger.y};
  const look = Math.max(3, Math.floor(st.length * .16));
  let advanced = false;
  for (let j = Math.min(pIdx + look, st.length-1); j > pIdx; j--){
    if (dist(finger, st[j]) < tol){ pIdx = j; advanced = true; break; }
  }
  if (!advanced){
    if (dist(finger, st[pIdx]) > tol * 2.4 && oopsCooldown <= 0){
      sndOops();
      oopsCooldown = .9;
      $("hint").textContent = "キャラクターの ところに もどってね";
    }
  }
  let directionOK;
  if (strokeLens[strokeIdx] < 130){
    // みじかい画:書きはじめ→書きおわり方向に、正しくゆびが動いたか
    const a = st[0], b = st[st.length-1];
    const cd = dist(a, b) || 1;
    const ux = (b.x-a.x)/cd, uy = (b.y-a.y)/cd;
    const net = engageFinger ? (finger.x-engageFinger.x)*ux + (finger.y-engageFinger.y)*uy : 0;
    directionOK = net >= cd * 0.5;
  } else {
    directionOK = alongAccum >= strokeLens[strokeIdx] * 0.45;
  }
  if (pIdx >= st.length - 2 && directionOK){
    strokeDone();
  }
}

function strokeDone(){
  const st = strokesPx[strokeIdx];
  marks.push({x: st[st.length-1].x, y: st[st.length-1].y, life: .9});
  sndStroke();
  cheer = 1.2;
  strokeIdx++;
  pIdx = 0;
  phase = "idle";
  engaged = false; alongAccum = 0; prevFinger = null; engageFinger = null;
  if (strokeIdx >= strokesPx.length){
    charDone();
  } else {
    $("hint").textContent = "つぎは " + STROKE_CHARS[strokeIdx % STROKE_CHARS.length].name + "! スタートに ゆびをおいてね";
  }
}

function charDone(){
  phase = "done";
  doneFlash = 1.4;
  cheer = 2.5;
  sndClear();
  completed.add(curChar);
  const praise = PRAISES[Math.floor(Math.random()*PRAISES.length)];
  setTimeout(()=>speak("「" + curChar + "」が かけたね! " + praise), 300);
  setTimeout(()=>{
    if (mode === "normal"){
      showDone("「" + curChar + "」が かけた!", "🐱⭕🐭", "");
    } else {
      charIdx++;
      if (charIdx >= queueChars.length){
        showDone("ぜんぶ できた!", "🎊🐱🐭🎊", "10もじ ぜんぶ きれいに かけたよ! すごい!");
        setTimeout(()=>speak("ぜんぶできたね! おめでとう!"), 600);
      } else {
        $("progress").textContent = "🐾 " + (charIdx+1) + " / " + queueChars.length;
        prepareChar(queueChars[charIdx]);
      }
    }
  }, 1600);
}

function showDone(title, emoji, text){
  $("doneTitle").textContent = title;
  $("doneEmoji").textContent = emoji;
  $("doneText").textContent = text;
  $("nextCharBtn").style.display = (mode === "normal") ? "inline-block" : "none";
  $("retryBtn").style.display = "inline-block";
  $("doneOverlay").style.display = "flex";
}

/* ================= モード開始 ================= */
function startNormalChar(ch){
  mode = "normal";
  show("gameScreen");
  $("progress").style.visibility = "hidden";
  prepareChar(ch);
}
function startRandomMode(m){
  ensureAudio();
  mode = m;
  queueChars = KANA_ORDER.slice().sort(()=>Math.random()-.5).slice(0,10);
  charIdx = 0;
  show("gameScreen");
  $("progress").style.visibility = "visible";
  $("progress").textContent = "🐾 1 / " + queueChars.length;
  prepareChar(queueChars[0]);
}

/* ================= 50音えらび ================= */
function buildPicker(){
  const grid = $("kanaGrid");
  grid.innerHTML = "";
  for (const ch of KANA_ORDER){
    const b = document.createElement("button");
    b.className = "kanaBtn";
    b.innerHTML = ch + (completed.has(ch) ? '<span class="done">⭕</span>' : '');
    b.addEventListener("click", () => { ensureAudio(); startNormalChar(ch); });
    grid.appendChild(b);
  }
}

/* ================= ボタン ================= */
$("btnNormal").addEventListener("click", () => { ensureAudio(); buildPicker(); show("pickerScreen"); });
$("btnHard").addEventListener("click", () => startRandomMode("hard"));
$("btnVeryHard").addEventListener("click", () => startRandomMode("veryhard"));
$("pickerBack").addEventListener("click", () => show("homeScreen"));
$("backBtn").addEventListener("click", () => {
  try{speechSynthesis.cancel();}catch(e){}
  show(mode === "normal" ? "pickerScreen" : "homeScreen");
  if (mode === "normal") buildPicker();
});
$("muteBtn").addEventListener("click", () => {
  muted = !muted;
  $("muteBtn").textContent = muted ? "🔇" : "🔊";
  if (muted){ try{speechSynthesis.cancel();}catch(e){} }
});
$("charLabel").addEventListener("click", () => speak(curChar));
$("retryBtn").addEventListener("click", () => {
  $("doneOverlay").style.display = "none";
  prepareChar(curChar);
});
$("nextCharBtn").addEventListener("click", () => {
  $("doneOverlay").style.display = "none";
  const i = KANA_ORDER.indexOf(curChar);
  prepareChar(KANA_ORDER[(i+1) % KANA_ORDER.length]);
});
$("exitBtn").addEventListener("click", () => {
  $("doneOverlay").style.display = "none";
  if (mode === "normal"){ buildPicker(); show("pickerScreen"); }
  else show("homeScreen");
});

fitCanvas();
show("homeScreen");
</script>
