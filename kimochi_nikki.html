<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きもち日記 〜モモとすごす時間〜</title>
<style>
  :root{
    --bg:#faf6ef;
    --card:#ffffff;
    --ink:#5b5347;
    --ink-soft:#8d8474;
    --accent:#e8a87c;
    --accent-soft:#f6dcc8;
    --bubble:#fdf3e7;
    --joy:#f5c445;    --joy-bg:#fdf3d5;
    --calm:#8fbf9f;   --calm-bg:#e3f0e7;
    --sad:#7fa8c9;    --sad-bg:#e2edf5;
    --anx:#b291c9;    --anx-bg:#ece2f3;
    --ang:#d98a80;    --ang-bg:#f7e2df;
    --tired:#a09a8c;  --tired-bg:#edeae3;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI",sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;justify-content:center;
    line-height:1.7;
  }
  #app{width:100%;max-width:480px;padding:16px 16px 40px;position:relative;}

  /* ---------- header ---------- */
  header{text-align:center;padding:10px 0 4px;}
  header h1{font-size:1.05rem;font-weight:600;color:var(--ink-soft);letter-spacing:.12em;}

  /* ---------- companion ---------- */
  .stage{
    position:relative;text-align:center;padding:12px 0 0;
  }
  .cat-wrap{display:inline-block;position:relative;animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-3px) scale(1.015);}}
  .cat-wrap svg{width:150px;height:auto;display:block;margin:0 auto;}
  .zzz{position:absolute;top:-4px;right:-10px;font-size:.8rem;color:var(--ink-soft);opacity:0;}

  /* speech bubble */
  .bubble{
    background:var(--bubble);
    border-radius:18px;
    padding:14px 18px;
    margin:14px auto 0;
    max-width:92%;
    font-size:.95rem;
    position:relative;
    text-align:left;
    box-shadow:0 2px 6px rgba(0,0,0,.04);
    min-height:3.2em;
    white-space:pre-wrap;
  }
  .bubble::before{
    content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);
    border:9px solid transparent;border-bottom-color:var(--bubble);border-top:none;
  }

  /* ---------- controls area ---------- */
  .controls{margin-top:18px;min-height:120px;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  .chip{
    border:none;cursor:pointer;
    padding:10px 18px;border-radius:22px;
    font-size:.92rem;font-family:inherit;color:var(--ink);
    background:var(--card);
    box-shadow:0 2px 5px rgba(0,0,0,.06);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .chip:hover{transform:translateY(-2px);box-shadow:0 4px 9px rgba(0,0,0,.09);}
  .chip:active{transform:translateY(0);}
  .chip.big{padding:13px 22px;font-size:.98rem;}
  .chip .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:7px;vertical-align:1px;}
  .chip.subtle{background:transparent;box-shadow:none;color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;}
  .chip.subtle:hover{transform:none;}

  textarea{
    width:100%;border:1.5px solid #e8e0d2;border-radius:14px;
    padding:12px 14px;font-family:inherit;font-size:.95rem;color:var(--ink);
    background:var(--card);resize:none;height:96px;outline:none;
  }
  textarea:focus{border-color:var(--accent);}

  input[type=range]{
    -webkit-appearance:none;width:80%;height:8px;border-radius:4px;
    background:linear-gradient(to right,var(--accent-soft),var(--accent));
    outline:none;margin:18px 0 4px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:26px;height:26px;border-radius:50%;
    background:#fff;border:3px solid var(--accent);cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
  }
  .range-labels{display:flex;justify-content:space-between;width:80%;margin:0 auto;font-size:.75rem;color:var(--ink-soft);}
  .range-wrap{text-align:center;}

  .fade-in{animation:fadeIn .5s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---------- garden ---------- */
  .garden{
    margin-top:26px;background:linear-gradient(#f2ead9,#e9e4d0);
    border-radius:18px;padding:14px 16px 10px;text-align:center;
  }
  .garden .title{font-size:.78rem;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:4px;}
  .flowers{font-size:1.25rem;letter-spacing:4px;min-height:1.6em;word-break:break-all;}
  .garden .hint{font-size:.72rem;color:var(--ink-soft);margin-top:4px;}

  /* ---------- nav ---------- */
  .nav{display:flex;justify-content:center;gap:14px;margin-top:22px;}

  /* ---------- journal ---------- */
  .journal h2{font-size:1rem;color:var(--ink-soft);text-align:center;margin:14px 0 12px;letter-spacing:.1em;}
  .entry{
    background:var(--card);border-radius:16px;padding:13px 16px;margin-bottom:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.05);
  }
  .entry .meta{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--ink-soft);margin-bottom:5px;}
  .entry .emo{display:inline-block;padding:2px 11px;border-radius:12px;font-size:.78rem;color:#fff;}
  .entry .text{font-size:.9rem;white-space:pre-wrap;}
  .entry .body-tags{margin-top:5px;font-size:.76rem;color:var(--ink-soft);}
  .empty-msg{text-align:center;color:var(--ink-soft);font-size:.9rem;padding:30px 0;}

  .hidden{display:none !important;}
  footer{margin-top:34px;text-align:center;font-size:.7rem;color:#b8b0a0;line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <header><h1>きもち日記</h1></header>

  <!-- ============ MAIN (companion) ============ -->
  <section id="view-main">
    <div class="stage">
      <div class="cat-wrap" id="catWrap">
        <!-- cat svg -->
        <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg">
          <!-- tail -->
          <path d="M158 128 q34 -6 28 -38 q-3 -14 -16 -16 q10 8 8 20 q-3 18 -26 22 z" fill="#e8b98e"/>
          <!-- body -->
          <ellipse cx="100" cy="118" rx="62" ry="46" fill="#f3d1a7"/>
          <!-- belly -->
          <ellipse cx="100" cy="130" rx="36" ry="26" fill="#fbeedd"/>
          <!-- ears -->
          <path d="M52 52 L60 18 L84 42 Z" fill="#f3d1a7"/>
          <path d="M148 52 L140 18 L116 42 Z" fill="#f3d1a7"/>
          <path d="M58 46 L63 27 L77 41 Z" fill="#e8a87c"/>
          <path d="M142 46 L137 27 L123 41 Z" fill="#e8a87c"/>
          <!-- head -->
          <circle cx="100" cy="70" r="46" fill="#f3d1a7"/>
          <!-- cheeks -->
          <circle cx="70" cy="82" r="8" fill="#f5b78f" opacity=".55"/>
          <circle cx="130" cy="82" r="8" fill="#f5b78f" opacity=".55"/>
          <!-- eyes -->
          <g id="eyesOpen">
            <circle cx="82" cy="68" r="5.5" fill="#5b5347"/>
            <circle cx="118" cy="68" r="5.5" fill="#5b5347"/>
            <circle cx="84" cy="66" r="1.8" fill="#fff"/>
            <circle cx="120" cy="66" r="1.8" fill="#fff"/>
          </g>
          <g id="eyesClosed" style="display:none">
            <path d="M76 68 q6 5 12 0" stroke="#5b5347" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M112 68 q6 5 12 0" stroke="#5b5347" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </g>
          <!-- nose & mouth -->
          <path d="M97 78 q3 -2.5 6 0 q-1.5 3.5 -3 3.5 q-1.5 0 -3 -3.5" fill="#d98a80"/>
          <path d="M100 82 q0 5 -6 6 M100 82 q0 5 6 6" stroke="#5b5347" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- whiskers -->
          <g stroke="#cdb896" stroke-width="1.5" stroke-linecap="round">
            <path d="M56 74 h-16 M57 82 l-15 5"/>
            <path d="M144 74 h16 M143 82 l15 5"/>
          </g>
          <!-- front paws -->
          <ellipse cx="76" cy="156" rx="14" ry="9" fill="#f3d1a7"/>
          <ellipse cx="124" cy="156" rx="14" ry="9" fill="#f3d1a7"/>
        </svg>
      </div>
      <div class="bubble" id="bubble"></div>
    </div>

    <div class="controls" id="controls"></div>

    <div class="garden" id="garden">
      <div class="title">モモのはらっぱ</div>
      <div class="flowers" id="flowers"></div>
      <div class="hint">きもちをひとつ記すと、花がひとつ咲きます</div>
    </div>

    <div class="nav">
      <button class="chip subtle" id="btnJournal">これまでのきろくを見る</button>
    </div>
  </section>

  <!-- ============ JOURNAL ============ -->
  <section id="view-journal" class="hidden journal">
    <h2>これまでのきろく</h2>
    <div id="entryList"></div>
    <div class="nav">
      <button class="chip" id="btnBack">モモのところへもどる</button>
    </div>
  </section>

  <footer>
    このアプリはあなたの気持ちをやさしく記録するためのものです。<br>
    記録はこの端末の中にだけ保存されます。<br>
    つらさが続くときは、主治医や支援者にご相談ください。
  </footer>
</div>

<script>
/* =========================================================
   きもち日記 — 感情ラベリング × コンパニオン(スクリプト式)
   設計原則: 失敗なし / スキップ自由 / 比較・連続記録の強制なし
   ========================================================= */

/* ---------- data ---------- */
const EMOTIONS = {
  joy:   { label:"うれしい", color:"var(--joy)",  subs:["ほっとした","たのしい","ありがたい","ちょっと誇らしい"] },
  calm:  { label:"おだやか", color:"var(--calm)", subs:["落ち着いている","のんびり","すっきり","なんとなく普通"] },
  sad:   { label:"かなしい", color:"var(--sad)",  subs:["さみしい","がっかり","むなしい","泣きたい感じ"] },
  anx:   { label:"不安",     color:"var(--anx)",  subs:["そわそわする","こわい","自信がない","考えがぐるぐるする"] },
  ang:   { label:"イライラ", color:"var(--ang)",  subs:["もやもやする","くやしい","納得いかない","カッとした"] },
  tired: { label:"つかれた", color:"var(--tired)",subs:["からだが重い","頭がぼんやり","気力が出ない","眠い"] },
};

/* 受容ベースの応答。助言・評価はしない。 { } に副感情ラベルが入る */
const RESPONSES = {
  joy: [
    "そっか、「{}」って気持ちがあったんだね。\nそれを言葉にできたの、なんだかいいね。",
    "「{}」かぁ。きいてるこっちまで、ちょっとあったかくなったよ。",
    "うんうん、「{}」。\nそういう瞬間があった一日だったんだね。",
    "「{}」って気持ち、ここにそっと置いておこうね。",
  ],
  calm: [
    "「{}」なんだね。\nおだやかな時間があるって、それだけでじゅうぶんだよ。",
    "そっか、「{}」かぁ。\n今日はそういう一日だったんだね。",
    "「{}」って言えるの、いいね。\nぼくもとなりでのんびりしてるよ。",
    "うん、「{}」。\n特別なことがなくても、ちゃんと一日だよ。",
  ],
  sad: [
    "「{}」って気持ちだったんだね。\n話してくれてありがとう。",
    "そっか…「{}」かぁ。\nその気持ち、ここではそのままでいいからね。",
    "「{}」って、言葉にするだけでも力がいるよね。\nよくここまで来たね。",
    "うん、きいたよ。「{}」なんだね。\n急いで元気にならなくていいよ。",
  ],
  anx: [
    "「{}」んだね。\n不安に名前をつけられたの、それって大きなことだよ。",
    "そっか、「{}」かぁ。\n不安はいたり来たりするものだから、今ここで気づけたのはすごいこと。",
    "「{}」って教えてくれてありがとう。\nいまは、ぼくと一緒にひと息つこう。",
    "うん、「{}」んだね。\nその気持ちごと、ここにいていいよ。",
  ],
  ang: [
    "「{}」って気持ちがあったんだね。\nそう感じるだけの何かが、きっとあったんだね。",
    "そっか、「{}」かぁ。\n怒りやもやもやも、大事な気持ちのひとつだよ。",
    "「{}」って、ちゃんと言葉にできたね。\n抱えたままより、少しだけ軽くなるといいな。",
    "うん、きいたよ。「{}」なんだね。\nここでは我慢しなくていいからね。",
  ],
  tired: [
    "「{}」んだね。\n今日もここまで動いてきた、その証拠だよ。",
    "そっか、「{}」かぁ。\nつかれてるときは、記録できただけで満点だよ。",
    "「{}」って気づけたんだね。\n今夜はどうか、ゆっくりできますように。",
    "うん、「{}」なんだね。\nぼくものんびりモードでいるから、一緒に休もう。",
  ],
};

const BODY_TAGS = ["肩・首のあたり","胸のあたり","おなかのあたり","頭のあたり","からだ全体","特になし"];

const CLOSINGS = [
  "今日もきもちをひとつ、言葉にできたね。\nはらっぱに花がひとつ咲いたよ。",
  "記録してくれてありがとう。\nほら、花がひとつ増えたよ。",
  "気持ちに名前をつけるって、心の深呼吸みたいなものなんだって。\n花がひとつ咲いたよ。",
  "今日はここまでで大丈夫。\n花がひとつ、増えたよ。またいつでもおいで。",
];

const FLOWER_SET = ["🌼","🌷","🌸","🌻","💐","🪻"];

/* ---------- storage (localStorage、使えない環境ではメモリ) ---------- */
const store = {
  mem:{entries:[]},
  load(){
    try{ return JSON.parse(localStorage.getItem("kimochi_nikki")||'{"entries":[]}'); }
    catch(e){ return this.mem; }
  },
  save(d){
    try{ localStorage.setItem("kimochi_nikki", JSON.stringify(d)); }
    catch(e){ this.mem = d; }
  }
};

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const bubble = $("bubble"), controls = $("controls");
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

function say(text){
  bubble.classList.remove("fade-in"); void bubble.offsetWidth;
  bubble.classList.add("fade-in");
  typeText(bubble, text);
}
let typeTimer = null;
function typeText(el, text){
  clearInterval(typeTimer);
  el.textContent = "";
  let i = 0;
  typeTimer = setInterval(()=>{
    el.textContent = text.slice(0, ++i);
    if(i >= text.length) clearInterval(typeTimer);
  }, 28);
}
function setControls(html){
  controls.classList.remove("fade-in"); void controls.offsetWidth;
  controls.classList.add("fade-in");
  controls.innerHTML = html;
}

/* blink */
setInterval(()=>{
  const o=$("eyesOpen"), c=$("eyesClosed");
  if(!o) return;
  o.style.display="none"; c.style.display="";
  setTimeout(()=>{ o.style.display=""; c.style.display="none"; }, 180);
}, 3800 + Math.random()*1500);

/* ---------- garden ---------- */
function renderGarden(){
  const d = store.load();
  const n = d.entries.length;
  const shown = Math.min(n, 60);
  let s = "";
  for(let i=0;i<shown;i++) s += FLOWER_SET[i % FLOWER_SET.length];
  $("flowers").textContent = s || "…まだ花はありません。最初のひとつを、いつでもどうぞ。";
  if(n > 60) $("flowers").textContent += ` +${n-60}`;
}

/* ---------- conversation flow ---------- */
let draft = {};

function greeting(){
  const h = new Date().getHours();
  const d = store.load();
  const name = "モモ";
  let g;
  if(h < 5)       g = "こんばんは。おそくまでおつかれさま。";
  else if(h < 11) g = "おはよう。今日も来てくれてうれしいな。";
  else if(h < 17) g = "こんにちは。ひと息つきにきたのかな?";
  else            g = "こんばんは。今日も一日、おつかれさま。";
  const today = new Date().toDateString();
  const doneToday = d.entries.some(e => new Date(e.ts).toDateString() === today);
  if(doneToday) g += `\n(今日はもう記録があるけど、何回でも話していいからね)`;
  say(`${g}\nぼくは${name}。よかったら、今日のきもちをきかせて。`);
  setControls(`
    <div class="chips">
      <button class="chip big" onclick="startEntry()">今日のきもちを記す</button>
      <button class="chip subtle" onclick="justSit()">今日はただ、ここにいる</button>
    </div>`);
}

/* 「何もしない」も選択肢として肯定する */
function justSit(){
  say("うん、それでいいよ。\nここでのんびりしていってね。ぼくもとなりにいるよ。");
  setControls(`
    <div class="chips">
      <button class="chip" onclick="greeting()">もどる</button>
    </div>`);
}

function startEntry(){
  draft = { ts: Date.now() };
  say("今日はどんなことがあった?\nひとことでも、書かなくても、どちらでも大丈夫だよ。");
  setControls(`
    <textarea id="eventText" placeholder="例: 外に少し散歩に出た / 特に何もない一日だった …"></textarea>
    <div class="chips" style="margin-top:12px">
      <button class="chip big" onclick="saveEvent()">つぎへ</button>
      <button class="chip subtle" onclick="skipEvent()">書かずにすすむ</button>
    </div>`);
  setTimeout(()=>{ const t=$("eventText"); if(t) t.focus(); }, 300);
}
function saveEvent(){ draft.text = ($("eventText")?.value || "").trim(); askEmotion(); }
function skipEvent(){ draft.text = ""; askEmotion(); }

function askEmotion(){
  say("いまのきもちに、いちばん近いのはどれかな?\nぴったりじゃなくても、なんとなくで大丈夫。");
  const chips = Object.entries(EMOTIONS).map(([k,e]) =>
    `<button class="chip big" onclick="askSub('${k}')"><span class="dot" style="background:${e.color}"></span>${e.label}</button>`
  ).join("");
  setControls(`<div class="chips">${chips}</div>`);
}

function askSub(key){
  draft.emotion = key;
  const e = EMOTIONS[key];
  say(`「${e.label}」なんだね。\nもう少しだけ近づけてみようか。どんな感じ?`);
  const chips = e.subs.map(s =>
    `<button class="chip" onclick="askIntensity('${s}')"><span class="dot" style="background:${e.color}"></span>${s}</button>`
  ).join("");
  setControls(`
    <div class="chips">${chips}
      <button class="chip subtle" onclick="askIntensity('${e.label}')">このままでいい</button>
    </div>`);
}

function askIntensity(sub){
  draft.sub = sub;
  say(`「${sub}」…うん、きいたよ。\nそのきもちは、どのくらいの大きさかな?`);
  setControls(`
    <div class="range-wrap">
      <input type="range" id="intensity" min="1" max="5" value="3">
      <div class="range-labels"><span>すこし</span><span>とても</span></div>
      <div class="chips" style="margin-top:16px">
        <button class="chip big" onclick="respond()">これくらい</button>
      </div>
    </div>`);
}

function respond(){
  draft.intensity = Number($("intensity")?.value || 3);
  const resp = pick(RESPONSES[draft.emotion]).replaceAll("{}", draft.sub);
  say(resp);
  setControls(`
    <div class="chips">
      <button class="chip big" onclick="askBody()">つぎへ</button>
    </div>`);
}

function askBody(){
  say("そのきもち、からだのどこかで感じたりした?\nわからなければ「特になし」でぜんぜん大丈夫。");
  const chips = BODY_TAGS.map(t =>
    `<button class="chip" onclick="finishEntry('${t}')">${t}</button>`
  ).join("");
  setControls(`<div class="chips">${chips}</div>`);
}

function finishEntry(bodyTag){
  draft.body = bodyTag;
  const d = store.load();
  d.entries.push(draft);
  store.save(d);
  renderGarden();
  say(pick(CLOSINGS));
  setControls(`
    <div class="chips">
      <button class="chip" onclick="greeting()">おしまいにする</button>
      <button class="chip subtle" onclick="startEntry()">もうひとつ記す</button>
    </div>`);
}

/* ---------- journal ---------- */
function showJournal(){
  $("view-main").classList.add("hidden");
  $("view-journal").classList.remove("hidden");
  const d = store.load();
  const list = $("entryList");
  if(d.entries.length === 0){
    list.innerHTML = `<div class="empty-msg">まだ記録はありません。<br>いつからでも、いつでも大丈夫。</div>`;
    return;
  }
  const fmt = ts => {
    const dt = new Date(ts);
    return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
  };
  list.innerHTML = [...d.entries].reverse().map(en => {
    const e = EMOTIONS[en.emotion] || {label:"きもち", color:"#ccc"};
    const dots = "●".repeat(en.intensity||3) + "○".repeat(5-(en.intensity||3));
    return `<div class="entry">
      <div class="meta">
        <span>${fmt(en.ts)}</span>
        <span class="emo" style="background:${e.color}">${en.sub || e.label}</span>
        <span style="letter-spacing:2px;color:${e.color}">${dots}</span>
      </div>
      ${en.text ? `<div class="text">${escapeHtml(en.text)}</div>` : ""}
      ${en.body && en.body !== "特になし" ? `<div class="body-tags">からだ: ${en.body}</div>` : ""}
    </div>`;
  }).join("");
}
function escapeHtml(s){

}
