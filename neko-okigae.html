<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネコのお着替えゲーム 🐱</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Hiragino Maru Gothic ProN','Rounded Mplus 1c','Yu Gothic',sans-serif;
    background:linear-gradient(180deg,#bfe9ff 0%,#e6f9ff 45%,#d8f5d0 100%);
    min-height:100vh; overflow-x:hidden;
    user-select:none; -webkit-user-select:none;
  }
  h1 { text-align:center; color:#ff7b54; font-size:clamp(20px,4.5vw,34px);
       padding:12px 8px 2px; text-shadow:2px 2px 0 #fff; }
  .sub { text-align:center; color:#5b8c5a; font-size:clamp(12px,2.5vw,16px); margin-bottom:6px; }
  #msg {
    max-width:640px; margin:4px auto; text-align:center; min-height:34px;
    background:#fff; border-radius:20px; border:3px solid #ffd166;
    padding:5px 14px; font-size:clamp(14px,3vw,19px); color:#e07a00; font-weight:bold;
  }
  .stage { display:flex; justify-content:center; align-items:flex-end; gap:2vw;
           max-width:820px; margin:6px auto; padding:0 6px; }
  .cat-card {
    flex:1 1 0; max-width:250px; text-align:center; cursor:pointer;
    background:rgba(255,255,255,.55); border:4px solid transparent;
    border-radius:22px; padding:6px 2px 4px; transition:border-color .2s, background .2s;
    position:relative;
  }
  .cat-card.selected { border-color:#ffb703; background:#fffbe6;
                       box-shadow:0 0 14px rgba(255,183,3,.55); }
  .cat-card .name { font-weight:bold; color:#555; font-size:clamp(13px,2.8vw,18px); }
  .cat-card .check { position:absolute; top:6px; right:10px; font-size:22px; }
  .cat-svg { width:100%; height:auto; display:block; }
  .cat-svg.dance { animation:dance .55s ease-in-out infinite; transform-origin:50% 92%; }
  @keyframes dance {
    0%   { transform:rotate(0deg)   translateY(0); }
    25%  { transform:rotate(-9deg)  translateY(-16px); }
    50%  { transform:rotate(0deg)   translateY(0); }
    75%  { transform:rotate(9deg)   translateY(-16px); }
    100% { transform:rotate(0deg)   translateY(0); }
  }
  .tail { animation:wag 2.2s ease-in-out infinite; transform-origin:15% 85%; }
  .dance .tail { animation:wag .4s ease-in-out infinite; }
  @keyframes wag { 0%,100%{ transform:rotate(0deg);} 50%{ transform:rotate(12deg);} }

  #panel { max-width:680px; margin:4px auto 20px; background:rgba(255,255,255,.85);
           border-radius:24px; padding:10px 12px; border:3px solid #a2d2ff; }
  .cat-row { display:flex; align-items:center; gap:8px; margin:7px 0; flex-wrap:wrap; }
  .cat-label { font-weight:bold; color:#6d6875; width:86px; font-size:clamp(13px,2.8vw,16px); }
  .items { display:flex; gap:8px; flex-wrap:wrap; }
  .item-btn {
    border:3px solid #cdeac0; background:#fff; border-radius:16px;
    padding:6px 10px; font-size:clamp(13px,3vw,17px); cursor:pointer;
    font-family:inherit; transition:transform .1s, border-color .15s, background .15s;
  }
  .item-btn:active { transform:scale(.92); }
  .item-btn.on { border-color:#ff7b54; background:#ffe8d6; font-weight:bold; }
  .controls { text-align:center; margin:10px 0 26px; }
  .big-btn {
    font-family:inherit; font-size:clamp(15px,3.4vw,21px); font-weight:bold;
    border:none; border-radius:999px; padding:12px 26px; margin:4px 6px;
    cursor:pointer; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.15);
    transition:transform .1s;
  }
  .big-btn:active { transform:translateY(3px); box-shadow:none; }
  #danceBtn { background:linear-gradient(135deg,#ff7b54,#ffb703); display:none; }
  #stopBtn  { background:#8ecae6; display:none; }
  #resetBtn { background:#b5b8c5; font-size:clamp(13px,2.8vw,16px); padding:9px 20px; }
  .heart, .note, .confetti { position:fixed; pointer-events:none; z-index:50; }
  .heart { font-size:26px; animation:floatUp 1.6s ease-out forwards; }
  .note  { font-size:30px; animation:floatUp 2.4s ease-out forwards; }
  @keyframes floatUp {
    0% { opacity:1; transform:translateY(0) rotate(0deg) scale(.7); }
    100%{ opacity:0; transform:translateY(-140px) rotate(30deg) scale(1.3); }
  }
  .confetti { top:-20px; width:12px; height:12px; border-radius:3px;
              animation:fall linear forwards; }
  @keyframes fall {
    0% { transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(720deg); opacity:.8; }
  }
  #banner {
    position:fixed; top:26%; left:50%; transform:translate(-50%,-50%) scale(0);
    background:#fff; border:5px solid #ffb703; border-radius:30px;
    padding:18px 30px; font-size:clamp(20px,5vw,34px); font-weight:bold; color:#ff7b54;
    z-index:60; text-align:center; transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  }
  #banner.show { transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>
<h1>🐱 ネコのお着替えゲーム 🐱</h1>
<p class="sub">ネコをえらんで、ぼうし・ふく・こものを ぜんぶ きせてあげてね！</p>
<div id="msg">どのネコから おきがえする？ ネコを タッチしてね🐾</div>

<div class="stage" id="stage"></div>

<div id="panel">
  <div class="cat-row">
    <span class="cat-label">👒 ぼうし</span>
    <span class="items" id="row-hat"></span>
  </div>
  <div class="cat-row">
    <span class="cat-label">👕 ふく</span>
    <span class="items" id="row-top"></span>
  </div>
  <div class="cat-row">
    <span class="cat-label">🎀 こもの</span>
    <span class="items" id="row-acc"></span>
  </div>
</div>

<div class="controls">
  <button class="big-btn" id="danceBtn">🎵 みんなで ダンス！ 🎵</button>
  <button class="big-btn" id="stopBtn">⏸ おんがくストップ</button>
  <button class="big-btn" id="resetBtn">🔄 さいしょから</button>
</div>

<div id="banner"></div>

<script>
'use strict';
/* ---------- データ ---------- */
const CATS = [
  { id:0, name:'ほたて', body:'#ffffff', stroke:'#c9b8a8', ear:'#ffc4d6', stripes:null },
  { id:1, name:'シャロ', body:'#f6a94a', stroke:'#c97b1e', ear:'#ffd9b3', stripes:'#d9821f' },
  { id:2, name:'ゆき',   body:'#9aa7b5', stroke:'#6b7683', ear:'#e3c1cf', stripes:null }
];
const ITEMS = {
  hat: [ ['straw','👒 むぎわら'], ['ribbon','🌸 りぼん'], ['crown','👑 おうかん'], ['cap','🧢 キャップ'] ],
  top: [ ['tshirt','👕 Tシャツ'], ['dress','👗 ワンピース'], ['sweater','🧶 セーター'], ['overall','👖 オーバーオール'] ],
  acc: [ ['glasses','👓 めがね'], ['scarf','🧣 スカーフ'], ['necklace','📿 ネックレス'], ['bowtie','🎀 ちょうネクタイ'] ]
};
const state = CATS.map(() => ({ hat:null, top:null, acc:null, done:false }));
let selected = 0;
let partyOn = false;

/* ---------- 服のSVGパーツ ---------- */
const HATS = {
  straw: `<ellipse cx="100" cy="46" rx="72" ry="15" fill="#f4d35e" stroke="#c9a227" stroke-width="3"/>
          <path d="M62,46 Q62,10 100,10 Q138,10 138,46 Z" fill="#f4d35e" stroke="#c9a227" stroke-width="3"/>
          <rect x="62" y="34" width="76" height="10" fill="#e63946" rx="4"/>`,
  ribbon:`<g transform="translate(100,28)">
          <path d="M0,0 L-30,-16 L-30,16 Z" fill="#ff5d8f" stroke="#d23369" stroke-width="2.5"/>
          <path d="M0,0 L30,-16 L30,16 Z" fill="#ff5d8f" stroke="#d23369" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="8" fill="#ffd166" stroke="#d23369" stroke-width="2.5"/></g>`,
  crown: `<path d="M64,50 L64,18 L82,36 L100,12 L118,36 L136,18 L136,50 Z"
            fill="#ffd700" stroke="#c9a227" stroke-width="3"/>
          <circle cx="64" cy="16" r="5" fill="#ff5d8f"/><circle cx="100" cy="10" r="5" fill="#4cc9f0"/>
          <circle cx="136" cy="16" r="5" fill="#ff5d8f"/>`,
  cap:   `<path d="M64,44 Q64,12 100,12 Q136,12 136,44 Z" fill="#3a86ff" stroke="#1d5fc4" stroke-width="3"/>
          <ellipse cx="145" cy="45" rx="26" ry="9" fill="#3a86ff" stroke="#1d5fc4" stroke-width="3"/>
          <circle cx="100" cy="12" r="6" fill="#ffd166" stroke="#1d5fc4" stroke-width="2"/>`
};
const TOPS = {
  tshirt: `<ellipse cx="48" cy="160" rx="16" ry="12" fill="#e63946" stroke="#b02633" stroke-width="3"/>
           <ellipse cx="152" cy="160" rx="16" ry="12" fill="#e63946" stroke="#b02633" stroke-width="3"/>
           <rect x="52" y="138" width="96" height="66" rx="20" fill="#e63946" stroke="#b02633" stroke-width="3"/>
           <path d="M100,158 L105,170 L118,170 L108,178 L112,191 L100,183 L88,191 L92,178 L82,170 L95,170 Z" fill="#ffd166"/>`,
  dress:  `<ellipse cx="48" cy="158" rx="15" ry="11" fill="#ff8fab" stroke="#d64f7c" stroke-width="3"/>
           <ellipse cx="152" cy="158" rx="15" ry="11" fill="#ff8fab" stroke="#d64f7c" stroke-width="3"/>
           <path d="M62,138 L138,138 L158,216 L42,216 Z" fill="#ff8fab" stroke="#d64f7c" stroke-width="3"/>
           <circle cx="85" cy="165" r="6" fill="#fff"/><circle cx="115" cy="180" r="6" fill="#fff"/>
           <circle cx="95" cy="200" r="6" fill="#fff"/><circle cx="120" cy="152" r="6" fill="#fff"/>`,
  sweater:`<ellipse cx="47" cy="162" rx="17" ry="13" fill="#57a773" stroke="#2e6e46" stroke-width="3"/>
           <ellipse cx="153" cy="162" rx="17" ry="13" fill="#57a773" stroke="#2e6e46" stroke-width="3"/>
           <rect x="52" y="136" width="96" height="72" rx="22" fill="#57a773" stroke="#2e6e46" stroke-width="3"/>
           <line x1="56" y1="158" x2="144" y2="158" stroke="#2e6e46" stroke-width="4"/>
           <line x1="54" y1="176" x2="146" y2="176" stroke="#2e6e46" stroke-width="4"/>
           <line x1="56" y1="194" x2="144" y2="194" stroke="#2e6e46" stroke-width="4"/>`,
  overall:`<line x1="72" y1="136" x2="72" y2="162" stroke="#1d5fc4" stroke-width="9" stroke-linecap="round"/>
           <line x1="128" y1="136" x2="128" y2="162" stroke="#1d5fc4" stroke-width="9" stroke-linecap="round"/>
           <rect x="60" y="158" width="80" height="58" rx="12" fill="#3a86ff" stroke="#1d5fc4" stroke-width="3"/>
           <rect x="82" y="172" width="36" height="26" rx="7" fill="#8ecae6" stroke="#1d5fc4" stroke-width="2.5"/>
           <circle cx="72" cy="164" r="4.5" fill="#ffd166"/><circle cx="128" cy="164" r="4.5" fill="#ffd166"/>`
};
const ACCS = {
  glasses: `<circle cx="79" cy="90" r="15" fill="rgba(160,220,255,.35)" stroke="#333" stroke-width="3.5"/>
            <circle cx="121" cy="90" r="15" fill="rgba(160,220,255,.35)" stroke="#333" stroke-width="3.5"/>
            <line x1="94" y1="90" x2="106" y2="90" stroke="#333" stroke-width="3.5"/>
            <line x1="64" y1="88" x2="52" y2="82" stroke="#333" stroke-width="3.5"/>
            <line x1="136" y1="88" x2="148" y2="82" stroke="#333" stroke-width="3.5"/>`,
  scarf:   `<rect x="60" y="126" width="80" height="16" rx="8" fill="#e63946" stroke="#b02633" stroke-width="2.5"/>
            <rect x="88" y="138" width="18" height="34" rx="7" fill="#e63946" stroke="#b02633" stroke-width="2.5"/>
            <line x1="90" y1="166" x2="90" y2="172" stroke="#b02633" stroke-width="2.5"/>
            <line x1="97" y1="166" x2="97" y2="172" stroke="#b02633" stroke-width="2.5"/>
            <line x1="104" y1="166" x2="104" y2="172" stroke="#b02633" stroke-width="2.5"/>`,
  necklace:`<path d="M68,132 Q100,158 132,132" fill="none" stroke="#c9a227" stroke-width="2.5"/>
            <circle cx="72" cy="135" r="5" fill="#fff" stroke="#c9a227" stroke-width="2"/>
            <circle cx="86" cy="142" r="5" fill="#ffd166" stroke="#c9a227" stroke-width="2"/>
            <circle cx="100" cy="146" r="6.5" fill="#ff8fab" stroke="#c9a227" stroke-width="2"/>
            <circle cx="114" cy="142" r="5" fill="#ffd166" stroke="#c9a227" stroke-width="2"/>
            <circle cx="128" cy="135" r="5" fill="#fff" stroke="#c9a227" stroke-width="2"/>`,
  bowtie:  `<g transform="translate(100,136)">
            <path d="M0,0 L-26,-13 L-26,13 Z" fill="#8338ec" stroke="#5d24b0" stroke-width="2.5"/>
            <path d="M0,0 L26,-13 L26,13 Z" fill="#8338ec" stroke="#5d24b0" stroke-width="2.5"/>
            <circle cx="0" cy="0" r="7" fill="#ffd166" stroke="#5d24b0" stroke-width="2.5"/></g>`
};

/* ---------- ネコの描画 ---------- */
function catSVG(cat) {
  const stripes = cat.stripes ? `
    <path d="M78,18 Q82,32 78,42" fill="none" stroke="${cat.stripes}" stroke-width="6" stroke-linecap="round"/>
    <path d="M100,14 Q102,30 100,40" fill="none" stroke="${cat.stripes}" stroke-width="6" stroke-linecap="round"/>
    <path d="M122,18 Q118,32 122,42" fill="none" stroke="${cat.stripes}" stroke-width="6" stroke-linecap="round"/>
    <path d="M55,180 Q70,186 60,200" fill="none" stroke="${cat.stripes}" stroke-width="6" stroke-linecap="round"/>
    <path d="M145,180 Q130,186 140,200" fill="none" stroke="${cat.stripes}" stroke-width="6" stroke-linecap="round"/>` : '';
  return `
  <svg class="cat-svg" viewBox="0 0 200 265" xmlns="http://www.w3.org/2000/svg">
    <g class="tail">
      <path d="M148,225 Q195,215 188,168 Q186,155 176,158 Q170,161 174,172 Q178,200 142,210 Z"
            fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    </g>
    <ellipse cx="100" cy="192" rx="54" ry="62" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    <ellipse cx="72" cy="248" rx="17" ry="10" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    <ellipse cx="128" cy="248" rx="17" ry="10" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    <g class="wear-top"></g>
    <path d="M56,62 L72,14 L94,50 Z" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    <path d="M144,62 L128,14 L106,50 Z" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    <path d="M64,54 L73,26 L86,48 Z" fill="${cat.ear}"/>
    <path d="M136,54 L127,26 L114,48 Z" fill="${cat.ear}"/>
    <circle cx="100" cy="93" r="52" fill="${cat.body}" stroke="${cat.stroke}" stroke-width="3"/>
    ${stripes}
    <circle cx="80" cy="88" r="6" fill="#333"/>
    <circle cx="120" cy="88" r="6" fill="#333"/>
    <circle cx="82" cy="86" r="2" fill="#fff"/>
    <circle cx="122" cy="86" r="2" fill="#fff"/>
    <path d="M94,104 L106,104 L100,112 Z" fill="#ff8fab" stroke="#d64f7c" stroke-width="2"/>
    <path d="M100,112 Q100,120 90,122 M100,112 Q100,120 110,122" fill="none" stroke="#88685a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="96" x2="24" y2="90" stroke="#b9a695" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="106" x2="26" y2="108" stroke="#b9a695" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="148" y1="96" x2="176" y2="90" stroke="#b9a695" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="148" y1="106" x2="174" y2="108" stroke="#b9a695" stroke-width="2.5" stroke-linecap="round"/>
    <g class="wear-acc"></g>
    <g class="wear-hat"></g>
  </svg>`;
}

const stage = document.getElementById('stage');
CATS.forEach(cat => {
  const card = document.createElement('div');
  card.className = 'cat-card' + (cat.id === 0 ? ' selected' : '');
  card.id = 'card' + cat.id;
  card.innerHTML = `<span class="check" id="check${cat.id}"></span>${catSVG(cat)}
                    <div class="name">${cat.name}</div>`;
  card.addEventListener('click', () => selectCat(cat.id));
  stage.appendChild(card);
});

/* ---------- 服ボタン ---------- */
Object.entries(ITEMS).forEach(([cat, list]) => {
  const row = document.getElementById('row-' + cat);
  list.forEach(([key, label]) => {
    const b = document.createElement('button');
    b.className = 'item-btn';
    b.dataset.slot = cat; b.dataset.key = key;
    b.textContent = label;
    b.addEventListener('click', () => wear(cat, key));
    row.appendChild(b);
  });
});

function selectCat(i) {
  selected = i;
  document.querySelectorAll('.cat-card').forEach((c, j) =>
    c.classList.toggle('selected', j === i));
  setMsg(`${CATS[i].name}を えらんだよ！ すきな ふくを タッチしてね`);
  refreshButtons();
}

function refreshButtons() {
  document.querySelectorAll('.item-btn').forEach(b => {
    b.classList.toggle('on', state[selected][b.dataset.slot] === b.dataset.key);
  });
}

function wear(slot, key) {
  const s = state[selected];
  s[slot] = (s[slot] === key) ? null : key;   // もう一度おすと ぬげる
  const svg = document.querySelector('#card' + selected + ' svg');
  const layer = svg.querySelector('.wear-' + (slot === 'hat' ? 'hat' : slot === 'top' ? 'top' : 'acc'));
  const src = slot === 'hat' ? HATS : slot === 'top' ? TOPS : ACCS;
  layer.innerHTML = s[slot] ? src[s[slot]] : '';
  pop();
  refreshButtons();
  checkDone();
}

function checkDone() {
  const s = state[selected];
  const wasDone = s.done;
  s.done = !!(s.hat && s.top && s.acc);
  document.getElementById('check' + selected).textContent = s.done ? '✅' : '';
  if (s.done && !wasDone) {
    setMsg(`わーい！ ${CATS[selected].name}、おきがえ かんぺき！💕`);
    jingle();
    soloDance(selected);
    burstHearts(selected);
  }
  const allDone = state.every(s => s.done);
  document.getElementById('danceBtn').style.display = allDone && !partyOn ? 'inline-block' : 'none';
  if (allDone && !partyOn) {
    setMsg('みんな おきがえできたね！「みんなでダンス！」を おしてね🎵');
  }
}

function soloDance(i) {
  if (partyOn) return;
  const svg = document.querySelector('#card' + i + ' svg');
  svg.classList.add('dance');
  setTimeout(() => { if (!partyOn) svg.classList.remove('dance'); }, 2600);
}

/* ---------- パーティー ---------- */
let confettiTimer = null, noteTimer = null;
document.getElementById('danceBtn').addEventListener('click', startParty);
document.getElementById('stopBtn').addEventListener('click', stopParty);
document.getElementById('resetBtn').addEventListener('click', resetAll);

function startParty() {
  partyOn = true;
  document.getElementById('danceBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  document.querySelectorAll('.cat-svg').forEach(s => s.classList.add('dance'));
  setMsg('🎶 みんなで たのしく ダンスタイム！ 🎶');
  showBanner('🎉 おきがえ だいせいこう！ 🎉');
  startMusic();
  confettiTimer = setInterval(dropConfetti, 180);
  noteTimer = setInterval(floatNote, 500);
}

function stopParty() {
  partyOn = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('danceBtn').style.display = 'inline-block';
  document.querySelectorAll('.cat-svg').forEach(s => s.classList.remove('dance'));
  stopMusic();
  clearInterval(confettiTimer); clearInterval(noteTimer);
  setMsg('また おどりたくなったら ボタンを おしてね🐱');
}

function resetAll() {
  stopParty();
  document.getElementById('danceBtn').style.display = 'none';
  state.forEach(s => { s.hat = s.top = s.acc = null; s.done = false; });
  document.querySelectorAll('.wear-hat,.wear-top,.wear-acc').forEach(g => g.innerHTML = '');
  document.querySelectorAll('.check').forEach(c => c.textContent = '');
  selectCat(0);
  setMsg('さいしょから おきがえしよう！ ネコを タッチしてね🐾');
}

function setMsg(t) { document.getElementById('msg').textContent = t; }

function showBanner(t) {
  const b = document.getElementById('banner');
  b.textContent = t; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3200);
}

/* ---------- エフェクト ---------- */
function burstHearts(i) {
  const r = document.getElementById('card' + i).getBoundingClientRect();
  for (let k = 0; k < 6; k++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'heart'; h.textContent = ['💗','💛','💖','✨'][k % 4];
      h.style.left = (r.left + r.width * (0.2 + Math.random() * 0.6)) + 'px';
      h.style.top = (r.top + r.height * 0.4) + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1700);
    }, k * 150);
  }
}
function dropConfetti() {
  const c = document.createElement('div');
  c.className = 'confetti';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.background = ['#ff5d8f','#ffd166','#4cc9f0','#57a773','#8338ec','#ff7b54'][Math.floor(Math.random() * 6)];
  c.style.animationDuration = (2.2 + Math.random() * 2) + 's';
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 4500);
}
function floatNote() {
  const n = document.createElement('div');
  n.className = 'note'; n.textContent = Math.random() < 0.5 ? '🎵' : '🎶';
  n.style.left = (10 + Math.random() * 80) + 'vw';
  n.style.top = (30 + Math.random() * 40) + 'vh';
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2500);
}

/* ---------- 音楽 (Web Audio) ---------- */
let ctx = null, musicOn = false, loopTimer = null;
function audio() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}
const F = { C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
            C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
            C6:1046.5, C3:130.81, G3:196.00, F3:174.61, A3:220.00 };
function tone(freq, t0, dur, type, vol) {
  const a = audio();
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(a.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
function pop() {
  const a = audio(), t = a.currentTime;
  tone(F.C5, t, 0.09, 'triangle', 0.25);
  tone(F.E5, t + 0.06, 0.12, 'triangle', 0.22);
}
function jingle() {
  const a = audio(), t = a.currentTime;
  [[F.C5,0],[F.E5,.13],[F.G5,.26],[F.C6,.39]].forEach(([f,d]) =>
    tone(f, t + d, 0.28, 'triangle', 0.3));
  tone(F.E5, t + 0.6, 0.4, 'triangle', 0.25);
  tone(F.G5, t + 0.6, 0.4, 'triangle', 0.25);
  tone(F.C6, t + 0.6, 0.5, 'triangle', 0.25);
}
/* たのしいオリジナルダンスきょく（4しょうせつループ・140bpm）*/
const BEAT = 60 / 140;
const MELODY = [
  ['E5',.5],['G5',.5],['A5',.5],['G5',.5],['E5',.5],['G5',.5],['A5',1],
  ['C6',.5],['B5',.5],['A5',.5],['G5',.5],['E5',.5],['D5',.5],['E5',1],
  ['C5',.5],['E5',.5],['G5',.5],['E5',.5],['A5',.5],['G5',.5],['E5',1],
  ['D5',.5],['E5',.5],['F5',.5],['E5',.5],['D5',.5],['B4',.5],['C5',1]
];
const BASS = ['C3','G3','A3','G3','F3','G3','C3','G3','C3','G3','A3','G3','F3','G3','C3','C3'];
function playBar(startTime) {
  let t = startTime;
  MELODY.forEach(([n, beats]) => {
    tone(F[n], t, beats * BEAT * 0.9, 'square', 0.12);
    tone(F[n] / 2, t, beats * BEAT * 0.9, 'triangle', 0.10);
    t += beats * BEAT;
  });
  BASS.forEach((n, i) => {
    tone(F[n], startTime + i * BEAT, BEAT * 0.55, 'triangle', 0.16);
  });
  return 16 * BEAT;
}
function startMusic() {
  musicOn = true;
  const a = audio();
  const loop = () => {
    if (!musicOn) return;
    const len = playBar(a.currentTime + 0.06);
    loopTimer = setTimeout(loop, (len - 0.15) * 1000);
  };
  loop();
}
function stopMusic() { musicOn = false; clearTimeout(loopTimer); }

selectCat(0);
