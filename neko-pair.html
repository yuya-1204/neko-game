<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ネコの めくって ペア</title>
<!-- v1.0 -->
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic UI',system-ui,sans-serif;
  background:linear-gradient(#f3e6ff,#fdf6e8);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
header{
  position:sticky;top:0;z-index:50;
  min-height:52px;display:flex;align-items:center;gap:6px;padding:6px 8px;flex-wrap:wrap;
  background:linear-gradient(#b06adf,#9a55c8);box-shadow:0 2px 6px #0002;
}
header h1{font-size:15px;color:#fff;text-shadow:0 1px 2px #0004;flex:1;white-space:nowrap}
.hudbtn{
  border:none;border-radius:14px;background:#fff;color:#8a3ab8;font-weight:700;
  font-size:13px;padding:7px 10px;box-shadow:0 2px 0 #7a3aa0;cursor:pointer;font-family:inherit;
}
.hudbtn:active{transform:translateY(2px);box-shadow:none}
#info{color:#fff;font-weight:800;font-size:13px;background:#0002;border-radius:12px;padding:6px 10px;white-space:nowrap}
#turnBar{
  max-width:560px;margin:8px auto 0;display:none;gap:8px;padding:0 10px;
}
#turnBar.show{display:flex}
.pbox{
  flex:1;background:#ffffffb8;border:3px solid transparent;border-radius:14px;padding:6px 10px;
  display:flex;align-items:center;gap:8px;transition:all .2s;
}
.pbox svg{width:36px;height:36px;flex-shrink:0}
.pbox .pname{font-size:13px;font-weight:800;color:#5a4632}
.pbox .pscore{font-size:20px;font-weight:900;color:#8a3ab8;margin-left:auto}
.pbox.active{border-color:#ffb400;background:#fff8dc;box-shadow:0 2px 8px #ffb40055}
#board{
  display:grid;gap:7px;max-width:560px;margin:10px auto;padding:0 10px 30px;
}
.card{aspect-ratio:4/3;perspective:600px;cursor:pointer}
.cardInner{
  position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .35s;
}
.card.open .cardInner{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:10px;overflow:hidden;box-shadow:0 2px 6px #0003;
}
.face.back{
  background:linear-gradient(135deg,#c98bef,#9a55c8);
  display:flex;align-items:center;justify-content:center;border:3px solid #fff;
}
.face.back svg{width:60%;height:60%;opacity:.9}
.face.front{transform:rotateY(180deg);background:#fff;border:3px solid #e8d5f5}
.face.front svg{width:100%;height:100%;display:block}
.card.done{cursor:default}
.card.done .face.front{border-color:#7bc258;box-shadow:0 0 0 3px #7bc25888}
.card.done.p1 .face.front{border-color:#f5a04a;box-shadow:0 0 0 3px #f5a04a88}
.card.done.p2 .face.front{border-color:#9aa5b5;box-shadow:0 0 0 3px #9aa5b588}
.card.done .cardInner{animation:pop .4s}
@keyframes pop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.09)}100%{transform:rotateY(180deg) scale(1)}}
.overlay{
  position:fixed;inset:0;background:rgba(40,30,60,.55);z-index:100;display:none;
  align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px 8px 30px;
}
.overlay.show{display:flex}
#selectCard{background:#faf2ff;border-radius:18px;max-width:560px;width:100%;padding:14px 12px 20px;box-shadow:0 8px 30px #0006}
#selectCard h2{color:#8a3ab8;font-size:18px;text-align:center;margin:4px 0 2px}
#selectCard p.sub{color:#9a7ab5;font-size:12px;text-align:center;margin-bottom:10px}
#selectCard h3{color:#8a3ab8;font-size:15px;margin:12px 4px 6px}
.lvlRow{display:flex;gap:8px;flex-wrap:wrap}
.lvlBtn{
  flex:1;min-width:96px;border:3px solid #e8d5f5;border-radius:14px;background:#fff;cursor:pointer;
  padding:10px 6px;text-align:center;font-family:inherit;box-shadow:0 2px 5px #0002;
}
.lvlBtn:active{transform:scale(.96)}
.lvlBtn .ln{font-size:15px;font-weight:900;color:#5a4632}
.lvlBtn .ld{font-size:11px;color:#9a7ab5}
.lvlBtn .ls{font-size:13px;min-height:18px}
#winOverlay{z-index:120;align-items:center}
#winCard{background:#fffdf5;border-radius:22px;padding:24px 22px;text-align:center;box-shadow:0 10px 40px #0007;max-width:360px;width:92%}
#winCard .big{font-size:29px;font-weight:900;color:#9a55c8;text-shadow:0 2px 0 #e8d5f5}
#winStars{font-size:34px;letter-spacing:4px;margin:6px 0;min-height:40px}
#winCatBox{margin:4px auto}
#winInfo{color:#8a6a45;font-weight:700;margin-bottom:10px;font-size:14px;white-space:pre-line}
#winCard button{display:block;width:100%;margin-top:9px;border:none;border-radius:14px;padding:12px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer}
#btnAgain{background:#9a55c8;color:#fff;box-shadow:0 3px 0 #7a3aa0}
#btnChoose{background:#f0e2fa;color:#8a3ab8;box-shadow:0 3px 0 #d0b0e8}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:130}
#toast{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);background:#333c;color:#fff;
  font-size:13px;font-weight:700;padding:8px 16px;border-radius:20px;z-index:140;display:none;white-space:nowrap;
}
</style>
</head>
<body>
<header>
  <h1>🃏 ネコの めくって ペア</h1>
  <div id="info">--</div>
  <button class="hudbtn" id="btnSelect">🎮 えらぶ</button>
</header>
<div id="turnBar">
  <div class="pbox" id="pbox1"><span id="pcat1"></span><span class="pname">ちゃとら</span><span class="pscore" id="score1">0</span></div>
  <div class="pbox" id="pbox2"><span id="pcat2"></span><span class="pname">はいいろ</span><span class="pscore" id="score2">0</span></div>
</div>
<div id="board"></div>

<div class="overlay" id="selectOverlay">
  <div id="selectCard">
    <h2>🃏 どうやって あそぶ？</h2>
    <p class="sub">おなじ えの カードを 2まい みつけよう！</p>
    <h3>🐱 ひとりで あそぶ</h3>
    <div class="lvlRow" id="soloRow"></div>
    <h3>🐱🐱 ふたりで あそぶ（こうたいで めくってね）</h3>
    <div class="lvlRow" id="duoRow"></div>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div id="winCard">
    <div class="big" id="winTitle">できた！！</div>
    <div id="winStars"></div>
    <div id="winCatBox"></div>
    <div id="winInfo"></div>
    <button id="btnAgain">もういちど</button>
    <button id="btnChoose">えらぶ に もどる</button>
  </div>
</div>
<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
"use strict";
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const r2=v=>Math.round(v*100)/100;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));


/* ================= 絵を描くためのパーツ ================= */
function catFace(cx,cy,r,fur,opts){
  const o=Object.assign({earIn:'#ffb6c9',line:'#3a2a20',stripes:null,blush:'#ffb0a0',closed:false},opts||{});
  let s='';
  s+=`<path d="M${r2(cx-r*0.9)},${r2(cy-r*0.35)} L${r2(cx-r*1.02)},${r2(cy-r*1.45)} L${r2(cx-r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx+r*0.9)},${r2(cy-r*0.35)} L${r2(cx+r*1.02)},${r2(cy-r*1.45)} L${r2(cx+r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx-r*0.76)},${r2(cy-r*0.55)} L${r2(cx-r*0.85)},${r2(cy-r*1.18)} L${r2(cx-r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<path d="M${r2(cx+r*0.76)},${r2(cy-r*0.55)} L${r2(cx+r*0.85)},${r2(cy-r*1.18)} L${r2(cx+r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<ellipse cx="${r2(cx)}" cy="${r2(cy)}" rx="${r2(r)}" ry="${r2(r*0.9)}" fill="${fur}"/>`;
  if(o.stripes){
    s+=`<path d="M${r2(cx-r*0.12)},${r2(cy-r*0.9)} q${r2(r*0.1)},${r2(r*0.2)} 0,${r2(r*0.34)}" stroke="${o.stripes}" stroke-width="${r2(r*0.12)}" fill="none" stroke-linecap="round"/>`;
    s+=`<path d="M${r2(cx-r*0.42)},${r2(cy-r*0.82)} q${r2(r*0.08)},${r2(r*0.16)} 0,${r2(r*0.26)}" stroke="${o.stripes}" stroke-width="${r2(r*0.1)}" fill="none" stroke-linecap="round"/>`;
    s+=`<path d="M${r2(cx+r*0.24)},${r2(cy-r*0.86)} q${r2(r*0.08)},${r2(r*0.16)} 0,${r2(r*0.26)}" stroke="${o.stripes}" stroke-width="${r2(r*0.1)}" fill="none" stroke-linecap="round"/>`;
  }
  const ey=cy-r*0.08,ex=r*0.42;
  if(o.closed){
    s+=`<path d="M${r2(cx-ex-r*0.13)},${r2(ey)} q${r2(r*0.13)},${r2(r*0.14)} ${r2(r*0.26)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.06))}" fill="none" stroke-linecap="round"/>`;
    s+=`<path d="M${r2(cx+ex-r*0.13)},${r2(ey)} q${r2(r*0.13)},${r2(r*0.14)} ${r2(r*0.26)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.06))}" fill="none" stroke-linecap="round"/>`;
  }else{
    s+=`<ellipse cx="${r2(cx-ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
    s+=`<ellipse cx="${r2(cx+ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
    s+=`<circle cx="${r2(cx-ex+r*0.045)}" cy="${r2(ey-r*0.06)}" r="${r2(r*0.045)}" fill="#fff"/>`;
    s+=`<circle cx="${r2(cx+ex+r*0.045)}" cy="${r2(ey-r*0.06)}" r="${r2(r*0.045)}" fill="#fff"/>`;
  }
  s+=`<path d="M${r2(cx-r*0.09)},${r2(cy+r*0.2)} h${r2(r*0.18)} l${r2(-r*0.09)},${r2(r*0.13)} Z" fill="#e8768a"/>`;
  s+=`<path d="M${r2(cx)},${r2(cy+r*0.33)} q${r2(-r*0.12)},${r2(r*0.17)} ${r2(-r*0.28)},${r2(r*0.05)} M${r2(cx)},${r2(cy+r*0.33)} q${r2(r*0.12)},${r2(r*0.17)} ${r2(r*0.28)},${r2(r*0.05)}" stroke="${o.line}" stroke-width="${r2(Math.max(1.5,r*0.05))}" fill="none" stroke-linecap="round"/>`;
  s+=`<ellipse cx="${r2(cx-r*0.6)}" cy="${r2(cy+r*0.3)}" rx="${r2(r*0.16)}" ry="${r2(r*0.09)}" fill="${o.blush}" opacity="0.65"/>`;
  s+=`<ellipse cx="${r2(cx+r*0.6)}" cy="${r2(cy+r*0.3)}" rx="${r2(r*0.16)}" ry="${r2(r*0.09)}" fill="${o.blush}" opacity="0.65"/>`;
  const ww=Math.max(1.4,r*0.045);
  s+=`<g stroke="${o.line}" stroke-width="${r2(ww)}" stroke-linecap="round" opacity="0.75">`;
  s+=`<line x1="${r2(cx-r*0.95)}" y1="${r2(cy+r*0.1)}" x2="${r2(cx-r*1.5)}" y2="${r2(cy)}"/>`;
  s+=`<line x1="${r2(cx-r*0.95)}" y1="${r2(cy+r*0.28)}" x2="${r2(cx-r*1.5)}" y2="${r2(cy+r*0.3)}"/>`;
  s+=`<line x1="${r2(cx+r*0.95)}" y1="${r2(cy+r*0.1)}" x2="${r2(cx+r*1.5)}" y2="${r2(cy)}"/>`;
  s+=`<line x1="${r2(cx+r*0.95)}" y1="${r2(cy+r*0.28)}" x2="${r2(cx+r*1.5)}" y2="${r2(cy+r*0.3)}"/>`;
  s+=`</g>`;
  return s;
}
function sitCat(x,y,s,fur,opts){
  const o=Object.assign({stripes:null,tailUp:true},opts||{});
  let str='';
  if(o.tailUp){
    str+=`<path d="M${r2(x+s*0.45)},${r2(y-s*0.2)} C${r2(x+s*1.1)},${r2(y-s*0.1)} ${r2(x+s*1.28)},${r2(y-s*0.8)} ${r2(x+s*0.85)},${r2(y-s*1.02)}" stroke="${fur}" stroke-width="${r2(s*0.22)}" fill="none" stroke-linecap="round"/>`;
  }else{
    str+=`<path d="M${r2(x+s*0.45)},${r2(y-s*0.15)} C${r2(x+s*1.15)},${r2(y-s*0.05)} ${r2(x+s*1.35)},${r2(y-s*0.35)} ${r2(x+s*1.15)},${r2(y-s*0.05)}" stroke="${fur}" stroke-width="${r2(s*0.2)}" fill="none" stroke-linecap="round"/>`;
  }
  str+=`<path d="M${r2(x-s*0.6)},${r2(y)} C${r2(x-s*0.75)},${r2(y-s*1.15)} ${r2(x+s*0.75)},${r2(y-s*1.15)} ${r2(x+s*0.6)},${r2(y)} Z" fill="${fur}"/>`;
  if(o.belly){str+=`<path d="M${r2(x-s*0.3)},${r2(y)} C${r2(x-s*0.35)},${r2(y-s*0.6)} ${r2(x+s*0.35)},${r2(y-s*0.6)} ${r2(x+s*0.3)},${r2(y)} Z" fill="${o.belly}"/>`;}
  if(o.stripes){
    str+=`<path d="M${r2(x-s*0.52)},${r2(y-s*0.55)} q${r2(s*0.15)},${r2(s*0.1)} ${r2(s*0.3)},${r2(s*0.05)}" stroke="${o.stripes}" stroke-width="${r2(s*0.09)}" fill="none" stroke-linecap="round"/>`;
    str+=`<path d="M${r2(x+s*0.25)},${r2(y-s*0.6)} q${r2(s*0.15)},${r2(s*0.08)} ${r2(s*0.3)},${r2(s*0.02)}" stroke="${o.stripes}" stroke-width="${r2(s*0.09)}" fill="none" stroke-linecap="round"/>`;
  }
  str+=`<ellipse cx="${r2(x-s*0.28)}" cy="${r2(y-s*0.04)}" rx="${r2(s*0.18)}" ry="${r2(s*0.11)}" fill="${fur}" stroke="#00000018" stroke-width="1"/>`;
  str+=`<ellipse cx="${r2(x+s*0.28)}" cy="${r2(y-s*0.04)}" rx="${r2(s*0.18)}" ry="${r2(s*0.11)}" fill="${fur}" stroke="#00000018" stroke-width="1"/>`;
  str+=catFace(x,y-s*1.25,s*0.5,fur,o);
  return str;
}
function cloud(x,y,s,fill,op){
  fill=fill||'#ffffff';op=op==null?1:op;
  return `<g fill="${fill}" opacity="${op}">`+
    `<ellipse cx="${r2(x)}" cy="${r2(y)}" rx="${r2(s*1.1)}" ry="${r2(s*0.55)}"/>`+
    `<ellipse cx="${r2(x-s*0.7)}" cy="${r2(y+s*0.12)}" rx="${r2(s*0.6)}" ry="${r2(s*0.4)}"/>`+
    `<ellipse cx="${r2(x+s*0.7)}" cy="${r2(y+s*0.1)}" rx="${r2(s*0.65)}" ry="${r2(s*0.42)}"/>`+
    `<ellipse cx="${r2(x+s*0.1)}" cy="${r2(y-s*0.35)}" rx="${r2(s*0.62)}" ry="${r2(s*0.45)}"/></g>`;
}
function star5(x,y,r,fill,op){
  let p='';
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5, rr=i%2===0?r:r*0.45;
    p+=`${r2(x+Math.cos(a)*rr)},${r2(y+Math.sin(a)*rr)} `;
  }
  return `<polygon points="${p}" fill="${fill}" opacity="${op==null?1:op}"/>`;
}
function flower(x,y,s,c1,c2){
  let str=`<g>`;
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2;
    str+=`<circle cx="${r2(x+Math.cos(a)*s*0.55)}" cy="${r2(y+Math.sin(a)*s*0.55)}" r="${r2(s*0.42)}" fill="${c1}"/>`;
  }
  str+=`<circle cx="${r2(x)}" cy="${r2(y)}" r="${r2(s*0.36)}" fill="${c2}"/></g>`;
  return str;
}
function pine(x,y,s,c){
  c=c||'#2e7d4f';
  return `<rect x="${r2(x-s*0.09)}" y="${r2(y-s*0.18)}" width="${r2(s*0.18)}" height="${r2(s*0.22)}" fill="#7a5230"/>`+
   `<polygon points="${r2(x)},${r2(y-s*1.5)} ${r2(x-s*0.42)},${r2(y-s*0.85)} ${r2(x+s*0.42)},${r2(y-s*0.85)}" fill="${c}"/>`+
   `<polygon points="${r2(x)},${r2(y-s*1.15)} ${r2(x-s*0.55)},${r2(y-s*0.45)} ${r2(x+s*0.55)},${r2(y-s*0.45)}" fill="${c}"/>`+
   `<polygon points="${r2(x)},${r2(y-s*0.8)} ${r2(x-s*0.68)},${r2(y-s*0.05)} ${r2(x+s*0.68)},${r2(y-s*0.05)}" fill="${c}"/>`;
}
function butterfly(x,y,s,c1,c2){
  return `<g>`+
   `<ellipse cx="${r2(x-s*0.5)}" cy="${r2(y-s*0.35)}" rx="${r2(s*0.5)}" ry="${r2(s*0.38)}" fill="${c1}" transform="rotate(-20 ${r2(x-s*0.5)} ${r2(y-s*0.35)})"/>`+
   `<ellipse cx="${r2(x+s*0.5)}" cy="${r2(y-s*0.35)}" rx="${r2(s*0.5)}" ry="${r2(s*0.38)}" fill="${c1}" transform="rotate(20 ${r2(x+s*0.5)} ${r2(y-s*0.35)})"/>`+
   `<ellipse cx="${r2(x-s*0.4)}" cy="${r2(y+s*0.18)}" rx="${r2(s*0.32)}" ry="${r2(s*0.26)}" fill="${c2}"/>`+
   `<ellipse cx="${r2(x+s*0.4)}" cy="${r2(y+s*0.18)}" rx="${r2(s*0.32)}" ry="${r2(s*0.26)}" fill="${c2}"/>`+
   `<ellipse cx="${r2(x)}" cy="${r2(y)}" rx="${r2(s*0.1)}" ry="${r2(s*0.42)}" fill="#5a4632"/>`+
   `<path d="M${r2(x-s*0.05)},${r2(y-s*0.4)} q${r2(-s*0.15)},${r2(-s*0.25)} ${r2(-s*0.25)},${r2(-s*0.3)} M${r2(x+s*0.05)},${r2(y-s*0.4)} q${r2(s*0.15)},${r2(-s*0.25)} ${r2(s*0.25)},${r2(-s*0.3)}" stroke="#5a4632" stroke-width="${r2(Math.max(1.2,s*0.05))}" fill="none"/></g>`;
}
function house(x,y,s,wall,roof){
  return `<rect x="${r2(x-s*0.7)}" y="${r2(y-s*0.9)}" width="${r2(s*1.4)}" height="${r2(s*0.9)}" fill="${wall}"/>`+
   `<polygon points="${r2(x-s*0.85)},${r2(y-s*0.9)} ${r2(x)},${r2(y-s*1.5)} ${r2(x+s*0.85)},${r2(y-s*0.9)}" fill="${roof}"/>`+
   `<rect x="${r2(x-s*0.42)}" y="${r2(y-s*0.62)}" width="${r2(s*0.3)}" height="${r2(s*0.3)}" fill="#ffe89a" stroke="#00000022"/>`+
   `<rect x="${r2(x+s*0.12)}" y="${r2(y-s*0.62)}" width="${r2(s*0.3)}" height="${r2(s*0.3)}" fill="#ffe89a" stroke="#00000022"/>`;
}
/* ================= 12まいの 絵 ================= */
/* 1: ふうせんと こねこ */
function p1(){
  let s=`<defs><linearGradient id="p1sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7fc4f8"/><stop offset="1" stop-color="#dff3ff"/></linearGradient></defs>`;
  s+=`<rect width="800" height="600" fill="url(#p1sky)"/>`;
  s+=`<circle cx="105" cy="95" r="52" fill="#ffd54d"/>`;
  for(let i=0;i<8;i++){const a=i*Math.PI/4;s+=`<line x1="${r2(105+Math.cos(a)*66)}" y1="${r2(95+Math.sin(a)*66)}" x2="${r2(105+Math.cos(a)*88)}" y2="${r2(95+Math.sin(a)*88)}" stroke="#ffd54d" stroke-width="8" stroke-linecap="round"/>`;}

/* --- サウンド --- */
let AC=null;
function initAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();
}
function tone(freq,start,dur,type,vol){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,AC.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.18,AC.currentTime+start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+start+dur);
  o.connect(g);g.connect(AC.destination);
  o.start(AC.currentTime+start);o.stop(AC.currentTime+start+dur+0.05);
}
function flipSound(){tone(520,0,0.06,'sine',0.1);}
function matchSound(){tone(660,0,0.09,'sine',0.2);tone(990,0.06,0.12,'sine',0.16);}
function missSound(){tone(300,0,0.12,'sine',0.08);tone(240,0.1,0.14,'sine',0.08);}
function fanfare(){[523,659,784,1047,1319].forEach((f,i)=>{tone(f,i*0.13,0.3,'triangle',0.15);});tone(1568,0.7,0.5,'triangle',0.12);}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function startGame(m,li){
  mode=m;lvIdx=li;
  openCards=[];lock=false;turns=0;matched=0;player=1;scores=[0,0];
  $('selectOverlay').classList.remove('show');
  $('winOverlay').classList.remove('show');
  const lv=LEVELS[li];
  const picks=shuffle(PICTURES.map((_,i)=>i)).slice(0,lv.pairs);
  const deck=shuffle([...picks,...picks]);
  const board=$('board');
  board.style.gridTemplateColumns=`repeat(${lv.cols},1fr)`;
  board.innerHTML='';
  deck.forEach(pi=>{
    const c=document.createElement('div');
    c.className='card';
    c.dataset.pic=pi;
    c.innerHTML=`<div class="cardInner"><div class="face back">${pawSVG()}</div><div class="face front"><svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">${PICTURES[pi].draw()}</svg></div></div>`;
    c.addEventListener('click',()=>{initAudio();onFlip(c);});
    board.appendChild(c);
  });
  $('turnBar').classList.toggle('show',mode==='duo');
  if(mode==='duo'){
    $('pcat1').innerHTML=catAvatar('#f5a04a');
    $('pcat2').innerHTML=catAvatar('#9aa5b5');
    updateDuo();
  }
  updateInfo();
  window.scrollTo(0,0);
}
function onFlip(c){
  if(lock||c.classList.contains('open')||c.classList.contains('done'))return;
  c.classList.add('open');
  flipSound();
  openCards.push(c);
  if(openCards.length===2){
    lock=true;turns++;
    const [a,b]=openCards;
    if(a.dataset.pic===b.dataset.pic){
      setTimeout(()=>{
        a.classList.add('done');b.classList.add('done');
        if(mode==='duo'){
          a.classList.add('p'+player);b.classList.add('p'+player);
          scores[player-1]++;
          updateDuo();
        }
        matchSound();
        matched++;
        openCards=[];lock=false;
        updateInfo();
        if(matched>=LEVELS[lvIdx].pairs)setTimeout(win,600);
      },420);
    }else{
      setTimeout(()=>{
        a.classList.remove('open');b.classList.remove('open');
        missSound();
        if(mode==='duo'){player=player===1?2:1;updateDuo();}
        openCards=[];lock=false;
        updateInfo();
      },950);
    }
  }
}
function updateInfo(){
  const lv=LEVELS[lvIdx];
  if(mode==='solo')$('info').textContent=`のこり ${lv.pairs-matched}ペア / めくった ${turns}回`;
  else $('info').textContent=`のこり ${lv.pairs-matched}ペア`;
}
function updateDuo(){
  $('score1').textContent=scores[0];
  $('score2').textContent=scores[1];
  $('pbox1').classList.toggle('active',player===1);
  $('pbox2').classList.toggle('active',player===2);
}
function soloStars(){
  const p=LEVELS[lvIdx].pairs;
  if(turns<=Math.ceil(p*2.2))return 3;
  if(turns<=Math.ceil(p*3.2))return 2;
  return 1;
}
function win(){
  fanfare();confettiBurst();
  if(mode==='solo'){
    const st=soloStars();
    const key='s'+lvIdx;
    prog[key]=Math.max(prog[key]||0,st);
    saveProg(prog);
    $('winTitle').textContent='ぜんぶ そろった！';
    $('winStars').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
    $('winCatBox').innerHTML=`<svg viewBox="0 0 200 110" style="width:160px">${catFace(100,60,38,'#f5a04a',{})}</svg>`;
    $('winInfo').textContent='「'+LEVELS[lvIdx].name+'」('+LEVELS[lvIdx].pairs+'ペア) クリア！\nめくった かいすう: '+turns+'回';
  }else{
    let t,box;
    if(scores[0]>scores[1]){t='ちゃとらの かち！';box=catAvatar('#f5a04a');}
    else if(scores[1]>scores[0]){t='はいいろの かち！';box=catAvatar('#9aa5b5');}
    else{t='ひきわけ！';box=catAvatar('#f5a04a')+catAvatar('#9aa5b5');}
    $('winTitle').textContent=t;
    $('winStars').textContent='';
    $('winCatBox').innerHTML='<div style="display:flex;justify-content:center">'+box.replace(/<svg /g,'<svg style="width:110px" ')+'</div>';
    $('winInfo').textContent='ちゃとら '+scores[0]+'ペア ／ はいいろ '+scores[1]+'ペア';
  }
  buildSelect();
  $('winOverlay').classList.add('show');
}
function confettiBurst(){
  const cv=$('confetti');
  cv.width=innerWidth;cv.height=innerHeight;
  const g=cv.getContext('2d');
  const cols=['#ff5f6d','#ffb347','#ffe74d','#7bc258','#5fa8ff','#c78bff','#ff90b3'];
  const ps=[];
  for(let i=0;i<130;i++){
    ps.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.5,vx:(Math.random()-0.5)*2.4,vy:2+Math.random()*3.4,r:4+Math.random()*6,c:cols[i%cols.length],a:Math.random()*Math.PI,va:(Math.random()-0.5)*0.25});
  }
  const t0=performance.now();
  function step(now){
    g.clearRect(0,0,cv.width,cv.height);
    for(const p of ps){
      p.x+=p.vx;p.y+=p.vy;p.a+=p.va;
      g.save();g.translate(p.x,p.y);g.rotate(p.a);
      g.fillStyle=p.c;g.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2);
      g.restore();
    }
    if(now-t0<3800)requestAnimationFrame(step);
    else g.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(step);
}
function buildSelect(){
  const solo=$('soloRow'),duo=$('duoRow');
  solo.innerHTML='';duo.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const st=prog['s'+i]?'⭐'.repeat(prog['s'+i]):'';
    const b=document.createElement('button');
    b.className='lvlBtn';
    b.innerHTML=`<div class="ln">${lv.name}</div><div class="ld">${lv.pairs}ペア（${lv.pairs*2}まい）</div><div class="ls">${st}</div>`;
    b.addEventListener('click',()=>startGame('solo',i));
    solo.appendChild(b);
    const d=document.createElement('button');
    d.className='lvlBtn';
    d.innerHTML=`<div class="ln">${lv.name}</div><div class="ld">${lv.pairs}ペア（${lv.pairs*2}まい）</div><div class="ls"></div>`;
    d.addEventListener('click',()=>startGame('duo',i));
    duo.appendChild(d);
  });
}
$('btnSelect').addEventListener('click',()=>{buildSelect();$('selectOverlay').classList.add('show');});
$('selectOverlay').addEventListener('click',ev=>{if(ev.target===$('selectOverlay'))$('selectOverlay').classList.remove('show');});
$('btnAgain').addEventListener('click',()=>startGame(mode,lvIdx));
$('btnChoose').addEventListener('click',()=>{$('winOverlay').classList.remove('show');buildSelect();$('selectOverlay').classList.add('show');});
/* --- はじまり --- */
buildSelect();
startGame('solo',0);
$('selectOverlay').classList.add('show');
</script>
</body>
