<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ネコと ピアノの れんしゅう</title>
<!-- v1.0 -->
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic UI',system-ui,sans-serif;
  background:linear-gradient(#e8e0ff,#fdf6e8);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
header{
  position:sticky;top:0;z-index:50;
  min-height:50px;display:flex;align-items:center;gap:6px;padding:6px 8px;flex-wrap:wrap;
  background:linear-gradient(#8a7ae0,#7060c8);box-shadow:0 2px 6px #0002;
}
header h1{font-size:15px;color:#fff;text-shadow:0 1px 2px #0004;flex:1;white-space:nowrap}
.hudbtn{
  border:none;border-radius:14px;background:#fff;color:#5a4ab0;font-weight:700;
  font-size:13px;padding:7px 10px;box-shadow:0 2px 0 #4a3aa0;cursor:pointer;font-family:inherit;
}
.hudbtn:active{transform:translateY(2px);box-shadow:none}
#prog{color:#fff;font-weight:800;font-size:13px;background:#0002;border-radius:12px;padding:6px 10px;white-space:nowrap}
#songName{width:100%;text-align:center;color:#fff;font-size:13px;font-weight:700;opacity:.95;margin-top:-2px}
#stage{max-width:560px;margin:0 auto;padding:6px 8px 14px}
#catRow{display:flex;align-items:center;gap:8px;margin-bottom:4px;min-height:64px}
#catBox svg{width:62px;height:62px}
#catBox.bounce svg{animation:bnc .4s}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#bubble{
  flex:1;background:#fff;border-radius:14px;padding:8px 12px;font-size:14px;font-weight:800;color:#5a4ab0;
  box-shadow:0 2px 6px #0002;position:relative;
}
#bubble:before{
  content:'';position:absolute;left:-8px;top:22px;border:8px solid transparent;border-right-color:#fff;border-left:0;
}
#scoreWrap{
  background:#fffdf5;border:3px solid #d8d0f0;border-radius:14px;overflow-x:auto;overflow-y:hidden;
  margin-bottom:8px;box-shadow:inset 0 2px 6px #00000010;-webkit-overflow-scrolling:touch;
}
#scoreWrap svg{display:block;height:150px}
#controls{display:flex;justify-content:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.ctlbtn{
  border:none;border-radius:14px;font-weight:800;font-family:inherit;font-size:14px;
  padding:10px 16px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.25);
}
.ctlbtn:active{transform:translateY(2px);box-shadow:none}
#btnDemo{background:#ffb400;color:#5a4632}
#btnStop{background:#f0a0a0;color:#7a3030;display:none}
#btnRestart{background:#d8eefc;color:#2277bb}
/* ピアノ */
#piano{
  position:relative;background:#4a4048;border-radius:12px 12px 8px 8px;padding:8px 6px 6px;
  box-shadow:0 4px 12px #0004;
}
#wkeys{display:flex;gap:2px}
.wkey{
  flex:1;height:150px;background:linear-gradient(#fff,#f0f0ee);border-radius:0 0 7px 7px;
  border:1px solid #b8b8c0;position:relative;cursor:pointer;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;
  font-size:13px;font-weight:900;color:#8a8a95;touch-action:none;
}
.wkey.target{background:linear-gradient(#ffd3e0,#ff9dbd);color:#c0225a;box-shadow:inset 0 0 12px #ff5f8a66}
.wkey.down{background:linear-gradient(#e8e8e8,#d0d0d0)}
.wkey.target.down{background:linear-gradient(#ff9dbd,#ff7fa8)}
.bkey{
  position:absolute;top:8px;width:7.2%;height:90px;background:linear-gradient(#3a3a40,#1a1a20);
  border-radius:0 0 5px 5px;cursor:pointer;z-index:5;touch-action:none;
}
.bkey.down{background:linear-gradient(#2a2a30,#000)}
.overlay{
  position:fixed;inset:0;background:rgba(40,30,60,.55);z-index:100;display:none;
  align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px 8px 30px;
}
.overlay.show{display:flex}
#selectCard{background:#f2efff;border-radius:18px;max-width:560px;width:100%;padding:14px 12px 20px;box-shadow:0 8px 30px #0006}
#selectCard h2{color:#5a4ab0;font-size:18px;text-align:center;margin:4px 0 2px}
#selectCard p.sub{color:#8a7ab5;font-size:11px;text-align:center;margin-bottom:10px;line-height:1.6}
.songCard{
  display:flex;align-items:center;gap:10px;background:#fff;border:3px solid #d8d0f0;border-radius:14px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;box-shadow:0 2px 5px #0002;
}
.songCard:active{transform:scale(.98)}
.songCard .snum{
  width:40px;height:40px;border-radius:50%;background:#8a7ae0;color:#fff;font-size:18px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.songCard .stxt{flex:1}
.songCard .sname{font-size:15px;font-weight:800;color:#345}
.songCard .sdesc{font-size:11px;color:#8a7ab5}
.songCard .sstar{font-size:15px}
#winOverlay{z-index:120;align-items:center}
#winCard{background:#fffdf5;border-radius:22px;padding:24px 22px;text-align:center;box-shadow:0 10px 40px #0007;max-width:340px;width:90%}
#winCard .big{font-size:27px;font-weight:900;color:#8a7ae0;text-shadow:0 2px 0 #e0d8f8}
#winCatBox{margin:6px auto}
#winInfo{color:#8a6a45;font-weight:700;margin-bottom:10px;font-size:14px}
#winCard button{display:block;width:100%;margin-top:9px;border:none;border-radius:14px;padding:12px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer}
#btnNext{background:#8a7ae0;color:#fff;box-shadow:0 3px 0 #6a5ac0}
#btnAgain2{background:#e8e0ff;color:#5a4ab0;box-shadow:0 3px 0 #c0b0e8}
#btnChoose{background:#ffe3c2;color:#b06020;box-shadow:0 3px 0 #e0bb8c}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:130}
</style>
</head>
<body>
<header>
  <h1>🎹 ネコと ピアノの れんしゅう</h1>
  <div id="prog">♪ 0/0</div>
  <button class="hudbtn" id="btnSelect">🎵 きょくを えらぶ</button>
  <div id="songName"></div>
</header>
<div id="stage">
  <div id="catRow">
    <div id="catBox"></div>
    <div id="bubble">ピンクの けんばんを おしてね！</div>
  </div>
  <div id="scoreWrap"></div>
  <div id="controls">
    <button class="ctlbtn" id="btnDemo">🐱 おてほんを みる</button>
    <button class="ctlbtn" id="btnStop">⏹ とめる</button>
    <button class="ctlbtn" id="btnRestart">↩️ さいしょから</button>
  </div>
  <div id="piano"><div id="wkeys"></div></div>
</div>

<div class="overlay" id="selectOverlay">
  <div id="selectCard">
    <h2>🎵 どの きょくを ひく？</h2>
    <p class="sub">むかしから みんなに うたわれてきた きょく（ちょさくけんが きれた きょく）だけを あつめました。<br>じぶんの ペースで ゆっくり ひいて だいじょうぶ！</p>
    <div id="songList"></div>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div id="winCard">
    <div class="big">🎉 さいごまで ひけたね！</div>
    <div id="winCatBox"></div>
    <div id="winInfo"></div>
    <button id="btnNext">つぎの きょくへ ▶</button>
    <button id="btnAgain2">もういちど ひく</button>
    <button id="btnChoose">きょくを えらぶ</button>
  </div>
</div>
<canvas id="confetti"></canvas>

<script>
"use strict";
const r2=v=>Math.round(v*100)/100;
function catFace(cx,cy,r,fur,opts){
  const o=Object.assign({earIn:'#ffb6c9',line:'#3a2a20',happy:false},opts||{});
  let s='';
  s+=`<path d="M${r2(cx-r*0.9)},${r2(cy-r*0.35)} L${r2(cx-r*1.02)},${r2(cy-r*1.45)} L${r2(cx-r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx+r*0.9)},${r2(cy-r*0.35)} L${r2(cx+r*1.02)},${r2(cy-r*1.45)} L${r2(cx+r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx-r*0.76)},${r2(cy-r*0.55)} L${r2(cx-r*0.85)},${r2(cy-r*1.18)} L${r2(cx-r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<path d="M${r2(cx+r*0.76)},${r2(cy-r*0.55)} L${r2(cx+r*0.85)},${r2(cy-r*1.18)} L${r2(cx+r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<ellipse cx="${r2(cx)}" cy="${r2(cy)}" rx="${r2(r)}" ry="${r2(r*0.9)}" fill="${fur}"/>`;
  const ey=cy-r*0.08,ex=r*0.42;
  if(o.happy){
    s+=`<path d="M${r2(cx-ex-r*0.14)},${r2(ey+r*0.05)} q${r2(r*0.14)},${r2(-r*0.18)} ${r2(r*0.28)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.07))}" fill="none" stroke-linecap="round"/>`;
    s+=`<path d="M${r2(cx+ex-r*0.14)},${r2(ey+r*0.05)} q${r2(r*0.14)},${r2(-r*0.18)} ${r2(r*0.28)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.07))}" fill="none" stroke-linecap="round"/>`;
  }else{
    s+=`<ellipse cx="${r2(cx-ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
    s+=`<ellipse cx="${r2(cx+ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
  }
  s+=`<path d="M${r2(cx-r*0.09)},${r2(cy+r*0.2)} h${r2(r*0.18)} l${r2(-r*0.09)},${r2(r*0.13)} Z" fill="#e8768a"/>`;
  s+=`<path d="M${r2(cx)},${r2(cy+r*0.33)} q${r2(-r*0.12)},${r2(r*0.17)} ${r2(-r*0.28)},${r2(r*0.05)} M${r2(cx)},${r2(cy+r*0.33)} q${r2(r*0.12)},${r2(r*0.17)} ${r2(r*0.28)},${r2(r*0.05)}" stroke="${o.line}" stroke-width="${r2(Math.max(1.5,r*0.05))}" fill="none" stroke-linecap="round"/>`;
  return s;
}
/* ---------- おと ---------- */
const FREQ={
 'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,'F4':349.23,'F#4':369.99,
 'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88,
 'C5':523.25,'C#5':554.37,'D5':587.33,'D#5':622.25,'E5':659.26
};
const DOREMI={C:'ド',D:'レ',E:'ミ',F:'ファ',G:'ソ',A:'ラ',B:'シ'};
let AC=null;
function initAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();
}
function playNote(note,dur){
  if(!AC)return;
  const f=FREQ[note];if(!f)return;
  dur=dur||1.0;
  const t=AC.currentTime;
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.25,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  g.connect(AC.destination);
  const o1=AC.createOscillator();o1.type='triangle';o1.frequency.value=f;
  const o2=AC.createOscillator();o2.type='sine';o2.frequency.value=f*2;
  const g2=AC.createGain();g2.gain.value=0.25;
  o1.connect(g);o2.connect(g2);g2.connect(g);
  o1.start(t);o2.start(t);o1.stop(t+dur+0.1);o2.stop(t+dur+0.1);
}
function fanfare(){[523,659,784,1047,1319].forEach((f,i)=>{
  if(!AC)return;
  const t=AC.currentTime+i*0.13;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='triangle';o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.15,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.5);
});}

/* ---------- けんばん ---------- */
const WHITES=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5'];
const BLACKS=[['C#4',0],['D#4',1],['F#4',3],['G#4',4],['A#4',5],['C#5',7],['D#5',8]];
const $=id=>document.getElementById(id);
function loadProg(){try{return JSON.parse(localStorage.getItem('nekoPianoV1')||'{}');}catch(e){return{};}}
function saveProg(p){try{localStorage.setItem('nekoPianoV1',JSON.stringify(p));}catch(e){}}
let prog=loadProg();
let cur=0,idx=0,demoTimers=[],demoOn=false;
function buildPiano(){
  const w=$('wkeys');
  w.innerHTML='';
  WHITES.forEach(n=>{
    const k=document.createElement('div');
    k.className='wkey';k.dataset.note=n;
    k.textContent=DOREMI[n[0]];
    k.addEventListener('pointerdown',ev=>{ev.preventDefault();pressKey(n);});
    w.appendChild(k);
  });
  BLACKS.forEach(([n,wi])=>{
    const k=document.createElement('div');
    k.className='bkey';k.dataset.note=n;
    k.style.left=(1.2+wi*9.94+6.8)+'%';
    k.addEventListener('pointerdown',ev=>{ev.preventDefault();ev.stopPropagation();pressKey(n);});
    $('piano').appendChild(k);
  });
}
function keyEl(n){return document.querySelector(`[data-note="${n}"]`);}
function flashKey(n,ms){
  const k=keyEl(n);if(!k)return;
  k.classList.add('down');
  setTimeout(()=>k.classList.remove('down'),ms||180);
}
/* ---------- がくふ ---------- */
const PITCHES=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5'];
const NX=38;
function buildScore(){
  const notes=SONGS[cur].notes;
  let x=30;
  const pos=[];
  notes.forEach(nt=>{pos.push(x);x+=nt[1]*NX;});
  const W=x+30;
  let s=`<svg id="scoreSvg" viewBox="0 0 ${W} 150" width="${W}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<5;i++){
    const y=26+i*13;
    s+=`<line x1="14" y1="${y}" x2="${W-14}" y2="${y}" stroke="#c8c0e0" stroke-width="1.5"/>`;
  }
  notes.forEach((nt,i)=>{
    const pi=PITCHES.indexOf(nt[0]);
    const y=96-pi*7.8;
    const long=nt[1]>=2;
    s+=`<g id="note${i}" transform="translate(${pos[i]} ${y})">`;
    s+=`<line x1="8" y1="0" x2="8" y2="-26" stroke="#5a4ab0" stroke-width="2" class="stem"/>`;
    s+=`<ellipse cx="0" cy="0" rx="9" ry="7" fill="${long?'#fffdf5':'#5a4ab0'}" stroke="#5a4ab0" stroke-width="2.5" class="head"/>`;
    s+=`<text x="0" y="34" font-size="14" font-weight="bold" text-anchor="middle" fill="#8a7ab5" class="lbl">${DOREMI[nt[0][0]]}</text>`;
    s+=`</g>`;
  });
  s+=`</svg>`;
  $('scoreWrap').innerHTML=s;
  return pos;
}
let notePos=[];
function setNoteState(i,state){
  const g=document.getElementById('note'+i);
  if(!g)return;
  const head=g.querySelector('.head'),lbl=g.querySelector('.lbl'),stem=g.querySelector('.stem');
  const nt=SONGS[cur].notes[i];
  const long=nt[1]>=2;
  const base=g.getAttribute('transform').replace(/ scale.*/,'');
  if(state==='current'){
    head.setAttribute('fill','#ff5f8a');head.setAttribute('stroke','#e0447a');
    stem.setAttribute('stroke','#e0447a');
    lbl.setAttribute('fill','#e0447a');lbl.setAttribute('font-size','17');
    g.setAttribute('transform',base+' scale(1.25)');
  }else if(state==='done'){
    head.setAttribute('fill',long?'#e8f2e0':'#9ec89a');head.setAttribute('stroke','#9ec89a');
    stem.setAttribute('stroke','#9ec89a');
    lbl.setAttribute('fill','#a8c8a0');lbl.setAttribute('font-size','14');
    g.setAttribute('transform',base);
  }else{
    head.setAttribute('fill',long?'#fffdf5':'#5a4ab0');head.setAttribute('stroke','#5a4ab0');
    stem.setAttribute('stroke','#5a4ab0');
    lbl.setAttribute('fill','#8a7ab5');lbl.setAttribute('font-size','14');
    g.setAttribute('transform',base);
  }
}
function scrollToNote(i){
  const wrap=$('scoreWrap');
  if(i>=notePos.length)return;
  const target=notePos[i]-wrap.clientWidth/3;
  wrap.scrollTo({left:Math.max(0,target),behavior:'smooth'});
}
/* ---------- れんしゅう ---------- */
const CHEERS=['いいちょうし！','じょうずだね！','その ちょうし！','うまい うまい！','あと すこし！','がんばれ〜！'];
function setCat(happy,msg){
  $('catBox').innerHTML=`<svg viewBox="0 0 80 80">${catFace(40,46,26,'#f5a04a',{happy})}</svg>`;
  if(msg)$('bubble').textContent=msg;
}
function updateTarget(){
  document.querySelectorAll('.wkey.target').forEach(k=>k.classList.remove('target'));
  const notes=SONGS[cur].notes;
  $('prog').textContent='♪ '+idx+'/'+notes.length;
  if(idx<notes.length){
    const n=notes[idx][0];
    const k=keyEl(n);
    if(k)k.classList.add('target');
    setNoteState(idx,'current');
    scrollToNote(idx);
  }
}
function pressKey(n){
  initAudio();
  if(demoOn)return;
  const notes=SONGS[cur].notes;
  flashKey(n);
  if(idx<notes.length&&n===notes[idx][0]){
    playNote(n,Math.max(0.7,notes[idx][1]*0.6));
    setNoteState(idx,'done');
    idx++;
    const total=notes.length;
    if(idx>=total){finish();return;}
    if(idx===Math.floor(total*0.33)||idx===Math.floor(total*0.66)){
      setCat(true,CHEERS[Math.floor(Math.random()*CHEERS.length)]);
      $('catBox').classList.remove('bounce');void $('catBox').offsetWidth;$('catBox').classList.add('bounce');
    }
    updateTarget();
  }else{
    playNote(n,0.4);
  }
}
function finish(){
  updateTarget();
  prog['s'+cur]=1;saveProg(prog);
  setCat(true,'すごーい！ かんぺき！');
  $('winCatBox').innerHTML=`<svg viewBox="0 0 200 110" style="width:170px">${catFace(100,60,38,'#f5a04a',{happy:true})}</svg>`;
  $('winInfo').textContent='「'+SONGS[cur].name+'」を さいごまで ひけました！';
  $('btnNext').style.display=cur<SONGS.length-1?'block':'none';
  $('winOverlay').classList.add('show');
  fanfare();confettiBurst();buildSongs();
}
/* ---------- おてほん ---------- */
function startDemo(){
  initAudio();
  stopDemo();
  demoOn=true;
  $('btnDemo').style.display='none';
  $('btnStop').style.display='inline-block';
  setCat(true,'おてほんだよ。よく みててね🎵');
  resetPlay(false);
  const notes=SONGS[cur].notes;
  const beat=60/SONGS[cur].bpm;
  let t=600;
  notes.forEach((nt,i)=>{
    demoTimers.push(setTimeout(()=>{
      if(i>0)setNoteState(i-1,'done');
      setNoteState(i,'current');
      document.querySelectorAll('.wkey.target').forEach(k=>k.classList.remove('target'));
      const k=keyEl(nt[0]);
      if(k){k.classList.add('target');flashKey(nt[0],nt[1]*beat*1000*0.8);}
      playNote(nt[0],Math.max(0.5,nt[1]*beat*0.95));
      scrollToNote(i);
      $('prog').textContent='♪ '+(i+1)+'/'+notes.length;
    },t));
    t+=nt[1]*beat*1000;
  });
  demoTimers.push(setTimeout(()=>{
    setNoteState(notes.length-1,'done');
    stopDemo();
    setCat(true,'こんどは きみの ばん！');
  },t+300));
}
function stopDemo(){
  demoTimers.forEach(clearTimeout);
  demoTimers=[];
  if(demoOn){
    demoOn=false;
    $('btnDemo').style.display='inline-block';
    $('btnStop').style.display='none';
    resetPlay(true);
  }
}
function resetPlay(msg){
  idx=0;
  const notes=SONGS[cur].notes;
  notes.forEach((_,i)=>setNoteState(i,'todo'));
  $('scoreWrap').scrollTo({left:0});
  updateTarget();
  if(msg)setCat(false,'ピンクの けんばんを おしてね！');
}
/* ---------- きょくえらび ---------- */
function startSong(i){
  stopDemo();
  cur=i;
  $('songName').textContent=(i+1)+'. '+SONGS[i].name+'（'+SONGS[i].info+'）';
  notePos=buildScore();
  resetPlay(true);
  $('selectOverlay').classList.remove('show');
  $('winOverlay').classList.remove('show');
  window.scrollTo(0,0);
}
function buildSongs(){
  const list=$('songList');
  list.innerHTML='';
  SONGS.forEach((sg,i)=>{
    const c=document.createElement('div');
    c.className='songCard';
    const st=prog['s'+i]?'⭐':'';
    c.innerHTML=`<div class="snum">${i+1}</div><div class="stxt"><div class="sname">${sg.name}</div><div class="sdesc">${sg.info}・${sg.notes.length}おん</div></div><div class="sstar">${st}</div>`;
    c.addEventListener('click',()=>startSong(i));
    list.appendChild(c);
  });
}
function confettiBurst(){
  const cv=$('confetti');
  cv.width=innerWidth;cv.height=innerHeight;
  const g=cv.getContext('2d');
  const cols=['#ff5f6d','#ffb347','#ffe74d','#7bc258','#5fa8ff','#c78bff','#ff90b3'];
  const ps=[];
  for(let i=0;i<130;i++){
    ps.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.5,vx:(Math.random()-0.5)*2.4,vy:2+Math.random()*3.4,r:4+Math.random()*6,c:cols[i%cols.length],a:Math.random()*Math.PI,va:(Math.random()-0.5)*0.25});
  }
  const t0=performance.now();
  function step(now){
    g.clearRect(0,0,cv.width,cv.height);
    for(const p of ps){
      p.x+=p.vx;p.y+=p.vy;p.a+=p.va;
      g.save();g.translate(p.x,p.y);g.rotate(p.a);
      g.fillStyle=p.c;g.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2);
      g.restore();
    }
    if(now-t0<3800)requestAnimationFrame(step);
    else g.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(step);
}
$('btnDemo').addEventListener('click',startDemo);
$('btnStop').addEventListener('click',stopDemo);
$('btnRestart').addEventListener('click',()=>{stopDemo();resetPlay(true);});
$('btnSelect').addEventListener('click',()=>{stopDemo();buildSongs();$('selectOverlay').classList.add('show');});
$('selectOverlay').addEventListener('click',ev=>{if(ev.target===$('selectOverlay'))$('selectOverlay').classList.remove('show');});
$('btnNext').addEventListener('click',()=>startSong(Math.min(cur+1,SONGS.length-1)));
$('btnAgain2').addEventListener('click',()=>startSong(cur));
$('btnChoose').addEventListener('click',()=>{$('winOverlay').classList.remove('show');buildSongs();$('selectOverlay').classList.add('show');});
/* ---- はじまり ---- */
buildPiano();
setCat(false,'ピンクの けんばんを おしてね！');
buildSongs();
startSong(0);
$('selectOverlay').classList.add('show');
</script>
