<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ネコレーシング 🐱🏁</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #2d4a22;
    font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDGothic', 'Meiryo', sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; border-radius: 8px; }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(20, 40, 15, 0.75); color: #fff; text-align: center;
    backdrop-filter: blur(3px); z-index: 10;
  }
  .overlay h1 { font-size: clamp(28px, 7vw, 52px); margin-bottom: 12px; text-shadow: 3px 3px 0 #d35400; }
  .overlay p { font-size: clamp(14px, 3.5vw, 18px); line-height: 1.9; margin-bottom: 20px; }
  .overlay .big { font-size: clamp(22px, 6vw, 40px); margin-bottom: 8px; }
  button {
    font-family: inherit; font-size: clamp(18px, 4.5vw, 24px); font-weight: bold;
    padding: 14px 44px; border: none; border-radius: 40px; cursor: pointer;
    background: linear-gradient(#ffb347, #ff8c1a); color: #fff;
    box-shadow: 0 5px 0 #c96a00; transition: transform .08s;
  }
  button:active { transform: translateY(4px); box-shadow: 0 1px 0 #c96a00; }
  .hidden { display: none !important; }
  #newRecord { color: #ffe14d; font-weight: bold; animation: pop .5s ease infinite alternate; }
  @keyframes pop { from { transform: scale(1); } to { transform: scale(1.12); } }
  #soundBtn {
    position: absolute; top: 44px; right: 10px; z-index: 30;
    font-size: 14px; font-weight: bold; padding: 8px 12px; border-radius: 12px;
    background: rgba(255,255,255,.92); color: #333;
    box-shadow: 0 3px 0 #aaa; white-space: nowrap;
  }
  #soundBtn.off { background: rgba(190,190,190,.88); color: #666; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <button id="soundBtn">🔊 音 ON</button>

  <div id="titleScreen" class="overlay">
    <h1>🐱 ネコレーシング 🏁</h1>
    <p>
      ネコカートで爆走!<br>
      🚧 障害物をよけて 🐟 おさかなを集めよう!<br><br>
      <b>操作</b>:← → キー / A・Dキー<br>
      スマホは画面の左右をタップ(スワイプもOK)<br>
      🔊 効果音つき(右上のボタンで ON/OFF)
    </p>
    <button id="startBtn">スタート!</button>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h1>💥 ゴロゴロ...リタイア!</h1>
    <p class="big">スコア: <span id="finalScore">0</span></p>
    <p>
      走行距離: <span id="finalDist">0</span>m / 🐟 × <span id="finalFish">0</span><br>
      ベストスコア: <span id="bestScore">0</span>
      <span id="newRecord" class="hidden">★ 新記録! ★</span>
    </p>
    <button id="retryBtn">もう一回!</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ===== サウンド (Web Audio・ファイル不要) =====
  let sndCtx = null;
  let soundOn = true;
  try { soundOn = localStorage.getItem('nekoRacingSound') !== 'off'; } catch (e) {}
  function sndAC() {
    if (!sndCtx) { try { sndCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (sndCtx && sndCtx.state === 'suspended') sndCtx.resume();
    return sndCtx;
  }
  function tone(freq, dur, type, vol, delay) {
    if (!soundOn) return;
    const a = sndAC(); if (!a) return;
    const t = a.currentTime + (delay || 0);
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.15, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + dur + 0.05);
  }
  const sfx = {
    start()  { tone(523,.09,'triangle',.15); tone(659,.09,'triangle',.15,.09); tone(784,.12,'triangle',.15,.18); },
    move()   { tone(480,.04,'sine',.07); },
    fish(cb) { const up = Math.min(cb || 0, 10) * 30;
               tone(660 + up,.07,'sine',.16); tone(990 + up,.09,'sine',.13,.05); },
    crash()  { tone(300,.15,'sawtooth',.18); tone(180,.20,'sawtooth',.16,.08); tone(90,.35,'sawtooth',.15,.16); },
    record() { [523,659,784,1046].forEach((f,i)=>tone(f,.14,'triangle',.15,i*.10)); },
  };
  const soundBtn = document.getElementById('soundBtn');
  function updateSoundBtn() {
    soundBtn.textContent = soundOn ? '🔊 音 ON' : '🔇 音 OFF';
    soundBtn.classList.toggle('off', !soundOn);
  }
  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    try { localStorage.setItem('nekoRacingSound', soundOn ? 'on' : 'off'); } catch (e) {}
    updateSoundBtn();
    if (soundOn) sfx.fish(0);
  });
  updateSoundBtn();

  // --- レイアウト ---
  let W, H, roadX, roadW, laneW;
  const LANES = 3;
  function resize() {
    const maxW = 480;
    W = Math.min(window.innerWidth, maxW);
    H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    roadW = W * 0.78;
    roadX = (W - roadW) / 2;
    laneW = roadW / LANES;
  }
  window.addEventListener('resize', resize);
  resize();

  const laneX = i => roadX + laneW * i + laneW / 2;

  // --- 状態 ---
  const S = { TITLE: 0, PLAY: 1, OVER: 2 };
  let state = S.TITLE;

  let player, obstacles, fishes, particles, clouds;
  let speed, dist, score, fishCount, spawnTimer, fishTimer, dashOffset, shake, combo, comboTimer;
  let best = 0;
  try { best = +localStorage.getItem('nekoRacingBest') || 0; } catch (e) {}

  const OBS_EMOJI = ['🐶', '🚧', '🪨', '🛢️'];

  function reset() {
    player = { lane: 1, x: laneX(1), y: 0, tilt: 0, alive: true };
    obstacles = []; fishes = []; particles = [];
    speed = 260; dist = 0; score = 0; fishCount = 0;
    spawnTimer = 0.5; fishTimer = 1.5; dashOffset = 0; shake = 0;
    combo = 0; comboTimer = 0;
    clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({ x: Math.random() * W, y: Math.random() * H, s: 20 + Math.random() * 25, v: 10 + Math.random() * 10 });
    }
  }

  // --- 入力 ---
  function move(dir) {
    if (state !== S.PLAY || !player.alive) return;
    const nl = player.lane + dir;
    if (nl >= 0 && nl < LANES) { player.lane = nl; player.tilt = dir * 0.35; sfx.move(); }
  }
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') move(-1);
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') move(1);
    else if ((e.key === ' ' || e.key === 'Enter') && state !== S.PLAY) start();
  });

  let touchX = null;
  window.addEventListener('touchstart', e => {
    if (e.target && e.target.closest && e.target.closest('#soundBtn')) { touchX = null; return; }
    touchX = e.touches[0].clientX;
  }, { passive: true });
  window.addEventListener('touchend', e => {
    if (e.target && e.target.closest && e.target.closest('#soundBtn')) { touchX = null; return; }
    if (state !== S.PLAY || touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 30) move(dx > 0 ? 1 : -1);          // スワイプ
    else move(e.changedTouches[0].clientX < window.innerWidth / 2 ? -1 : 1); // タップ
    touchX = null;
  }, { passive: true });

  // --- 画面遷移 ---
  const titleScreen = document.getElementById('titleScreen');
  const overScreen = document.getElementById('gameOverScreen');
  document.getElementById('startBtn').onclick = start;
  document.getElementById('retryBtn').onclick = start;

  function start() {
    sndAC(); // ユーザー操作のタイミングでオーディオを有効化
    reset();
    state = S.PLAY;
    titleScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    sfx.start();
  }

  function gameOver() {
    player.alive = false;
    state = S.OVER;
    shake = 12;
    burst(player.x, player.y, '#ff6b35', 24);
    sfx.crash();
    const isNew = score > best;
    if (isNew) {
      best = score;
      try { localStorage.setItem('nekoRacingBest', best); } catch (e) {}
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalDist').textContent = Math.floor(dist);
    document.getElementById('finalFish').textContent = fishCount;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('newRecord').classList.toggle('hidden', !isNew);
    if (isNew) setTimeout(() => sfx.record(), 650);
    setTimeout(() => overScreen.classList.remove('hidden'), 600);
  }

  // --- パーティクル ---
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, v = 60 + Math.random() * 160;
      particles.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 0.6 + Math.random() * 0.4, color, r: 3 + Math.random() * 4 });
    }
  }

  // --- 更新 ---
  function update(dt) {
    if (state === S.PLAY) {
      speed += dt * 9;                       // だんだん速く
      dist += speed * dt / 25;
      score = Math.floor(dist) + fishCount * 50;
      dashOffset = (dashOffset + speed * dt) % 80;

      // プレイヤー位置(なめらかにレーン移動)
      player.y = H * 0.8;
      player.x += (laneX(player.lane) - player.x) * Math.min(1, dt * 14);
      player.tilt *= Math.pow(0.001, dt);

      // 出現
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnTimer = Math.max(0.42, 1.15 - speed / 900);
        const open = Math.floor(Math.random() * LANES); // 必ず1レーンは空ける
        for (let i = 0; i < LANES; i++) {
          if (i !== open && Math.random() < 0.55) {
            obstacles.push({ lane: i, y: -60, emoji: OBS_EMOJI[Math.floor(Math.random() * OBS_EMOJI.length)] });
          }
        }
      }
      fishTimer -= dt;
      if (fishTimer <= 0) {
        fishTimer = 0.9 + Math.random() * 0.9;
        fishes.push({ lane: Math.floor(Math.random() * LANES), y: -40, wob: Math.random() * Math.PI * 2 });
      }

      // 移動と当たり判定
      const px = player.x, py = player.y;
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += speed * dt;
        if (o.y > H + 60) { obstacles.splice(i, 1); continue; }
        if (Math.abs(o.y - py) < 34 && Math.abs(laneX(o.lane) - px) < laneW * 0.5) gameOver();
      }
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        f.y += speed * dt;
        f.wob += dt * 6;
        if (f.y > H + 40) { fishes.splice(i, 1); combo = 0; continue; }
        if (Math.abs(f.y - py) < 40 && Math.abs(laneX(f.lane) - px) < laneW * 0.55) {
          fishes.splice(i, 1);
          fishCount++;
          combo++; comboTimer = 2;
          sfx.fish(combo);
          burst(f.x || laneX(f.lane), f.y, '#4fc3f7', 10);
        }
      }
      if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
    }

    // 常時更新
    clouds.forEach(c => { c.y += c.v * dt; if (c.y > H + 30) { c.y = -30; c.x = Math.random() * W; } });
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 300 * dt; p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
  }

  // --- 描画 ---
  function draw() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

    // 草原
    ctx.fillStyle = '#4a7c3a';
    ctx.fillRect(-20, -20, W + 40, H + 40);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    clouds.forEach(c => {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.s, c.s * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // 道路
    ctx.fillStyle = '#555';
    ctx.fillRect(roadX, -20, roadW, H + 40);
    // 縁石
    for (let y = -dashOffset; y < H; y += 40) {
      ctx.fillStyle = (Math.floor((y + dashOffset) / 40) % 2 === 0) ? '#e74c3c' : '#fff';
      ctx.fillRect(roadX - 10, y, 10, 40);
      ctx.fillRect(roadX + roadW, y, 10, 40);
    }
    // 車線
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 5;
    ctx.setLineDash([32, 48]);
    ctx.lineDashOffset = -dashOffset;
    for (let i = 1; i < LANES; i++) {
      ctx.beginPath();
      ctx.moveTo(roadX + laneW * i, -20);
      ctx.lineTo(roadX + laneW * i, H + 20);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    const emojiSize = Math.min(laneW * 0.62, 52);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // おさかな
    ctx.font = emojiSize * 0.8 + 'px sans-serif';
    fishes.forEach(f => {
      ctx.save();
      ctx.translate(laneX(f.lane) + Math.sin(f.wob) * 6, f.y);
      ctx.rotate(Math.sin(f.wob) * 0.2);
      ctx.fillText('🐟', 0, 0);
      ctx.restore();
    });

    // 障害物
    ctx.font = emojiSize + 'px sans-serif';
    obstacles.forEach(o => ctx.fillText(o.emoji, laneX(o.lane), o.y));

    // プレイヤー(ネコカート)
    if (state !== S.TITLE) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.tilt);
      // 影
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(0, emojiSize * 0.55, emojiSize * 0.55, emojiSize * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      // カート
      ctx.font = emojiSize * 1.1 + 'px sans-serif';
      ctx.fillText('🛒', 0, emojiSize * 0.18);
      // ネコ
      ctx.font = emojiSize * 0.9 + 'px sans-serif';
      ctx.fillText(player.alive ? '🐱' : '😵', 0, -emojiSize * 0.38);
      ctx.restore();
    }

    // パーティクル
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // HUD
    if (state === S.PLAY) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      roundRect(10, 10, 150, 66, 12);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.font = 'bold 18px sans-serif';
      ctx.fillText('スコア ' + score, 22, 32);
      ctx.font = '15px sans-serif';
      ctx.fillText('🐟 × ' + fishCount + '   ' + Math.floor(dist) + 'm', 22, 58);

      if (combo >= 2) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 26px sans-serif';
        ctx.fillStyle = '#ffe14d';
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 4;
        const t = combo + ' コンボ!';
        ctx.strokeText(t, W / 2, H * 0.22);
        ctx.fillText(t, W / 2, H * 0.22);
      }

      ctx.textAlign = 'right';
      ctx.font = '14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('ベスト ' + best, W - 14, 28);
    }

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // --- メインループ ---
  reset();
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
