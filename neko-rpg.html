  .dbtn:active { background:#5577cc; }
  .dspace { visibility:hidden; }
  #abtns { display:flex; flex-direction:column; gap:10px; }
  .abtn { width:96px; height:60px; border-radius:12px; color:#fff; font-size:15px;
    display:flex; align-items:center; justify-content:center; user-select:none;
    cursor:pointer; font-family:monospace; }
  #btn-z { background:#226622; border:3px solid #44bb44; }
  #btn-z:active { background:#44aa44; }
  #btn-x { background:#663333; border:3px solid #bb6644; }
  #btn-x:active { background:#aa5544; }
  #hiragana-keyboard { display:none; position:fixed; left:0; right:0; bottom:0;

  .hira-btn { background:#223366; border:1px solid #4466aa; border-radius:4px;

    const n = G.equipment[k];
    if(n && EQUIP_DATA[n] && EQUIP_DATA[n].stat===stat) s += EQUIP_DATA[n].val;
  }
  return s;
}
function getAtk(m){ return m.type==='hero' ? m.atk + eqBonus('atk') : m.atk; }
function getDef(m){ return m.type==='hero' ? m.def + eqBonus('def') : m.def; }
function getMag(m){ return m.type==='hero' ? m.mag + eqBonus('mag') : m.mag; }

// ---- どうぐ ----
function addItem(name){
  const e = G.items.find(i => i.id===name);
  if(e) e.count++; else G.items.push({ id:name, count:1 });
}
function removeItem(name){
  const idx = G.items.findIndex(i => i.id===name);
  if(idx < 0) return false;
  G.items[idx].count--;
  if(G.items[idx].count <= 0) G.items.splice(idx,1);
  return true;
}
function countItem(name){
  const e = G.items.find(i => i.id===name);
  return e ? e.count : 0;
}
// 装備する（今の装備はどうぐに戻る）
function equipItem(name){
  const d = EQUIP_DATA[name];
  if(!d) return false;
  if(!removeItem(name)) return false;
  const old = G.equipment[d.slot];
  if(old) addItem(old);
  G.equipment[d.slot] = name;
  return true;
}
// はずす
function unequipSlot(slot){
  const old = G.equipment[slot];
  if(!old) return false;
  G.equipment[slot] = null;
  addItem(old);
  return true;
}

// ---- レベルアップ ----
function checkLevelUp(m){
  let leveled = false;
  while(m.lv < MAX_LV && (m.exp||0) >= EXP_TABLE[m.lv+1]){
    m.lv++; leveled = true;
    if(m.type==='hero'){ m.maxHP+=5; m.maxMP+=8; m.atk+=1; m.def+=1; m.mag+=3; m.spd+=1; }
    else if(m.type==='mama'){ m.maxHP+=6; m.maxMP+=5; m.atk+=1; m.def+=2; m.mag+=2; m.spd+=1; }
    else if(m.type==='papa'){ m.maxHP+=8; m.maxMP+=1; m.atk+=3; m.def+=2; m.mag+=1; m.spd+=1; }
    else { m.maxHP+=4; m.atk+=2; m.def+=1; m.spd+=1; }
    m.hp = Math.min(m.hp+5, m.maxHP);
  }
  return leveled;
}

// =====================================================================
//  ダイアログ
// =====================================================================
function wrapText(s, maxChars){
  maxChars = maxChars || 24;
  const lines = [];
  let cur = '';
  for(const ch of s){
    cur += ch;
    if(cur.length >= maxChars){ lines.push(cur); cur=''; }
  }
  if(cur) lines.push(cur);
  return lines;
}
// pages: 文字列の配列（1要素=1ページ）または文字列
function showDialog(pages, cb, speaker){
  if(typeof pages === 'string') pages = [pages];
  dlg = { pages, idx:0, cb: cb||null, speaker: speaker||null };
  screen = 'dialog';
}
function handleDialogInput(key){
  if(key==='z' || key==='x'){
    dlg.idx++;
    if(dlg.idx >= dlg.pages.length){
      const cb = dlg.cb;
      dlg.cb = null;
      screen = 'field';
      if(cb) cb();
    }
  }
}

// =====================================================================
//  フィールド
// =====================================================================
function tileAt(x,y){
  if(x<0||x>=MAP_W||y<0||y>=MAP_H) return T.WALL;
  const t = MAPS[G.area][y][x];
  // マップは書き換えず、ゲームの状態からタイルを決める（バグ防止）
  if(t===T.CAT && G.area<3 && G.catsFound[G.area]) return T.GRASS;
  if(t===T.BOSS && G.area>0 && G.bossDefeated[G.area-1]) return T.PATH;
  return t;
}
function isNPCAt(x,y){
  return (NPC_DATA[G.area]||[]).some(n => n.x===x && n.y===y);
}
function npcAt(x,y){
  return (NPC_DATA[G.area]||[]).find(n => n.x===x && n.y===y) || null;
}
function chestAt(x,y){
  return (CHEST_CONFIGS[G.area]||[]).find(c => c.x===x && c.y===y) || null;
}

function handleFieldInput(key){
  if(key==='z'){ interact(); return; }
  if(key==='x'){ return; }
  if(fieldMoveDelay > 0) return;
  let nx = G.px, ny = G.py;
  if(key==='up'){ ny--; G.facing='up'; }
  else if(key==='down'){ ny++; G.facing='down'; }
  else if(key==='left'){ nx--; G.facing='left'; }
  else if(key==='right'){ nx++; G.facing='right'; }
  else return;
  fieldMoveDelay = 8;
  if(nx<0||nx>=MAP_W||ny<0||ny>=MAP_H) return;
  const tile = tileAt(nx,ny);
  // ぶつかると反応するタイル
  if(tile===T.CHEST){ tryOpenChest(nx,ny); return; }
  if(tile===T.SHOP){ openShop(); return; }
  if(tile===T.CAT){ tryCatEvent(); return; }
  if(tile===T.BOSS){ tryBossEvent(); return; }
  if(SOLID_TILES.includes(tile)) return;
  if(isNPCAt(nx,ny)){ const n=npcAt(nx,ny); talkToNPC(n); return; }
  if(tile===T.DOOR){ handleDoor(ny); return; }
  // 移動
  G.px = nx; G.py = ny;
  // ランダムエンカウント
  if([T.GRASS,T.PATH,T.SAND,T.FLOWER].includes(tile)){
    G.encounterSteps--;
    if(G.encounterSteps <= 0){
      G.encounterSteps = 8 + rnd(10);
      startBattle(null);
    }
  }
}

function interact(){
  let fx = G.px, fy = G.py;
  if(G.facing==='up') fy--; else if(G.facing==='down') fy++;
  else if(G.facing==='left') fx--; else fx++;
  const tile = tileAt(fx,fy);
  if(tile===T.CHEST){ tryOpenChest(fx,fy); return; }
  if(tile===T.SHOP){ openShop(); return; }
  if(tile===T.CAT){ tryCatEvent(); return; }
  if(tile===T.BOSS){ tryBossEvent(); return; }
  const n = npcAt(fx,fy);
  if(n) talkToNPC(n);
}

function talkToNPC(n){
  const pages = [];
  for(const m of n.msgs) pages.push(m);
  showDialog(pages, null, n.name);
}

function handleDoor(ny){
  if(ny===MAP_H-1 && G.area < 3){
    G.area++; G.px=7; G.py=1; G.encounterSteps = 8 + rnd(8);
    showDialog(AREA_NAMES[G.area]+'に とうちゃく！');
  } else if(ny===0 && G.area > 0){
    G.area--; G.px=7; G.py=13; G.encounterSteps = 8 + rnd(8);
    showDialog(AREA_NAMES[G.area]+'に もどった！');
  }
}

// ---- 宝箱 ----
function tryOpenChest(x,y){
  const conf = chestAt(x,y);
  if(!conf) return;
  if(G.openedChests[conf.id]){
    showDialog('このはこは もう あいている。');
    return;
  }
  const content = CHEST_CONTENTS[conf.id] || { item:'きずぐすり' };
  G.openedChests[conf.id] = true;
  if(content.minigame){
    showDialog([heroName()+'は たからばこを あけた！なかから ちょうせんじょうが でてきた！'], () => {
      startMinigame(content.minigame, content.reward);
    });
  } else {
    addItem(content.item);
    const isEq = !!EQUIP_DATA[content.item];
    const pages = [heroName()+'は たからばこを あけた！「'+content.item+'」を てにいれた！'];
    if(isEq) pages.push('ステータスがめんの「どうぐ」から そうびできるよ！');
    showDialog(pages);
  }
}

// ---- ネコ ----
function tryCatEvent(){
  const ci = G.area;
  if(ci >= 3 || G.catsFound[ci]) return;
  const d = CAT_DEFS[ci];
  showDialog([ d.name+'を みつけた！', d.desc+' '+d.name+'が なかまに なった！' ], () => {
    G.catsFound[ci] = true;
    G.cats.push(makeCat(ci));
  });
}

// ---- ボス ----
function tryBossEvent(){
  if(G.area===0) return;
  const bi = G.area - 1;
  if(G.bossDefeated[bi]) return;
  const name = BOSS_NAMES[G.area];
  showDialog([ name+'が あらわれた！たたかうぞ！' ], () => startBattle(name));
}

// =====================================================================
//  お店
// =====================================================================
function openShop(){ shopCursor=0; screen='shop'; }
function handleShopInput(key){
  if(key==='up') shopCursor = (shopCursor+SHOP_ITEMS.length-1)%SHOP_ITEMS.length;
  else if(key==='down') shopCursor = (shopCursor+1)%SHOP_ITEMS.length;
  else if(key==='z'){
    const it = SHOP_ITEMS[shopCursor];
    if(G.gold >= it.price){
      G.gold -= it.price;
      if(EQUIP_DATA[it.name]){
        addItem(it.name);
        equipItem(it.name);
        showDialog(it.name+'を かって そうびした！のこり：'+G.gold+'Ｇ', ()=>{ screen='shop'; });
      } else {
        addItem(it.name);
        showDialog(it.name+'を かった！のこり：'+G.gold+'Ｇ', ()=>{ screen='shop'; });
      }
    } else {
      showDialog('おかねが たりない！', ()=>{ screen='shop'; });
    }
  }
  else if(key==='x') screen='field';
}

// =====================================================================
//  バトル
// =====================================================================
function makeEnemy(name, slot){
  const d = ENEMY_DATA[name];
  return { name, slot, hp:d.hp, maxHP:d.hp, atk:d.atk, def:d.def, exp:d.exp, gold:d.gold,
    color:d.color, boss:!!d.boss, magic:!!d.magic, weak:d.weak||null,
    alive:true, diedThisTurn:false };
}
function spawnEnemies(area, bossName){
  if(bossName) return [ makeEnemy(bossName, 0) ];
  const pool = AREA_ENEMIES[area];
  const count = Math.random() < 0.35 ? 2 : 1;
  const es = [];
  for(let i=0;i<count;i++) es.push(makeEnemy(pool[rnd(pool.length)], i));
  return es;
}
function liveEnemies(){ return B.enemies.filter(e => e.alive); }
function liveParty(){ return [...G.party, ...G.cats].filter(m => m.alive); }

function startBattle(bossName){
  B = {
    enemies: spawnEnemies(G.area, bossName),
    bossName: bossName || null,
    phase:'command', cursor:0, spellCursor:0, itemCursor:0,
    targets:[], targetCursor:0, pending:null,
    msgs:[], msgIdx:0, afterMsgs:null,
    won:false, lost:false, fled:false,
  };
  screen = 'battle';
  const names = [...new Set(B.enemies.map(e=>e.name))];
  showBattleMsgs([ names.join('と ')+'が あらわれた！' ], () => { B.phase='command'; B.cursor=0; });
}

function showBattleMsgs(msgs, after){
  B.msgs = msgs.length ? msgs : ['・・・'];
  B.msgIdx = 0;
  B.afterMsgs = after || null;
  B.phase = 'msg';
}

function handleBattleInput(key){
  if(!B) return;
  if(B.phase==='msg'){
    if(key==='z' || key==='x'){
      B.msgIdx++;
      if(B.msgIdx >= B.msgs.length){
        const f = B.afterMsgs; B.afterMsgs = null;
        if(f) f(); else B.phase='command';
      }
    }
    return;
  }
  if(B.phase==='command'){
    if(key==='up') B.cursor = (B.cursor+3)%4;
    else if(key==='down') B.cursor = (B.cursor+1)%4;
    else if(key==='z') selectCommand();
  }
  else if(B.phase==='spell'){
    const hero = G.party[0];
    const spells = getHeroSpells(hero.lv);
    if(key==='up') B.spellCursor = Math.max(0, B.spellCursor-1);
    else if(key==='down') B.spellCursor = Math.min(spells.length-1, B.spellCursor+1);
    else if(key==='z'){
      const sp = spells[B.spellCursor];
      if(!sp) return;
      if(hero.mp < sp.mp){ showBattleMsgs(['ＭＰが たりない！'], ()=>{ B.phase='spell'; }); return; }
      beginTargetSelect({ type:'spell', spell:sp });
    }
    else if(key==='x') B.phase='command';
  }
  else if(B.phase==='item'){
    const usable = G.items.filter(i => CONSUMABLES[i.id]);
    if(key==='up') B.itemCursor = Math.max(0, B.itemCursor-1);
    else if(key==='down') B.itemCursor = Math.min(usable.length-1, B.itemCursor+1);
    else if(key==='z'){
      const item = usable[B.itemCursor];
      if(!item) return;
      beginTargetSelect({ type:'item', item:item.id });
    }
    else if(key==='x') B.phase='command';
  }
  else if(B.phase==='target'){
    // 生きている敵だけが対象
    if(key==='left'||key==='up') B.targetCursor = Math.max(0, B.targetCursor-1);
    else if(key==='right'||key==='down') B.targetCursor = Math.min(B.targets.length-1, B.targetCursor+1);
    else if(key==='z') doTurn(B.pending, B.targets[B.targetCursor]);
    else if(key==='x'){
      B.phase = (B.pending && B.pending.type==='spell') ? 'spell'
              : (B.pending && B.pending.type==='item') ? 'item' : 'command';
    }
  }
  else if(B.phase==='ptarget'){
    if(key==='left'||key==='up') B.targetCursor = Math.max(0, B.targetCursor-1);
    else if(key==='right'||key==='down') B.targetCursor = Math.min(B.targets.length-1, B.targetCursor+1);
    else if(key==='z') doTurn(B.pending, B.targets[B.targetCursor]);
    else if(key==='x') B.phase='item';
  }
}

function selectCommand(){
  const cmd = BATTLE_CMDS[B.cursor];
  const hero = G.party[0];
  if(cmd==='こうげき'){
    beginTargetSelect({ type:'attack' });
  }
  else if(cmd==='じゅもん'){
    if(!hero.alive){ showBattleMsgs([heroName()+'は たおれている！']); return; }
    B.phase='spell'; B.spellCursor=0;
  }
  else if(cmd==='どうぐ'){
    const usable = G.items.filter(i => CONSUMABLES[i.id]);
    if(usable.length===0){ showBattleMsgs(['つかえる どうぐが ない！']); return; }
    B.phase='item'; B.itemCursor=0;
  }
  else if(cmd==='にげる'){
    if(B.bossName){ showBattleMsgs(['ボスからは にげられない！']); return; }
    B.fled = true;
    showBattleMsgs(['うまく にげた！'], endBattleFlee);
  }
}

// 対象選択開始：生きている敵/味方だけをリスト化。1体しかいなければ即実行。
function beginTargetSelect(pending){
  B.pending = pending;
  if(pending.type==='item'){
    const c = CONSUMABLES[pending.item];
    if(c.battleDamage){
      // 全体攻撃アイテムは対象選択なし
      doTurn(pending, null);
      return;
    }
    B.targets = liveParty();
    B.targetCursor = 0;
    if(B.targets.length===1){ doTurn(pending, B.targets[0]); return; }
    B.phase = 'ptarget';
    return;
  }
  if(pending.type==='spell' && pending.spell.target==='all'){
    doTurn(pending, null);
    return;
  }
  const live = liveEnemies();
  if(live.length===0) return; // 起こり得ないが安全のため
  if(live.length===1){ doTurn(pending, live[0]); return; }
  B.targets = live;
  B.targetCursor = 0;
  B.phase = 'target';
}

function magicDamage(caster, sp, e){
  let dmg = Math.max(1, Math.floor(getMag(caster)*sp.power) - Math.floor(e.def/2));
  let eff = false;
  if(e.weak && e.weak===sp.name){ dmg = Math.floor(dmg*1.8); eff = true; }
  return { dmg, eff };
}
function hitEnemy(e, dmg, msgs){
  e.hp -= dmg;
  msgs.push(e.name+'に '+dmg+'ダメージ！');
  if(e.hp <= 0){
    e.hp = 0; e.alive = false; e.diedThisTurn = true;
    msgs.push(e.name+'を やっつけた！');
  }
}

// 1ターンをまとめて解決する
function doTurn(action, target){
  const hero = G.party[0];
  const msgs = [];
  // --- 主人公の行動 ---
  if(hero.alive){
    if(action.type==='attack'){
      if(target && target.alive){
        const dmg = Math.max(1, getAtk(hero) - target.def + rnd(4) - 1);
        msgs.push(hero.name+'の こうげき！');
        hitEnemy(target, dmg, msgs);
      }
    }
    else if(action.type==='spell'){
      const sp = action.spell;
      hero.mp -= sp.mp;
      msgs.push(hero.name+'の '+sp.name+'！');
      const ts = sp.target==='all' ? liveEnemies() : (target && target.alive ? [target] : liveEnemies().slice(0,1));
      for(const e of ts){
        const { dmg, eff } = magicDamage(hero, sp, e);
        if(eff) msgs.push('こうか ばつぐん！');
        hitEnemy(e, dmg, msgs);
      }
    }
    else if(action.type==='item'){
      const c = CONSUMABLES[action.item];
      if(c.heal && target){
        removeItem(action.item);
        target.hp = Math.min(target.maxHP, target.hp + c.heal);
        msgs.push(action.item+'を つかった！');
        msgs.push(target.name+'のＨＰが '+c.heal+'かいふく！');
      } else if(c.battleDamage){
        removeItem(action.item);
        msgs.push(action.item+'を なげつけた！');
        for(const e of liveEnemies()) hitEnemy(e, c.battleDamage, msgs);
      }
    }
  }
  // --- 仲間の自動行動（敵が残っている場合のみ）---
  if(liveEnemies().length > 0){
    const allies = [...G.party.filter(m => m.alive && m.type!=='hero'), ...G.cats.filter(c => c.alive)];
    for(const m of allies){
      if(liveEnemies().length===0) break;
      allyAction(m, msgs);
    }
  }
  // --- 敵の行動（敵が残っている場合のみ）---
  if(liveEnemies().length > 0){
    for(const e of liveEnemies()){
      if(liveParty().length===0) break;
      enemyAction(e, msgs);
    }
  }
  // --- 勝敗判定 ---
  if(liveEnemies().length===0){
    B.won = true;
    B.expGained = B.enemies.reduce((s,e)=>s+e.exp,0);
    B.goldGained = B.enemies.reduce((s,e)=>s+e.gold,0);
    msgs.push('てきを ぜんぶ たおした！');
    msgs.push(B.expGained+'ＥＸＰと '+B.goldGained+'Ｇを かくとく！');
    showBattleMsgs(msgs, endBattleWin);
  } else if(liveParty().length===0){
    B.lost = true;
    msgs.push('みんな たおれてしまった・・・');
    showBattleMsgs(msgs, endBattleLose);
  } else {
    showBattleMsgs(msgs, () => {
      for(const e of B.enemies) e.diedThisTurn = false;
      B.phase='command'; B.cursor=0;
    });
  }
}

function allyAction(m, msgs){
  const enemies = liveEnemies();
  if(enemies.length===0) return;
  if(m.type==='mama'){
    const hurt = liveParty().filter(p => p.hp < p.maxHP*0.5).sort((a,b)=>a.hp/a.maxHP-b.hp/b.maxHP)[0];
    const spells = getMamaSpells(m.lv);
    if(hurt && spells.length>0 && m.mp >= spells[0].mp){
      // いちばん回復量の大きい使える呪文
      const usable = spells.filter(s => m.mp >= s.mp && s.target==='one');
      const sp = usable[usable.length-1] || spells[0];
      m.mp -= sp.mp;
      hurt.hp = Math.min(hurt.maxHP, hurt.hp + sp.heal);
      msgs.push(m.name+'の '+sp.name+'！');
      msgs.push(hurt.name+'のＨＰが '+sp.heal+'かいふく！');
      return;
    }
  }
  const t = enemies[rnd(enemies.length)];
  const dmg = Math.max(1, getAtk(m) - Math.floor(t.def/2) + rnd(3));
  msgs.push(m.name+'の こうげき！');
  hitEnemy(t, dmg, msgs);
}

function enemyAction(e, msgs){
  const party = liveParty();
  if(party.length===0) return;
  const t = party[rnd(party.length)];
  if(e.magic && Math.random() < 0.5){
    const dmg = Math.max(1, 8 + rnd(5) - Math.floor(getDef(t)/3));
    msgs.push(e.name+'の ちゅーちゅーだん！');
    t.hp -= dmg;
    msgs.push(t.name+'に '+dmg+'ダメージ！');
  } else {
    const dmg = Math.max(1, e.atk - getDef(t) + rnd(4) - 1);
    msgs.push(e.name+'の こうげき！');
    t.hp -= dmg;
    msgs.push(t.name+'に '+dmg+'ダメージ！');
  }
  if(t.hp <= 0){ t.hp = 0; t.alive = false; msgs.push(t.name+'は たおれた！'); }
}

function endBattleFlee(){
  B = null;
  screen = 'field';
}

function endBattleWin(){
  G.gold += B.goldGained;
  const lvMsgs = [];
  for(const m of G.party){
    m.exp = (m.exp||0) + B.expGained;
    if(checkLevelUp(m)){
      lvMsgs.push(m.name+'は レベル'+m.lv+'に あがった！');
    }
  }
  const bossName = B.bossName;
  const finish = () => {
    B = null;
    if(bossName){
      const bi = BOSS_NAMES.indexOf(bossName) - 1;
      if(bi >= 0) G.bossDefeated[bi] = true;
      if(bossName==='ネズミ大王'){ screen='ending'; return; }
      screen = 'field';
      showDialog(bossName+'を たおした！ やったね！');
    } else {
      screen = 'field';
    }
  };
  if(lvMsgs.length > 0) showBattleMsgs(lvMsgs, finish);
  else finish();
}

function endBattleLose(){
  B = null;
  for(const m of G.party){ m.alive = true; m.hp = Math.max(1, Math.floor(m.maxHP/4)); }
  for(const c of G.cats){ c.alive = true; c.hp = c.maxHP; }
  G.area = 0; G.px = 7; G.py = 13;
  G.encounterSteps = 10 + rnd(8);
  screen = 'field';
  showDialog('きがついたら うちに もどっていた・・・また ちょうせんしよう！');
}

// =====================================================================
//  ミニゲーム（4たくクイズ形式：スマホでもあそべる）
// =====================================================================
function startMinigame(type, reward){
  mg = { type, reward: reward||null, problems:[], idx:0, correct:0, chosen:0, answered:false };
  const n = 5;
  if(type==='math'){
    for(let i=0;i<n;i++){
      const a = 1+rnd(9), b = 1+rnd(9);
      const ans = a+b;
      const choices = new Set([ans]);
      while(choices.size < 4){
        const c = Math.max(2, ans + rnd(7) - 3);
        choices.add(c);
      }
      mg.problems.push({ q:a+' ＋ '+b+' ＝ ？', ans, choices:shuffle([...choices]) });
    }
  } else {
    for(let i=0;i<n;i++){
      const hour = 1+rnd(12);
      const choices = new Set([hour]);
      while(choices.size < 4) choices.add(1+rnd(12));
      mg.problems.push({ hour, ans:hour, choices:shuffle([...choices]) });
    }
  }
  screen = 'minigame';
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function handleMinigameInput(key){
  if(!mg) return;
  if(mg.idx >= mg.problems.length){
    if(key==='z') finishMinigame();
    return;
  }
  if(key==='left') mg.chosen = Math.max(0, mg.chosen-1);
  else if(key==='right') mg.chosen = Math.min(3, mg.chosen+1);
  else if(key==='up') mg.chosen = Math.max(0, mg.chosen-2);
  else if(key==='down') mg.chosen = Math.min(3, mg.chosen+2);
  else if(key==='z'){
    const p = mg.problems[mg.idx];
    if(p.choices[mg.chosen]===p.ans) mg.correct++;
    mg.idx++; mg.chosen = 0;
  }
}
function finishMinigame(){
  const total = mg.problems.length;
  const good = mg.correct >= Math.ceil(total*0.6);
  const reward = mg.reward;
  mg = null;
  screen = 'field';
  if(reward){
    if(good){
      addItem(reward);
      const pages = ['クイズに せいかい！「'+reward+'」を てにいれた！'];
      if(EQUIP_DATA[reward]) pages.push('ステータスがめんの「どうぐ」から そうびできるよ！');
      showDialog(pages);
    } else {
      addItem('きずぐすり');
      showDialog('ざんねん！きずぐすりを もらった！またちょうせんしてね。');
    }
  } else {
    addItem(good ? 'おおきなきずぐすり' : 'きずぐすり');
    showDialog(good ? 'よくできました！おおきなきずぐすりを もらった！' : 'ざんねん！きずぐすりを もらった！');
  }
}

function openStatus(){
  st = { tab:0, cursor:0, mode:'list', pickList:[], pickCursor:0, pickSlot:null, targetList:[], targetCursor:0, pendingItem:null, msg:'' };
  screen = 'status';
}
function handleStatusInput(key){
  if(st.mode==='list'){
    if(key==='left'){ st.tab = Math.max(0, st.tab-1); st.cursor=0; st.msg=''; }
    else if(key==='right'){ st.tab = Math.min(2, st.tab+1); st.cursor=0; st.msg=''; }
    else if(st.tab===1) handleItemTabInput(key);
    else if(st.tab===2) handleEquipTabInput(key);
    else if(key==='z'||key==='x') screen='field';
    if(st.tab!==1 && st.tab!==2 && key==='x') screen='field';
  }
  else if(st.mode==='pick'){
    if(key==='up') st.pickCursor = Math.max(0, st.pickCursor-1);
    else if(key==='down') st.pickCursor = Math.min(st.pickList.length-1, st.pickCursor+1);
    else if(key==='z'){
      const sel = st.pickList[st.pickCursor];
      if(sel==='はずす'){ unequipSlot(st.pickSlot); st.msg='そうびを はずした！'; }
      else if(sel){ equipItem(sel); st.msg=sel+'を そうびした！'; }
      st.mode='list';
    }
    else if(key==='x') st.mode='list';
  }
  else if(st.mode==='target'){
    if(key==='up') st.targetCursor = Math.max(0, st.targetCursor-1);
    else if(key==='down') st.targetCursor = Math.min(st.targetList.length-1, st.targetCursor+1);
    else if(key==='z'){
      const t = st.targetList[st.targetCursor];
      const c = CONSUMABLES[st.pendingItem];
      if(t && c && c.heal){
        removeItem(st.pendingItem);
        t.hp = Math.min(t.maxHP, t.hp + c.heal);
        st.msg = t.name+'のＨＰが '+c.heal+'かいふく！';
      }
      st.mode='list'; st.cursor=0;
    }
    else if(key==='x') st.mode='list';
  }
}
function handleItemTabInput(key){
  const items = G.items;
  if(key==='up') st.cursor = Math.max(0, st.cursor-1);
  else if(key==='down') st.cursor = Math.min(Math.max(0,items.length-1), st.cursor+1);
  else if(key==='z'){
    const item = items[st.cursor];
    if(!item){ screen='field'; return; }
    if(EQUIP_DATA[item.id]){
      // どうぐタブから直接そうびできる！
      equipItem(item.id);
      st.msg = item.id+'を そうびした！';
      st.cursor = 0;
    } else if(CONSUMABLES[item.id] && CONSUMABLES[item.id].heal){
      st.pendingItem = item.id;
      st.targetList = [...G.party, ...G.cats];
      st.targetCursor = 0;
      st.mode = 'target';
    } else if(CONSUMABLES[item.id] && CONSUMABLES[item.id].battleDamage){
      st.msg = 'それは たたかいのときに つかおう！';
    }
  }
  else if(key==='x') screen='field';
}
function handleEquipTabInput(key){
  if(key==='up') st.cursor = Math.max(0, st.cursor-1);
  else if(key==='down') st.cursor = Math.min(SLOT_ORDER.length-1, st.cursor+1);
  else if(key==='z'){
    const slot = SLOT_ORDER[st.cursor];
    const owned = G.items.filter(i => EQUIP_DATA[i.id] && EQUIP_DATA[i.id].slot===slot).map(i=>i.id);
    const list = [...owned];
    if(G.equipment[slot]) list.push('はずす');
    if(list.length===0){ st.msg='この しゅるいの そうびを もっていない。'; return; }
    st.pickList = list;
    st.pickCursor = 0;
    st.pickSlot = slot;
    st.mode = 'pick';
  }
  else if(key==='x') screen='field';
}

function generateSaveCode(){
  let n = 0;
  n += (G.gender==='boy' ? 0 : 1);                    // x1
  n += G.area * 2;                                     // x2
  n += (G.catsFound[0]?1:0)*8 + (G.catsFound[1]?1:0)*16 + (G.catsFound[2]?1:0)*32;
  n += (G.bossDefeated[0]?1:0)*64 + (G.bossDefeated[1]?1:0)*128 + (G.bossDefeated[2]?1:0)*256;
  n += (Math.min(G.party[0].lv, MAX_LV)-1) * 512;      // 0-9
  n += Math.min(Math.floor(G.gold/10), 99) * 5120;
  let code = '';
  let tmp = n;
  for(let i=0;i<8;i++){ code += CHARS[tmp%36]; tmp = Math.floor(tmp/36); }
  let sum = 0;
  for(const c of code) sum += CHARS.indexOf(c);
  code += CHARS[sum%36];
  code += CHARS[(sum*7+3)%36];
  return code;
}
function applySaveCode(code){
  code = (code||'').toUpperCase();
  if(code.length < 10) return false;
  for(const ch of code){ if(CHARS.indexOf(ch) < 0) return false; }
  let sum = 0;
  for(let i=0;i<8;i++) sum += CHARS.indexOf(code[i]);
  if(CHARS[sum%36] !== code[8]) return false;
  if(CHARS[(sum*7+3)%36] !== code[9]) return false;
  let n = 0;
  for(let i=7;i>=0;i--){ n = n*36 + CHARS.indexOf(code[i]); }
  const gender = (n%2)===0 ? 'boy' : 'girl'; n = Math.floor(n/2);
  const area = n%4; n = Math.floor(n/4);
  const cats = [n%2===1, Math.floor(n/2)%2===1, Math.floor(n/4)%2===1]; n = Math.floor(n/8);
  const bosses = [n%2===1, Math.floor(n/2)%2===1, Math.floor(n/4)%2===1]; n = Math.floor(n/8);
  const lv = (n%10)+1; n = Math.floor(n/10);
  const gold = (n%100)*10;
  initGame(gender, gender==='boy'?'ゆうき':'はな');
  G.area = area; G.catsFound = [...cats]; G.bossDefeated = [...bosses]; G.gold = gold;
  for(const m of G.party){
    while(m.lv < lv){ m.exp = EXP_TABLE[m.lv+1]; checkLevelUp(m); }
    m.hp = m.maxHP; m.mp = m.maxMP;
  }
  for(let i=0;i<3;i++){ if(cats[i]) G.cats.push(makeCat(i)); }
  return true;
}
function handleSaveInput(key){
  if(key==='z'||key==='x') screen='field';
}
function handleLoadInput(key){
  if(key==='left') load.cursor = Math.max(0, load.cursor-1);
  else if(key==='right') load.cursor = Math.min(9, load.cursor+1);
  else if(key==='up'){
    const i = CHARS.indexOf(load.chars[load.cursor]);
    load.chars[load.cursor] = CHARS[(i+1)%36];
  }
  else if(key==='down'){
    const i = CHARS.indexOf(load.chars[load.cursor]);
    load.chars[load.cursor] = CHARS[(i+35)%36];
  }
  else if(key==='z'){
    const code = load.chars.join('');
    if(applySaveCode(code)){
      screen='field';
      showDialog('ぼうけんの つづきを はじめよう！');
    } else {
      screen='title';
      // タイトルに戻ってメッセージ
      setTimeout(()=>{},0);
      loadError = 60;
    }
  }
  else if(key==='x') screen='title';
}
let loadError = 0;

// =====================================================================
//  入力
// =====================================================================
function processInput(key){
  if(screen==='title'){
    if(key==='up'||key==='down') titleCursor = titleCursor===0 ? 1 : 0;
    else if(key==='z'){
      if(titleCursor===0){ screen='gender'; genderCursor=0; }
      else { screen='load'; load = { chars:Array(10).fill('A'), cursor:0 }; }
    }
  }
  else if(screen==='gender'){
    if(key==='left'||key==='right') genderCursor = genderCursor===0 ? 1 : 0;
    else if(key==='z'){
      nameInput='';
      screen='nameInput';
      showHiraganaKeyboard(true);
    }
    else if(key==='x') screen='title';
  }
  else if(screen==='nameInput'){
    if(key==='z') confirmName();
    else if(key==='x') nameInput = nameInput.slice(0,-1);
  }
  else if(screen==='opening'){
    if(key==='z'){ openingPage++; if(openingPage >= OPENING_TEXTS.length) screen='field'; }
  }
  else if(screen==='field') handleFieldInput(key);
  else if(screen==='dialog') handleDialogInput(key);
  else if(screen==='battle') handleBattleInput(key);
  else if(screen==='shop') handleShopInput(key);
  else if(screen==='status') handleStatusInput(key);
  else if(screen==='minigame') handleMinigameInput(key);
  else if(screen==='save') handleSaveInput(key);
  else if(screen==='load') handleLoadInput(key);
  else if(screen==='ending'){ if(key==='z') resetToTitle(); }
}
function resetToTitle(){
  // マップを初期状態に戻すためリロード
  if(typeof location !== 'undefined') location.reload();
  else screen='title';
}
function confirmName(){
  if(screen!=='nameInput') return;
  if(nameInput.length < 1 || nameInput.length > 6) return;
  showHiraganaKeyboard(false);
  initGame(genderCursor===0?'boy':'girl', nameInput);
  screen='opening';
  openingPage=0;
}

function drawClockFace(cx,cy,r,hour){
  ctx.beginPath(); ctx.arc(cx*SCALE,cy*SCALE,r*SCALE,0,Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill(); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  for(let h2=1;h2<=12;h2++){
    const angle = (h2/12)*Math.PI*2 - Math.PI/2;
    const mx = cx+Math.cos(angle)*(r-7), my = cy+Math.sin(angle)*(r-7);
    ctx.fillStyle='#000'; ctx.font=(6*SCALE)+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(h2+'', mx*SCALE, my*SCALE);
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  const ha = ((hour%12)/12)*Math.PI*2 - Math.PI/2;
  ctx.beginPath(); ctx.moveTo(cx*SCALE,cy*SCALE);
  ctx.lineTo((cx+Math.cos(ha)*r*0.5)*SCALE,(cy+Math.sin(ha)*r*0.5)*SCALE);
  ctx.strokeStyle='#000'; ctx.lineWidth=3*SCALE; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx*SCALE,cy*SCALE); ctx.lineTo(cx*SCALE,(cy-r*0.72)*SCALE);
  ctx.strokeStyle='#000'; ctx.lineWidth=2*SCALE; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx*SCALE,cy*SCALE,3*SCALE,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill();
}

  ctx.fillStyle='#0a0a22'; ctx.fillRect(0,0,640,480);
  for(let i=0;i<60;i++){
    ctx.fillStyle=['#ffdd00','#ff88ff','#88ffff'][i%3];
    ctx.fillRect(((i*53+titleAnim)%320)*SCALE, ((i*37+titleAnim*0.7)%240)*SCALE, SCALE*2, SCALE*2);
  }
  txtC('ネズミ大王を たおした！',45,'#ffdd00',10);
  txtC('シャロ、ゆき、ほたてと いっしょに',75,'#fff',7);
  txtC('おうちに かえろう！',92,'#fff',7);
  drawCatSprite(70,110,0); drawCatSprite(150,110,1); drawCatSprite(230,110,2);
  drawMama(90,145); drawHero(150,145,G?G.gender:'boy'); drawPapa(210,145);
  txtC('～ おしまい ～',190,'#ffcc44',9);
  txtC('あそんでくれて ありがとう！',208,'#fff',7);
  txtC('けってい で タイトルへ',225,'#8888ff',6);
}

// ---- メインループ ----
function render(){
  if(!ctx) return;
  titleAnim++;
  if(fieldMoveDelay>0) fieldMoveDelay--;
  if(loadError>0) loadError--;
  try {
    // 毎フレーム全画面をクリア（前の画面の描き残りを防ぐ）
    ctx.fillStyle='#0a0a22'; ctx.fillRect(0,0,640,480);
    switch(screen){
      case 'title': drawTitle(); break;
      case 'gender': drawGender(); break;
      case 'nameInput': drawNameInput(); break;
      case 'opening': drawOpening(); break;
      case 'field': drawField(); break;
      case 'dialog': drawDialog(); break;
      case 'battle': if(B) drawBattle(); break;
      case 'shop': drawShop(); break;
      case 'status': drawStatus(); break;
      case 'minigame': if(mg) drawMinigame(); break;
      case 'save': drawSave(); break;
      case 'load': drawLoad(); break;
      case 'ending': drawEnding(); break;
    }
  } catch(err){
    // 描画エラーでゲームが止まらないように
    console.error(err);
  }
  requestAnimationFrame(render);
}

// =====================================================================
//  ひらがなキーボード
// =====================================================================
function buildHiraganaKeyboard(){
  const kb = document.getElementById('hiragana-keyboard');
  kb.innerHTML = '';
  for(const row of HIRAGANA_ROWS){
    for(const ch of row){
      const b = document.createElement('div');
      b.className = 'hira-btn';
      b.textContent = ch;
      b.addEventListener('pointerdown', e => { e.preventDefault(); if(screen==='nameInput' && nameInput.length<6) nameInput+=ch; });
      kb.appendChild(b);
    }
  }
  const del = document.createElement('div');
  del.className = 'hira-btn hira-special';
  del.textContent = 'けす';
  del.addEventListener('pointerdown', e => { e.preventDefault(); nameInput = nameInput.slice(0,-1); });
  kb.appendChild(del);
  const ok = document.createElement('div');
  ok.className = 'hira-btn hira-special';
  ok.textContent = 'おわり';
  ok.style.background='#1a4a1a'; ok.style.borderColor='#44aa44';
  ok.addEventListener('pointerdown', e => { e.preventDefault(); confirmName(); });
  kb.appendChild(ok);
}
function showHiraganaKeyboard(show){
  if(typeof document === 'undefined') return;
  const kb = document.getElementById('hiragana-keyboard');
  if(!kb) return;
  if(show){ buildHiraganaKeyboard(); kb.classList.add('active'); }
  else kb.classList.remove('active');
}

// =====================================================================
//  起動（ブラウザのみ）
// =====================================================================
function boot(){
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  const keyMap = { 'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
    'z':'z','Z':'z','Enter':'z',' ':'z','x':'x','X':'x','Escape':'x','Backspace':'x' };
  document.addEventListener('keydown', e => {
    const k = keyMap[e.key];
    if(k){ processInput(k); e.preventDefault(); }
  });

  // ボタン（押しっぱなしで連続移動）
  let repeatTimer = null;
  function bindBtn(id, key, repeat){
    const el = document.getElementById(id);
    if(!el) return;
    const press = e => {
      e.preventDefault();
      processInput(key);
      if(repeat){
        clearInterval(repeatTimer);
        repeatTimer = setInterval(()=>processInput(key), 160);
      }
    };
    const release = e => { if(repeat) clearInterval(repeatTimer); };
    el.addEventListener('pointerdown', press);
    el.addEventListener('pointerup', release);
    el.addEventListener('pointerleave', release);
    el.addEventListener('pointercancel', release);
  }
  bindBtn('btn-up','up',true); bindBtn('btn-down','down',true);
  bindBtn('btn-left','left',true); bindBtn('btn-right','right',true);
  bindBtn('btn-z','z',false); bindBtn('btn-x','x',false);

  document.getElementById('btn-save').addEventListener('pointerdown', e => {
    e.preventDefault();
    if(screen==='field'){ G.saveCode = generateSaveCode(); screen='save'; }
  });
  document.getElementById('btn-status').addEventListener('pointerdown', e => {
    e.preventDefault();
    if(screen==='field') openStatus();
  });

  render();
}
if(typeof document !== 'undefined' && typeof requestAnimationFrame !== 'undefined'){
  boot();
}
