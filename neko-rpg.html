function checkLevelUp(m) {
  let leveled=false;
  while(m.lv<10 && (m.exp||0)>=EXP_TABLE[m.lv+1]){
    m.lv++;leveled=true;
    if(m.type==='hero'){m.maxHP+=5;m.maxMP+=8;m.atk+=1;m.def+=1;m.mag+=3;m.spd+=1;m.spells=getHeroSpells(m.lv);}
    else if(m.type==='mama'){m.maxHP+=6;m.maxMP+=5;m.atk+=1;m.def+=2;m.mag+=2;m.spd+=1;m.spells=getMamaSpells(m.lv);}
    else if(m.type==='papa'){m.maxHP+=8;m.maxMP+=1;m.atk+=3;m.def+=2;m.mag+=1;m.spd+=1;}
    m.hp=Math.min(m.hp+5,m.maxHP);
  }
  return leveled;
}

    color:d.color,boss:!!d.boss,magic:!!d.magic,alive:true};
}

function spawnEnemies(area,bossName) {
  if(bossName)return[makeEnemy(bossName)];
  const pool=AREA_ENEMIES[area];
  const count=Math.random()<0.3?2:1;
  const enemies=[];
  for(let i=0;i<count;i++)enemies.push(makeEnemy(pool[Math.floor(Math.random()*pool.length)]));
  return enemies;
}

function getLiveParty(){return[...G.party.filter(m=>m.alive),...G.cats.filter(m=>m.alive)];}
function getLiveEnemies(){return battle.enemies.filter(e=>e.alive);}

function addItem(name){const e=G.items.find(i=>i.id===name);if(e)e.count++;else G.items.push({id:name,count:1});}

function applyEquipment(){
  const hero=G.party[0];
  let a=makeHero(G.gender);
  for(let i=1;i<hero.lv;i++){a.atk+=1;a.def+=1;a.mag+=3;}
  hero.atk=a.atk;hero.def=a.def;hero.mag=a.mag;
  for(const eq of Object.values(G.equipment)){
    if(!eq)continue;
    if(eq.stat==='atk')hero.atk+=eq.val;
    else if(eq.stat==='def')hero.def+=eq.val;
    else if(eq.stat==='mag')hero.mag+=eq.val;
    if(eq.type==='armor'){hero.def+=8;hero.atk+=2;}
  }
}

function processInput(key) {
  if(currentScreen==='title'){
    if(key==='up'||key==='down')titleCursor=titleCursor===0?1:0;
    else if(key==='z'){if(titleCursor===0){currentScreen='gender';genderCursor=0;}else{currentScreen='load';loadInput='';loadCursor=0;}}
  }else if(currentScreen==='gender'){
    if(key==='left'||key==='right')genderCursor=genderCursor===0?1:0;
    else if(key==='z'){
      // go to name input
      nameInput='';
      currentScreen='nameInput';
      buildHiraganaKeyboard();
      showHiraganaKeyboard(true);
    }
    else if(key==='x')currentScreen='title';
  }else if(currentScreen==='nameInput'){
    if(key==='z'){confirmName();}
    else if(key==='x'){nameInput=nameInput.slice(0,-1);}
  }else if(currentScreen==='opening'){
    if(key==='z'){openingPage++;if(openingPage>=OPENING_TEXTS.length)currentScreen='field';}
  }else if(currentScreen==='field'){handleFieldInput(key);}
  else if(currentScreen==='battle'){handleBattleInput(key);}
  else if(currentScreen==='dialog'){handleDialogInput(key);}
  else if(currentScreen==='npcDialog'){handleNpcDialogInput(key);}
  else if(currentScreen==='minigame'){handleMinigameInput(key);}
  else if(currentScreen==='save'){if(key==='z'||key==='x')currentScreen='field';}
  else if(currentScreen==='status'){handleStatusInput(key);}
  else if(currentScreen==='load'){handleLoadInput(key);}
  else if(currentScreen==='shop'){handleShopInput(key);}
  else if(currentScreen==='ending'){if(key==='z')currentScreen='title';}
}

function startNpcDialog(npcIdx) {
  npcTalkIdx = npcIdx;
  npcMsgPage = 0;

}
function handleNpcDialogInput(key) {

function handleFieldInput(key){
  if(fieldMoveDelay>0)return;
  if(key==='z'){checkInteract();return;}
  if(key==='x'){showSaveScreen();return;}
  let nx=G.px,ny=G.py;
  if(key==='up'){ny--;G.facing='up';}
  else if(key==='down'){ny++;G.facing='down';}
  else if(key==='left'){nx--;G.facing='left';}
  else if(key==='right'){nx++;G.facing='right';}
  else return;
  if(nx<0||nx>=16||ny<0||ny>=15)return;
  const tile=MAPS[G.area][ny][nx];
  if(tile===T.WALL||tile===T.WATER||tile===T.TREE||tile===T.HOUSE)return;
  // NPC collision
  if(isNPCAt(G.area,nx,ny))return;
  if(tile===T.DOOR){handleDoor(nx,ny);return;}
  G.px=nx;G.py=ny;fieldMoveDelay=8;
  checkTileEvents();
  if([T.GRASS,T.PATH,T.SAND,T.FLOWER].includes(tile)){
    G.stepCount++;
    G.stepsToNextBattle--;
    if(G.stepsToNextBattle<=0){G.stepsToNextBattle=(G.area+1)*8+Math.floor(Math.random()*8);startBattle(null);}
  }
}

function isNPCAt(area,x,y) {
  const npcs = NPC_DATA[area] || [];
  return npcs.some(n=>n.x===x&&n.y===y);
}

function checkTileEvents(){
  const tile=MAPS[G.area][G.py][G.px];
  if(tile===T.CAT){
    const ci=G.area;
    if(ci<3&&!G.catsFound[ci])triggerCatEvent(ci);
  }else if(tile===T.BOSS){triggerBossEvent();}
  else if(tile===T.SHOP){openShop();}
}

function checkInteract(){
  let fx=G.px,fy=G.py;
  if(G.facing==='up')fy--;else if(G.facing==='down')fy++;
  else if(G.facing==='left')fx--;else if(G.facing==='right')fx++;
  if(fx<0||fx>=16||fy<0||fy>=15)return;
  const tile=MAPS[G.area][fy][fx];
  if(tile===T.SHOP)openShop();
  else if(tile===T.CHEST){
    // find which chest config matches
    const chestConf = (CHEST_CONFIGS[G.area]||[]).find(c=>c.x===fx&&c.y===fy);
    if(chestConf){
      if(G.openedChests[chestConf.id]){
        showDialog([['このはこは　もう　あいている。']]);
      } else {
        G.openedChests[chestConf.id]=true;
        MAPS[G.area][fy][fx]=T.PATH;
        openChest(chestConf.id);
      }
    }
  }else if(tile===T.CAT){const ci=G.area;if(ci<3&&!G.catsFound[ci])triggerCatEvent(ci);}
  else if(tile===T.BOSS)triggerBossEvent();
  else {
    // Check NPC adjacency
    const area=G.area;
    const npcs=NPC_DATA[area]||[];
    const npcIdx=npcs.findIndex(n=>n.x===fx&&n.y===fy);
    if(npcIdx>=0){startNpcDialog(npcIdx);}
  }
}

function openChest(chestId) {

    addItem(item);
    showDialog([[heroName()+'は　たから箱を　あけた！'],['「'+item+'」をてにいれた！']]);
  }
}

function handleDoor(nx,ny){

function showSaveScreen(){G.saveCode=generateSaveCode();currentScreen='save';}

function generateSaveCode(){
  let n=0;
  n+=(G.gender==='boy'?0:1);
  n+=G.area*2;
  n+=(G.catsFound[0]?1:0)*8+(G.catsFound[1]?1:0)*16+(G.catsFound[2]?1:0)*32;
  n+=(G.bossDefeated[0]?1:0)*64+(G.bossDefeated[1]?1:0)*128+(G.bossDefeated[2]?1:0)*256;
  n+=Math.min(G.party[0].lv,10)*512;
  n+=Math.min(Math.floor(G.gold/10),99)*5120;
  let code='';let tmp=n;
  for(let i=0;i<8;i++){code+=CHARS[tmp%36];tmp=Math.floor(tmp/36);}
  let sum=0;for(const c of code)sum+=CHARS.indexOf(c);
  code+=CHARS[sum%36];while(code.length<10)code+='A';
  return code;
}

function handleLoadInput(key){
  if(key==='up')loadCursor=Math.max(0,loadCursor-1);
  else if(key==='down')loadCursor=Math.min(9,loadCursor+1);
  else if(key==='left'){const idx=CHARS.indexOf(loadInput[loadCursor]||'A');const nc=CHARS[(idx+35)%36];loadInput=loadInput.substring(0,loadCursor)+nc+loadInput.substring(loadCursor+1);}
  else if(key==='right'){const idx=CHARS.indexOf(loadInput[loadCursor]||'A');const nc=CHARS[(idx+1)%36];loadInput=loadInput.substring(0,loadCursor)+nc+loadInput.substring(loadCursor+1);}
  else if(key==='z'){
    const code=(loadInput+'AAAAAAAAAA').slice(0,10);
    if(applySaveCode(code))currentScreen='field';
    else{showDialog([['そのじゅもんは　まちがっている！']]);currentScreen='title';}
  }else if(key==='x')currentScreen='title';
}

function applySaveCode(code){
  try{
    let n=0;for(let i=7;i>=0;i--){n=n*36+CHARS.indexOf(code[i]);}
    let sum=0;for(let i=0;i<8;i++)sum+=CHARS.indexOf(code[i]);
    if(CHARS[sum%36]!==code[8])return false;
    const gender=(n%2)===0?'boy':'girl';n=Math.floor(n/2);
    const area=n%4;n=Math.floor(n/4);
    const cats=[n%2===1,Math.floor(n/2)%2===1,Math.floor(n/4)%2===1];n=Math.floor(n/8);
    const bosses=[n%2===1,Math.floor(n/2)%2===1,Math.floor(n/4)%2===1];n=Math.floor(n/8);
    const lv=n%10+1;n=Math.floor(n/10);
    const gold=(n%100)*10;
    nameInput = gender==='boy'?'ゆうき':'はな';
    initGame(gender);G.area=area;G.catsFound=cats;G.bossDefeated=bosses;G.gold=gold;
    for(const m of G.party){while(m.lv<lv){m.exp=EXP_TABLE[m.lv+1]||999;checkLevelUp(m);}}
    G.cats=[];for(let i=0;i<3;i++){if(cats[i])G.cats.push(getCatMember(i));}
    return true;
  }catch(e){return false;}
}

// BATTLE
function startBattle(bossName){
  battle={enemies:spawnEnemies(G.area,bossName),bossName,phase:'menu',cursor:0,
    spellCursor:0,itemCursor:0,targetCursor:0,pendingAction:null,
    messages:[],msgIdx:0,expGained:0,goldGained:0,resultPhase:null,lvUpQueue:[]};
  currentScreen='battle';
}

function handleBattleInput(key){
  if(battle.phase==='msg'){
    if(key==='z'){
      battle.msgIdx++;
      if(battle.msgIdx>=battle.messages.length){
        battle.messages=[];battle.msgIdx=0;
        if(battle.resultPhase==='win')handleBattleWin();
        else if(battle.resultPhase==='lose')handleBattleLose();
        else if(battle.resultPhase==='flee')currentScreen='field';
        else if(battle.resultPhase==='lvup'){if(battle.lvUpQueue.length>0)showLvUp();else currentScreen='field';}
        else{battle.phase='menu';battle.cursor=0;}
      }
    }
    return;
  }
  if(battle.phase==='menu'){
    if(key==='up')battle.cursor=(battle.cursor+3)%4;
    else if(key==='down')battle.cursor=(battle.cursor+1)%4;
    else if(key==='z')selectBattleCmd();
  }else if(battle.phase==='spellmenu'){
    const hero=G.party[0];
    if(key==='up')battle.spellCursor=Math.max(0,battle.spellCursor-1);
    else if(key==='down')battle.spellCursor=Math.min(hero.spells.length-1,battle.spellCursor+1);
    else if(key==='z'){
      const sp=hero.spells[battle.spellCursor];
      if(sp&&hero.mp>=sp.mp){battle.pendingAction={type:'spell',spell:sp};if(sp.target==='one'){battle.phase='enemyselect';battle.targetCursor=0;}else executeHeroAction(battle.pendingAction,null);}
      else{battle.messages=['MPが　たりない！'];battle.msgIdx=0;battle.phase='msg';}
    }else if(key==='x')battle.phase='menu';
  }else if(battle.phase==='itemmenu'){
    const usable=G.items.filter(i=>i.count>0&&ITEM_EFFECTS[i.id]);
    if(key==='up')battle.itemCursor=Math.max(0,battle.itemCursor-1);
    else if(key==='down')battle.itemCursor=Math.min(usable.length-1,battle.itemCursor+1);
    else if(key==='z'){
      const item=usable[battle.itemCursor];
      if(item){const r=ITEM_EFFECTS[item.id](G.party[0]);item.count--;battle.messages=[r];battle.msgIdx=0;battle.phase='msg';}
    }else if(key==='x')battle.phase='menu';
  }else if(battle.phase==='enemyselect'){
    const enemies=getLiveEnemies();
    if(key==='left')battle.targetCursor=Math.max(0,battle.targetCursor-1);
    else if(key==='right')battle.targetCursor=Math.min(enemies.length-1,battle.targetCursor+1);
    else if(key==='z'){executeHeroAction(battle.pendingAction,enemies[battle.targetCursor]);}
    else if(key==='x')battle.phase=battle.pendingAction&&battle.pendingAction.type==='spell'?'spellmenu':'menu';
  }
}

function selectBattleCmd(){
  const cmd=BATTLE_CMDS[battle.cursor];const hero=G.party[0];
  if(cmd==='こうげき'){battle.pendingAction={type:'attack'};battle.phase='enemyselect';battle.targetCursor=0;}
  else if(cmd==='じゅもん'){if(hero.spells.length===0){battle.messages=['じゅもんを　しらない！'];battle.msgIdx=0;battle.phase='msg';return;}battle.phase='spellmenu';battle.spellCursor=0;}
  else if(cmd==='どうぐ'){const u=G.items.filter(i=>i.count>0&&ITEM_EFFECTS[i.id]);if(u.length===0){battle.messages=['どうぐが　ない！'];battle.msgIdx=0;battle.phase='msg';return;}battle.phase='itemmenu';battle.itemCursor=0;}
  else if(cmd==='にげる'){if(battle.bossName){battle.messages=['ボスからは　にげられない！'];battle.msgIdx=0;battle.phase='msg';}else{battle.messages=['うまく　にげた！'];battle.msgIdx=0;battle.resultPhase='flee';battle.phase='msg';}}
}

function executeHeroAction(action,target){
  const hero=G.party[0];const msgs=[];
  if(action.type==='attack'){
    const dmg=Math.max(1,hero.atk-(target.def||0)+Math.floor(Math.random()*4)-1);
    target.hp-=dmg;msgs.push(hero.name+'の　こうげき！');msgs.push(target.name+'に　'+dmg+'ダメージ！');
    if(target.hp<=0){target.alive=false;target.hp=0;msgs.push(target.name+'を　やっつけた！');}
  }else if(action.type==='spell'){
    const sp=action.spell;hero.mp-=sp.mp;msgs.push(hero.name+'の　'+sp.name+'！');
    if(sp.type==='magic'){
      const targets=sp.target==='all'?getLiveEnemies():[target];
      for(const t of targets){
        const dmg=Math.max(1,Math.floor(hero.mag*sp.power)-Math.floor(t.def/2));
        t.hp-=dmg;msgs.push(t.name+'に　'+dmg+'ダメージ！');
        if(t.hp<=0){t.alive=false;t.hp=0;msgs.push(t.name+'を　やっつけた！');}
      }
    }
  }
  // Party auto-actions
  for(const m of [...G.party.filter(m=>m.alive&&m.type!=='hero'),...G.cats.filter(c=>c.alive)]){
    autoMemberAction(m,msgs);
  }
  // Enemy actions
  for(const e of getLiveEnemies()){enemyAction(e,msgs);}
  // Check outcome
  const allDead=getLiveParty().every(m=>!m.alive);
  const enemiesDead=getLiveEnemies().length===0;
  if(enemiesDead){
    battle.resultPhase='win';
    battle.expGained=battle.enemies.reduce((s,e)=>s+e.exp,0);
    battle.goldGained=battle.enemies.reduce((s,e)=>s+e.gold,0);
    msgs.push('てきを　たおした！');msgs.push(battle.expGained+'EXP　'+battle.goldGained+'G　かくとく！');
  }else if(allDead){battle.resultPhase='lose';msgs.push('たおれてしまった...');}
  battle.messages=msgs;battle.msgIdx=0;battle.phase='msg';
}

function autoMemberAction(m,msgs){
  const enemies=getLiveEnemies();if(enemies.length===0)return;
  if(m.type==='mama'){
    const hurt=getLiveParty().find(p=>p.hp<p.maxHP*0.5);
    if(hurt&&m.mp>=5&&m.spells.length>0){
      const sp=m.spells[0];m.mp-=sp.mp;hurt.hp=Math.min(hurt.maxHP,hurt.hp+sp.power);
      msgs.push(m.name+'の　'+sp.name+'！');msgs.push(hurt.name+'のHPが　'+sp.power+'かいふく！');return;
    }
  }
  const t=enemies[Math.floor(Math.random()*enemies.length)];
  const dmg=Math.max(1,m.atk-Math.floor(t.def/2)+Math.floor(Math.random()*3));
  t.hp-=dmg;msgs.push(m.name+'の　こうげき！');msgs.push(t.name+'に　'+dmg+'ダメージ！');
  if(t.hp<=0){t.alive=false;t.hp=0;msgs.push(t.name+'を　やっつけた！');}
}

function enemyAction(e,msgs){
  const party=getLiveParty();if(party.length===0)return;
  const t=party[Math.floor(Math.random()*party.length)];
  const dmg=Math.max(1,e.atk-(t.def||0)+Math.floor(Math.random()*4)-1);
  t.hp-=dmg;msgs.push(e.name+'の　こうげき！');msgs.push(t.name+'に　'+dmg+'ダメージ！');
  if(t.hp<=0){t.alive=false;t.hp=0;msgs.push(t.name+'は　たおれた！');}
}

function handleBattleWin(){
  G.gold+=battle.goldGained;
  for(const m of G.party){m.exp=(m.exp||0)+battle.expGained;if(checkLevelUp(m))battle.lvUpQueue.push(m);}
  if(battle.bossName){
    const bi=['チュー助','シロチュー','ネズミ大王'].indexOf(battle.bossName);
    if(bi>=0){G.bossDefeated[bi]=true;MAPS[G.area][G.py][G.px]=T.PATH;
      if(battle.bossName==='ネズミ大王'){currentScreen='ending';return;}}
  }
  if(battle.lvUpQueue.length>0){battle.resultPhase='lvup';showLvUp();}else currentScreen='field';
}

function showLvUp(){
  const m=battle.lvUpQueue.shift();
  battle.messages=[m.name+'は　レベル'+m.lv+'に　あがった！','HP:'+m.maxHP+' ATK:'+m.atk+' DEF:'+m.def+' MAG:'+m.mag];
  battle.msgIdx=0;battle.phase='msg';
  battle.resultPhase=battle.lvUpQueue.length>0?'lvup':null;
}

function handleBattleLose(){
  for(const m of G.party){m.alive=true;m.hp=Math.max(1,Math.floor(m.maxHP/4));}
  for(const c of G.cats){c.alive=true;c.hp=c.maxHP;}
  G.area=0;G.px=7;G.py=13;currentScreen='field';
  showDialog([['きがついたら　うちに　もどっていた...','また　ちょうせんしよう！']]);
}

// MINIGAMES
function startMinigame(type){
  mg={type,problems:[],idx:0,answer:'',correct:0,chosen:0,clockChoices:[]};
  if(type==='math'){
    for(let i=0;i<5;i++){const a=1+Math.floor(Math.random()*9),b=1+Math.floor(Math.random()*9);mg.problems.push({a,b,ans:a+b});}
  }else{
    for(let i=0;i<6;i++)mg.problems.push({hour:1+Math.floor(Math.random()*12)});
  }
  currentScreen='minigame';
}

function handleMinigameInput(key){
  if(mg.type==='math'){
    if(mg.idx>=mg.problems.length){if(key==='z'||key==='x')finishMinigame();return;}
    if(key==='z'){
      const ans=parseInt(mg.answer);
      if(!isNaN(ans)&&mg.answer!==''){
        if(ans===mg.problems[mg.idx].ans)mg.correct++;
        mg.answer='';mg.idx++;
        if(mg.idx>=mg.problems.length){/* show result, wait for z */}
      }
    }else if(key==='x')mg.answer=mg.answer.slice(0,-1);
  }else{
    if(mg.idx>=mg.problems.length){if(key==='z'||key==='x')finishMinigame();return;}
    if(mg.clockChoices.length===0)generateClockChoices(mg.problems[mg.idx].hour);
    if(key==='left')mg.chosen=Math.max(0,mg.chosen-1);
    else if(key==='right')mg.chosen=Math.min(3,mg.chosen+1);
    else if(key==='up')mg.chosen=Math.max(0,mg.chosen-2);
    else if(key==='down')mg.chosen=Math.min(3,mg.chosen+2);
    else if(key==='z'){
      if(mg.clockChoices[mg.chosen]===mg.problems[mg.idx].hour)mg.correct++;
      mg.idx++;mg.chosen=0;mg.clockChoices=[];
      if(mg.idx>=mg.problems.length){/* show result */}
    }
  }
}

function generateClockChoices(correct){
  const s=new Set([correct]);while(s.size<4)s.add(1+Math.floor(Math.random()*12));
  mg.clockChoices=shuffle([...s]);mg.chosen=0;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function finishMinigame(){
  const total=mg.type==='math'?5:6;
  const good=mg.correct>=Math.ceil(total*0.7);
  if(chestMinigameReward){
    // chest minigame
    if(good){addItem(chestMinigameReward);showDialog([[heroName()+'は　ミニゲームに かった！'],['「'+chestMinigameReward+'」をてにいれた！']]);}
    else{addItem('きずぐすり');showDialog([['ざんねん！','きずぐすりを　もらった！']]);}
    chestMinigameReward=null;
  } else {
    if(good){addItem('おおきなきずぐすり');showDialog([['よくできました！','おおきなきずぐすり　をもらった！']]);}
    else{addItem('きずぐすり');showDialog([['ざんねん！','きずぐすりを　もらった！']]);}
  }
}

function drawClockFace(cx,cy,r,hour){
  ctx.beginPath();ctx.arc(cx*SCALE,cy*SCALE,r*SCALE,0,Math.PI*2);
  ctx.fillStyle='#ffffff';ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();
  for(let h=1;h<=12;h++){
    const angle=(h/12)*Math.PI*2-Math.PI/2;
    const mx=cx+Math.cos(angle)*(r-7),my=cy+Math.sin(angle)*(r-7);
    ctx.fillStyle='#000';ctx.font=`${7*SCALE}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(h+'',mx*SCALE,my*SCALE);
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  const ha=((hour%12)/12)*Math.PI*2-Math.PI/2;
  ctx.beginPath();ctx.moveTo(cx*SCALE,cy*SCALE);ctx.lineTo((cx+Math.cos(ha)*r*0.55)*SCALE,(cy+Math.sin(ha)*r*0.55)*SCALE);
  ctx.strokeStyle='#000';ctx.lineWidth=3*SCALE;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx*SCALE,cy*SCALE);ctx.lineTo(cx*SCALE,(cy-r*0.72)*SCALE);
  ctx.strokeStyle='#000';ctx.lineWidth=2*SCALE;ctx.stroke();
  ctx.beginPath();ctx.arc(cx*SCALE,cy*SCALE,3*SCALE,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
}

function drawCanvasKeyboard(){
  for(let r=0;r<CKB_ROWS.length;r++){
    const row=CKB_ROWS[r];
    for(let c=0;c<row.length;c++){
      const ch=row[c];if(!ch)continue;
      const bx=CKB_START_X+c*(CKB_BTN_W+CKB_GAP);
      const by=CKB_START_Y+r*(CKB_BTN_H+CKB_GAP);
      drawKBBtn(bx,by,CKB_BTN_W,CKB_BTN_H,ch,'#2a2a4a','#555555');
    }
  }
  // 特殊行（ょ / けす / おわり）
  const sy=CKB_START_Y+CKB_ROWS.length*(CKB_BTN_H+CKB_GAP);
  drawKBBtn(1,sy,30,CKB_BTN_H,'ょ','#2a2a4a','#555555');
  drawKBBtn(33,sy,137,CKB_BTN_H,'けす','#4a2a2a','#aa4444');
  const okLen=nameInput.length>=2;
  drawKBBtn(172,sy,147,CKB_BTN_H,'おわり',okLen?'#1a4a1a':'#2a3a2a',okLen?'#44aa44':'#445544');
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

// Canvas上のタップ/クリックをゲーム座標に変換して処理
function handleCanvasTap(cx,cy){
  if(currentScreen!=='nameInput')return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const gx=((cx-rect.left)*scaleX)/SCALE;
  const gy=((cy-rect.top)*scaleY)/SCALE;
  // 通常行チェック
  for(let r=0;r<CKB_ROWS.length;r++){
    const row=CKB_ROWS[r];
    for(let c=0;c<row.length;c++){
      const ch=row[c];if(!ch)continue;
      const bx=CKB_START_X+c*(CKB_BTN_W+CKB_GAP);
      const by=CKB_START_Y+r*(CKB_BTN_H+CKB_GAP);
      if(gx>=bx&&gx<bx+CKB_BTN_W&&gy>=by&&gy<by+CKB_BTN_H){inputHiragana(ch);return;}
    }
  }
  // 特殊行チェック
  const sy=CKB_START_Y+CKB_ROWS.length*(CKB_BTN_H+CKB_GAP);
  if(gy>=sy&&gy<sy+CKB_BTN_H){
    if(gx>=1&&gx<31){inputHiragana('ょ');return;}
    if(gx>=33&&gx<170){deleteHiragana();return;}
    if(gx>=172&&gx<319){confirmName();return;}
  }
}

// SHOP
function drawShop(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,640,480);
  box2(0,0,320,240,'#0a0a1a','#8844cc');
  txtC('おみせ',14,'#ffff00',9);txt('もちきん：'+G.gold+'G',195,14,'#ffff00',7);
  box2(0,18,320,208,'#000022','#553399');
  for(let i=0;i<SHOP_ITEMS.length;i++){
    const item=SHOP_ITEMS[i];const y=30+i*24;const sel=shopCursor===i;
    if(sel)px2(2,y-8,316,18,'#33116a');
    txt(sel?'▶':' ',3,y,'#ff0',7);txt(item.name,14,y,'#fff',7);
    txt(item.price+'G',240,y,'#ff0',7);
    if(item.stat)txt(item.stat.toUpperCase()+'+'+item.val,175,y,'#8ff',6);
  }
  txt('↑↓えらぶ　けってい かう　キャンセル でる',4,225,'#888',5);
}

// ENDING
function drawEnding(){
  ctx.fillStyle='#001133';ctx.fillRect(0,0,640,480);
  for(let i=0;i<20;i++){ctx.fillStyle=['#f00','#fff0','#0f0','#08f','#f0f'][i%5];ctx.fillRect(((i*37+titleAnim*2)%320)*SCALE,((i*23)%90)*SCALE,4*SCALE,4*SCALE);}
  txtC('おめでとう！',50,'#ffff00',13);
  txtC('ネズミ大王を　たおした！',75,'#fff',8);
  txtC('３びきの　ネコも　みつけた！',95,'#44ff44',7);
  drawHero(50,108,G.gender||'boy');drawMama(90,108);drawPapa(130,108);
  drawCat(174,112,0);drawCat(198,112,1);drawCat(222,112,2);
  txtC('みんなで　しあわせに　くらしましたとさ。',168,'#fff',7);
  txtC('おわり',195,'#ffff00',11);
  txt('けってい で　タイトルへ',80,230,'#888',6);
}

// Save shortcut
document.addEventListener('keydown',e=>{if(e.key==='s'&&currentScreen==='field'){showSaveScreen();e.preventDefault();}});

// MAIN LOOP
let lastTime=0;
function gameLoop(ts){
  const dt=ts-lastTime;lastTime=ts;
  if(fieldMoveDelay>0)fieldMoveDelay--;
  titleAnim+=dt*0.03;
  cls();
  if(currentScreen==='title')drawTitle();
  else if(currentScreen==='gender')drawGenderSelect();
  else if(currentScreen==='nameInput')drawNameInput();
  else if(currentScreen==='opening')drawOpening();
  else if(currentScreen==='field')drawField();
  else if(currentScreen==='battle')drawBattle();
  else if(currentScreen==='dialog')drawDialog();
  else if(currentScreen==='npcDialog')drawNpcDialog();
  else if(currentScreen==='minigame')drawMinigame();
  else if(currentScreen==='save')drawSave();
  else if(currentScreen==='load')drawLoad();
  else if(currentScreen==='shop')drawShop();
  else if(currentScreen==='status')drawStatus();
  else if(currentScreen==='ending')drawEnding();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
