<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ねこランナー大作戦3 🐱🐭</title>
<style>
  :root{ --ink:#4a3f35; --cream:#fff8ec; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#bfe6f2;
    font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","Yu Gothic UI","Meiryo",sans-serif;
    touch-action:none;-webkit-user-select:none;user-select:none;}
  #wrap{position:relative;height:100%;display:flex;align-items:center;justify-content:center;}
  canvas{display:block;border-radius:6px;}
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;text-align:center;
    background:rgba(80,60,90,.45);backdrop-filter:blur(3px);color:#fff;padding:20px;
  }
  .card{
    background:var(--cream);color:var(--ink);border-radius:24px;
    padding:24px 26px;max-width:350px;box-shadow:0 10px 30px rgba(60,40,20,.35);
    border:4px solid #fff;
  }
  .card h1{font-size:24px;margin-bottom:10px;letter-spacing:1px;}
  .card p{font-size:13.5px;line-height:1.75;}
  .big{font-size:40px;margin:6px 0;}
  button.go{
    font-family:inherit;font-size:19px;font-weight:bold;color:#fff;
    background:linear-gradient(#ffa36b,#ff7e4f);border:none;border-radius:999px;
    padding:13px 44px;cursor:pointer;box-shadow:0 6px 0 #d95f33;letter-spacing:2px;
  }
  button.go:active{transform:translateY(4px);box-shadow:0 2px 0 #d95f33;}
  .stageRow{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:6px;max-width:280px;margin-left:auto;margin-right:auto;}
  .stageBtn{
    font-family:inherit;width:42px;height:42px;border-radius:13px;border:none;
    font-size:18px;font-weight:bold;cursor:pointer;color:#fff;
    background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 4px 0 #3f8a3f;
  }
  .stageBtn:disabled{background:#cfc9bf;box-shadow:0 4px 0 #aaa49a;cursor:not-allowed;color:#fff8;}
  .stageBtn:active:not(:disabled){transform:translateY(3px);box-shadow:0 1px 0 #3f8a3f;}
  #muteBtn{
    position:absolute;top:10px;right:10px;z-index:5;font-size:18px;
    background:rgba(255,255,255,.85);border:none;border-radius:50%;
    width:40px;height:40px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .hidden{display:none !important;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <button id="muteBtn" title="音のオン/オフ">🔊</button>

  <div id="startScreen" class="overlay">
    <div class="card">
      <h1>🐱 ねこランナー大作戦3 🐭</h1>
      <p>
        <b>キジちゃん・シロちゃん・チャトラくん</b>の<br>
        3にゃん軍団で、いたずらネズミたちを退治!<br><br>
        ドラッグで左右にうごかし、柱をこわして仲間を集めよう。
        <b>同じ数字どうしは合体</b>してパワーアップ!<br>
        60秒後にまちうける<b>ボスネズミ</b>をたおせ!
      </p>
      <p style="margin-top:8px;font-size:12.5px;">
        🟩 みどりのゲート = いいこと / 🟥 あか・トゲ = わるいこと<br>
        ぜんぶで10ステージ。だんだん手ごわくなるよ!
      </p>
      <div class="stageRow" id="stageRow"></div>
    </div>
    <button class="go" id="startBtn">スタート!</button>
  </div>

  <div id="resultScreen" class="overlay hidden">
    <div class="card">
      <h1 id="resultTitle"></h1>
      <div class="big" id="resultEmoji"></div>
      <p id="resultText"></p>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="go" id="retryBtn">もういちど</button>
      <button class="go hidden" id="nextBtn" style="background:linear-gradient(#8fd07f,#5cab5c);box-shadow:0 6px 0 #3f8a3f;">つぎへ ▶</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ================= 基本設定 ================= */
const W = 420, H = 740;
const ROAD_L = 56, ROAD_R = W - 56;
const PLAYER_Y = 590;
const RUN_TIME = 60;

/* ステージごとの設定(だんだん手ごわく) */
const STAGES = [
  { speed:128, bossTime:22, mice:[{v:0,hp:500}],                            hpScale:1.00, badBias:0.00, cheese:2.6,  cheeseSpd:280, moveSpikes:false },
  { speed:136, bossTime:22, mice:[{v:1,hp:700}],                            hpScale:1.20, badBias:0.08, cheese:2.4,  cheeseSpd:295, moveSpikes:false },
  { speed:144, bossTime:22, mice:[{v:2,hp:950}],                            hpScale:1.35, badBias:0.14, cheese:2.3,  cheeseSpd:310, moveSpikes:true  },
  { speed:156, bossTime:24, mice:[{v:0,hp:720},{v:1,hp:720}],               hpScale:1.70, badBias:0.22, cheese:2.1,  cheeseSpd:335, moveSpikes:true  },
  { speed:168, bossTime:28, mice:[{v:0,hp:560},{v:2,hp:850},{v:1,hp:560}],  hpScale:2.00, badBias:0.30, cheese:1.9,  cheeseSpd:360, moveSpikes:true  },
  { speed:172, bossTime:28, mice:[{v:0,hp:600},{v:2,hp:950},{v:1,hp:600}],  hpScale:2.10, badBias:0.32, cheese:1.85, cheeseSpd:370, moveSpikes:true  },
  { speed:176, bossTime:28, mice:[{v:0,hp:650},{v:2,hp:1050},{v:1,hp:650}], hpScale:2.25, badBias:0.34, cheese:1.8,  cheeseSpd:380, moveSpikes:true  },
  { speed:180, bossTime:30, mice:[{v:0,hp:680},{v:2,hp:1100},{v:1,hp:680}], hpScale:2.40, badBias:0.36, cheese:1.7,  cheeseSpd:390, moveSpikes:true  },
  { speed:184, bossTime:30, mice:[{v:0,hp:800},{v:2,hp:1400},{v:1,hp:800}], hpScale:2.55, badBias:0.38, cheese:1.6,  cheeseSpd:400, moveSpikes:true  },
  { speed:188, bossTime:28, mice:[{v:0,hp:950},{v:2,hp:1700},{v:1,hp:950}], hpScale:2.85, badBias:0.40, cheese:1.5,  cheeseSpd:415, moveSpikes:true  },
];
const MOUSE_NAMES = ["チュー助", "シロチュー", "ネズミ大王"];

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let viewScale = 1;
function fitCanvas(){
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  viewScale = s;
  cv.width  = Math.round(W * s * devicePixelRatio);
  cv.height = Math.round(H * s * devicePixelRatio);
  cv.style.width  = (W * s) + "px";
  cv.style.height = (H * s) + "px";
  ctx.setTransform(s * devicePixelRatio, 0, 0, s * devicePixelRatio, 0, 0);
}
window.addEventListener("resize", fitCanvas);
fitCanvas();

/* ================= サウンド ================= */
let audioCtx = null, muted = false;
const muteBtn = document.getElementById("muteBtn");
muteBtn.addEventListener("click", () => { muted = !muted; muteBtn.textContent = muted ? "🔇" : "🔊"; });
function beep(freq, dur, type, vol){
  if (muted || !audioCtx) return;
  try{
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    const level = Math.min((vol || 0.08) * 1.8, 0.18);
    g.gain.setValueAtTime(level, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
const sndJoin  = () => { beep(660,.12,"triangle",.1); beep(880,.18,"triangle",.08); };
const sndMerge = () => { beep(520,.1,"square",.05); beep(780,.12,"square",.05); beep(1040,.2,"square",.05); };
const sndGood  = () => beep(740,.15,"triangle",.09);
const sndBad   = () => beep(160,.25,"sawtooth",.09);
const sndBreak = () => beep(330,.08,"square",.05);
const sndSquick= () => beep(900,.1,"square",.06);
const sndWin   = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.25,"triangle",.1), i*140));
const sndLose  = () => [392,330,262].forEach((f,i)=>setTimeout(()=>beep(f,.3,"sawtooth",.07), i*200));

/* ================= ゲーム状態 ================= */
let state = "title";  // title / run / boss / result
let stageIdx = 0, unlocked = 0;   // unlocked: あそべる最大ステージ(0始まり)
let traveled = 0, runTimer = 0, bossTimer = 0;
let playerX = W/2, targetX = W/2;
let cats = [];
let bullets = [], objects = [], particles = [], floatTexts = [];
let fireInterval = 0.6, fireTimer = 0;
let shake = 0, gtime = 0;
let mice = [], cheeses = [];
let won = false, mergeCooldown = 0, mercy = 0;

const CAT_TYPES = ["cha","shiro","kiji"];
const FORMATION = [
  [0,0],[-36,20],[36,20],[-18,42],[18,42],
  [-54,46],[54,46],[0,64],[-36,70],[36,70]
];
function stage(){ return STAGES[stageIdx]; }
function squadPower(){ return cats.reduce((s,c)=>s+c.num, 0); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function addCat(num, type, x, y){
  if (cats.length >= 10){
    let weakest = cats.reduce((a,b)=> a.num <= b.num ? a : b);
    weakest.num += num;
    spark(weakest.x, weakest.y, "#ffe066");
    return;
  }
  cats.push({num:num, type:type || pick(CAT_TYPES),
             x: x !== undefined ? x : playerX, y: y !== undefined ? y : PLAYER_Y,
             phase: Math.random()*6.28});
  sndJoin();
}

function balanceTypes(){
  // 3匹以上いるときは、3色のねこが必ずそろうように色をととのえる
  if (cats.length < 3) return;
  const present = new Set(cats.map(c => c.type));
  for (const t of CAT_TYPES){
    if (!present.has(t)){
      const counts = {};
      cats.forEach(c => counts[c.type] = (counts[c.type]||0) + 1);
      let maxType = cats[0].type;
      for (const k in counts) if (counts[k] > (counts[maxType]||0)) maxType = k;
      const cand = cats.find(c => c.type === maxType);
      if (cand){
        cand.type = t;
        present.add(t);
        spark(cand.x, cand.y, "#fff4b8");
      }
    }
  }
}

function tryMerge(){
  if (mergeCooldown > 0) return;
  for (let i = 0; i < cats.length; i++){
    for (let j = i+1; j < cats.length; j++){
      if (cats[i].num === cats[j].num){
        const a = cats[i], b = cats[j];
        a.num += b.num;
        spark((a.x+b.x)/2, (a.y+b.y)/2, "#ffd166");
        floatText((a.x+b.x)/2, (a.y+b.y)/2 - 30, "合体! " + a.num, "#ff8c42");
        cats.splice(j,1);
        sndMerge();
        mergeCooldown = 0.35;
        return;
      }
    }
  }
}

/* ================= コース生成 ================= */
function buildCourse(){
  objects = [];
  const st = stage();
  let d = 480;
  const total = RUN_TIME * st.speed;
  let kindPrev = "";
  while (d < total - 350){
    const prog = d / total;
    let kind = pick(["pedestal","pedestal","gates","spikes","speed"]);
    if (kind === kindPrev && Math.random() < 0.6) kind = pick(["pedestal","gates","spikes","speed"]);
    kindPrev = kind;

    if (kind === "pedestal"){
      const hpBase = Math.round((8 + prog * 46) * st.hpScale);
      const nums = prog < 0.3 ? [2,2,4] : prog < 0.65 ? [2,4,4,8] : [4,8,8,16];
      objects.push({type:"pedestal", dist:d, x:118,   hp:hpBase, hpMax:hpBase, catNum:pick(nums), catType:pick(CAT_TYPES), done:false});
      objects.push({type:"pedestal", dist:d, x:W-118, hp:hpBase, hpMax:hpBase, catNum:pick(nums), catType:pick(CAT_TYPES), done:false});
    }
    else if (kind === "gates"){
      const goodPairChance = Math.max(0.05, 0.30 - st.badBias);
      let pair;
      if (Math.random() < goodPairChance){
        pair = [{label:"なかま +1", good:true, fx:"mate"}, {label:"数字 +3", good:true, fx:"plus3"}];
      } else {
        pair = pick([
          [{label:"なかま +1", good:true, fx:"mate"},  {label:"数字 はんぶん", good:false, fx:"half"}],
          [{label:"数字 +3",  good:true, fx:"plus3"}, {label:"攻撃おそく",   good:false, fx:"slow"}],
          [{label:"なかま +1", good:true, fx:"mate"},  {label:"攻撃おそく",   good:false, fx:"slow"}],
        ]);
      }
      if (Math.random() < 0.5) pair = [pair[1], pair[0]];
      objects.push({type:"gate", dist:d, x:(ROAD_L+W/2)/2, w:(W/2-ROAD_L)-8, gate:pair[0], done:false});
      objects.push({type:"gate", dist:d, x:(W/2+ROAD_R)/2, w:(ROAD_R-W/2)-8, gate:pair[1], done:false});
    }
    else if (kind === "speed"){
      objects.push({type:"gate", dist:d, x:W/2, w:170, gate:{label:"攻撃速度UP", good:true, fx:"speed"}, done:false});
    }
    else if (kind === "spikes"){
      const gap = pick(["left","mid","right"]);
      const zones = {left:[[W/2-40,ROAD_R]], mid:[[ROAD_L,W/2-60],[W/2+60,ROAD_R]], right:[[ROAD_L,W/2+40]]};
      const moving = st.moveSpikes && Math.random() < 0.5;
      for (const z of zones[gap]){
        objects.push({type:"spikes", dist:d, baseX:(z[0]+z[1])/2, x:(z[0]+z[1])/2, w:z[1]-z[0],
                      move:moving, amp: moving ? 34 : 0, spd: 1.2 + Math.random(), ph: Math.random()*6.28, done:false});
      }
      // 後半ステージは2連トゲも出る
      if (stageIdx >= 1 && Math.random() < 0.18 + stageIdx*0.06){
        const gap2 = pick(["left","mid","right"]);
        const zones2 = {left:[[W/2-40,ROAD_R]], mid:[[ROAD_L,W/2-60],[W/2+60,ROAD_R]], right:[[ROAD_L,W/2+40]]};
        for (const z of zones2[gap2]){
          objects.push({type:"spikes", dist:d+100, baseX:(z[0]+z[1])/2, x:(z[0]+z[1])/2, w:z[1]-z[0],
                        move:false, amp:0, spd:1, ph:0, done:false});
        }
        d += 100;
      }
    }
    d += 215 + Math.random()*70;
  }
}

/* ================= リセット ================= */
function resetGame(){
  state = "run";
  const st = stage();
  traveled = 0; runTimer = RUN_TIME; bossTimer = st.bossTime;
  playerX = W/2; targetX = W/2;
  cats = [];
  addCat(2, "cha");
  bullets = []; particles = []; floatTexts = []; cheeses = [];
  fireInterval = 0.6; fireTimer = 0; shake = 0; mergeCooldown = 0; gtime = 0; mercy = 0;
  won = false;
  // ネズミボスたち
  mice = st.mice.map((m, i) => {
    const n = st.mice.length;
    const bx = W/2 + (i - (n-1)/2) * 116;
    return {v:m.v, x:bx, baseX:bx, y: m.v===2 ? 150 : 175, hp:m.hp, hpMax:m.hp,
            sway: Math.random()*6.28, hurt:0, fireTimer: 1.8 + i*0.8, entry:1.4};
  });
  buildCourse();
}

/* ================= 入力 ================= */
let dragging = false;
function ptX(e){
  const r = cv.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  return cx / viewScale;
}
cv.addEventListener("pointerdown", e => { dragging = true; targetX = ptX(e); });
window.addEventListener("pointermove", e => { if (dragging) targetX = ptX(e); });
window.addEventListener("pointerup", () => dragging = false);
window.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft")  targetX -= 46;
  if (e.key === "ArrowRight") targetX += 46;
});

/* ================= 演出 ================= */
function spark(x, y, color){
  for (let i = 0; i < 12; i++){
    const a = Math.random()*6.28, sp = 60 + Math.random()*140;
    particles.push({x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:.5+Math.random()*.3, color:color});
  }
}
function floatText(x, y, text, color){
  floatTexts.push({x:x, y:y, text:text, color:color, life:1.1});
}

/* ================= 効果 ================= */
function applyGate(g){
  if (g.fx === "mate"){ addCat(2); floatText(playerX, PLAYER_Y-70, "なかま +1 🐱", "#3aa655"); }
  if (g.fx === "plus3"){
    const c = cats.reduce((a,b)=> a.num <= b.num ? a : b);
    c.num += 3; floatText(playerX, PLAYER_Y-70, "数字 +3", "#3aa655");
  }
  if (g.fx === "speed"){
    fireInterval = Math.max(0.16, fireInterval * 0.82);
    floatText(playerX, PLAYER_Y-70, "攻撃速度UP!", "#3aa655");
  }
  if (g.fx === "half"){
    const c = cats.reduce((a,b)=> a.num >= b.num ? a : b);
    c.num = Math.max(1, Math.ceil(c.num/2));
    floatText(playerX, PLAYER_Y-70, "数字はんぶん…", "#d64550"); shake = .3;
  }
  if (g.fx === "slow"){
    fireInterval = Math.min(0.95, fireInterval * 1.25);
    floatText(playerX, PLAYER_Y-70, "攻撃おそく…", "#d64550"); shake = .3;
  }
  if (g.good) sndGood(); else sndBad();
}

function hitSquad(reason){
  shake = .45;
  if (cats.length > 1){
    let wi = 0;
    cats.forEach((c,i)=>{ if (c.num < cats[wi].num) wi = i; });
    spark(cats[wi].x, cats[wi].y, "#d64550");
    cats.splice(wi,1);
    floatText(playerX, PLAYER_Y-70, reason + " なかまが…!", "#d64550");
  } else {
    cats[0].num = Math.max(1, Math.floor(cats[0].num/2));
    spark(cats[0].x, cats[0].y, "#d64550");
    floatText(playerX, PLAYER_Y-70, reason + " 数字はんぶん!", "#d64550");
  }
  sndBad();
}

/* ================= 更新 ================= */
function update(dt){
  if (state !== "run" && state !== "boss") return;
  gtime += dt;

  targetX = Math.max(ROAD_L+24, Math.min(ROAD_R-24, targetX));
  playerX += (targetX - playerX) * Math.min(1, dt*12);

  cats.forEach((c,i)=>{
    const f = FORMATION[Math.min(i, FORMATION.length-1)];
    const tx = playerX + f[0], ty = PLAYER_Y + f[1];
    c.x += (tx - c.x) * Math.min(1, dt*10);
    c.y += (ty - c.y) * Math.min(1, dt*10);
    c.phase += dt*8;
  });
  mergeCooldown = Math.max(0, mergeCooldown - dt);
  mercy = Math.max(0, mercy - dt);
  tryMerge();
  balanceTypes();

  fireTimer -= dt;
  if (fireTimer <= 0){
    fireTimer = fireInterval;
    cats.forEach(c => bullets.push({x:c.x, y:c.y-26, dmg:c.num}));
  }
  bullets.forEach(b => b.y -= 620*dt);
  bullets = bullets.filter(b => b.y > -30);

  if (state === "run"){
    const st = stage();
    traveled += st.speed * dt;
    runTimer -= dt;

    for (const o of objects){
      if (o.done) continue;
      const sy = PLAYER_Y - (o.dist - traveled);

      if (o.type === "pedestal"){
        if (sy > -40 && sy < PLAYER_Y){
          for (const b of bullets){
            if (b.dmg > 0 && Math.abs(b.x - o.x) < 42 && Math.abs(b.y - sy) < 44){
              o.hp -= b.dmg; b.dmg = 0; b.y = -99;
              sndBreak();
              if (o.hp <= 0){
                o.done = true;
                spark(o.x, sy, "#b388eb");
                floatText(o.x, sy-40, "なかま GET! 🐱", "#7a4ddb");
                addCat(o.catNum, o.catType, o.x, sy);
              }
            }
          }
        }
        if (sy > PLAYER_Y + 60) o.done = true;
      }
      else if (o.type === "gate"){
        if (sy >= PLAYER_Y - 6 && sy <= PLAYER_Y + 30){
          if (Math.abs(playerX - o.x) < o.w/2){
            o.done = true;
            objects.forEach(p => { if (p.type==="gate" && p.dist===o.dist) p.done = true; });
            applyGate(o.gate);
          }
        }
        if (sy > PLAYER_Y + 60) o.done = true;
      }
      else if (o.type === "spikes"){
        if (o.move){
          o.x = o.baseX + Math.sin(gtime * o.spd + o.ph) * o.amp;
          o.x = Math.max(ROAD_L + o.w/2, Math.min(ROAD_R - o.w/2, o.x));
        }
        if (sy >= PLAYER_Y - 8 && sy <= PLAYER_Y + 26){
          if (Math.abs(playerX - o.x) < o.w/2 + 6){
            o.done = true;
            hitSquad("トゲ!");
          }
        }
        if (sy > PLAYER_Y + 60) o.done = true;
      }
    }

    if (runTimer <= 0){
      state = "boss";
      floatText(W/2, 320, "🐭 ボスネズミ とうじょう!!", "#d64550");
      sndBad();
    }
  }
  else if (state === "boss"){
    const st = stage();
    bossTimer -= dt;
    let alive = 0;
    for (const m of mice){
      if (m.hp <= 0) continue;
      alive++;
      m.entry = Math.max(0, m.entry - dt);
      m.sway += dt;
      m.hurt = Math.max(0, m.hurt - dt);
      m.x = m.baseX + Math.sin(m.sway * (m.v===2 ? 0.7 : 1.1)) * (mice.length>1 ? 38 : 80);

      if (m.entry <= 0){
        for (const b of bullets){
          if (b.dmg > 0 && Math.abs(b.x - m.x) < 58 && b.y < m.y + 70 && b.y > m.y - 70){
            m.hp -= b.dmg; b.dmg = 0; b.y = -99;
            m.hurt = .12;
            if (Math.random() < .3) spark(b.x, m.y+50, "#ffd166");
            if (m.hp <= 0){
              spark(m.x, m.y, "#b7bcc7");
              floatText(m.x, m.y, MOUSE_NAMES[m.v] + " たおした!", "#7a4ddb");
              sndSquick();
            }
          }
        }
        m.fireTimer -= dt;
        if (m.fireTimer <= 0){
          m.fireTimer = st.cheese + Math.random()*0.5;
          cheeses.push({x:m.x, y:m.y+60, tx:playerX});
          beep(220,.15,"sawtooth",.06);
        }
      }
    }
    for (const f of cheeses){
      f.y += st.cheeseSpd * dt;
      f.x += (f.tx - f.x) * dt * 1.25;
      if (mercy <= 0 && f.y > PLAYER_Y - 20 && f.y < PLAYER_Y + 40 && Math.abs(f.x - playerX) < 46){
        f.y = 9999;
        hitSquad("🧀");
        mercy = 1.1;
      }
    }
    cheeses = cheeses.filter(f => f.y < H + 40);

    if (alive === 0){ endGame(true); }
    else if (bossTimer <= 0 || cats.length === 0){ endGame(false); }
  }

  particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 300*dt; p.life -= dt; });
  particles = particles.filter(p => p.life > 0);
  floatTexts.forEach(t => { t.y -= 36*dt; t.life -= dt; });
  floatTexts = floatTexts.filter(t => t.life > 0);
  shake = Math.max(0, shake - dt);
}

function endGame(win){
  won = win;
  state = "result";
  if (win){
    unlocked = Math.max(unlocked, Math.min(STAGES.length-1, stageIdx+1));
    sndWin();
  } else sndLose();
  setTimeout(showResult, 700);
}
function showResult(){
  document.getElementById("resultScreen").classList.remove("hidden");
  const t = document.getElementById("resultTitle");
  const e = document.getElementById("resultEmoji");
  const x = document.getElementById("resultText");
  const nextBtn = document.getElementById("nextBtn");
  if (won && stageIdx === STAGES.length-1){
    t.textContent = "🏆 ぜんぶクリア!!";
    e.textContent = "🐱🎉🐭";
    x.innerHTML = "ねこ軍団がネズミたちをぜんいん退治!<br>さいごのパワー: <b>" + squadPower() + "</b><br>きみはねこマスターだ!";
    nextBtn.classList.add("hidden");
  } else if (won){
    t.textContent = "ステージ " + (stageIdx+1) + " クリア!";
    e.textContent = "🐱✨";
    x.innerHTML = "さいごのパワー: <b>" + squadPower() + "</b><br>つぎのステージは もっと手ごわいぞ…!";
    nextBtn.classList.remove("hidden");
  } else {
    const rest = mice.reduce((s,m)=>s+Math.max(0,m.hp),0);
    t.textContent = "ざんねん…";
    e.textContent = "🐭💨🐱";
    x.innerHTML = "ネズミののこりHP: <b>" + Math.ceil(rest) + "</b><br>柱をこわして仲間をふやし、<br>緑ゲートで合体をねらおう!";
    nextBtn.classList.add("hidden");
  }
}

/* ================= 描画:キャラクター ================= */
function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

const CAT_PAL = {
  cha:   { body:"#f7a94b", stripe:"#e8923c", belly:"#ffe6c2", ear:"#ffb6c1", striped:true,  fluff:false },
  kiji:  { body:"#9b7a52", stripe:"#5f4a33", belly:"#e3d3b4", ear:"#d8a0a8", striped:true,  fluff:true  },
  shiro: { body:"#fdfdfb", stripe:"#e7e2d8", belly:"#f4efe6", ear:"#ffc2cc", striped:false, fluff:true  },
};

function drawCat(x, y, s, num, phase, type){
  const pal = CAT_PAL[type] || CAT_PAL.cha;
  const hop = Math.abs(Math.sin(phase)) * 3 * s;
  y -= hop;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // しっぽ
  ctx.strokeStyle = pal.striped ? pal.stripe : pal.body;
  ctx.lineWidth = pal.fluff ? 7 : 6; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(12, 16);
  ctx.quadraticCurveTo(26, 12 + Math.sin(phase*0.7)*4, 24, -2);
  ctx.stroke();

  // 体
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(0, 12, pal.fluff?16:15, 13, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = pal.belly;
  ctx.beginPath(); ctx.ellipse(0, 15, 8, 8, 0, 0, 6.29); ctx.fill();

  // ふわふわ毛(長毛種)
  if (pal.fluff){
    ctx.strokeStyle = pal.belly; ctx.lineWidth = 1.4;
    for (let i = -2; i <= 2; i++){
      ctx.beginPath();
      ctx.moveTo(i*5.5, 2);
      ctx.lineTo(i*5.5 + 2, 7);
      ctx.stroke();
    }
  }

  // 耳
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.moveTo(-14,-16); ctx.lineTo(-7,-28); ctx.lineTo(-2,-15); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,-16); ctx.lineTo(7,-28); ctx.lineTo(2,-15); ctx.closePath(); ctx.fill();
  ctx.fillStyle = pal.ear;
  ctx.beginPath(); ctx.moveTo(-11,-17); ctx.lineTo(-7.5,-24); ctx.lineTo(-4.5,-16); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(11,-17); ctx.lineTo(7.5,-24); ctx.lineTo(4.5,-16); ctx.closePath(); ctx.fill();

  // 頭
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.ellipse(0, -8, 15, 13.5, 0, 0, 6.29); ctx.fill();
  // しまもよう
  if (pal.striped){
    ctx.strokeStyle = pal.stripe; ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(-3,-20); ctx.lineTo(-3,-16);
    ctx.moveTo(0,-21);  ctx.lineTo(0,-16.5);
    ctx.moveTo(3,-20);  ctx.lineTo(3,-16);
    ctx.stroke();
    // ほほのしま(キジトラ)
    if (type === "kiji"){
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(-14,-12); ctx.lineTo(-10,-11);
      ctx.moveTo(14,-12);  ctx.lineTo(10,-11);
      ctx.stroke();
    }
  }

  // 目
  ctx.fillStyle = type === "kiji" ? "#3f5d3f" : "#3a2c20";
  ctx.beginPath(); ctx.arc(-5.5,-9, 2.1, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(5.5,-9, 2.1, 0, 6.29); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-4.9,-9.7, .8, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(6.1,-9.7, .8, 0, 6.29); ctx.fill();
  // ほっぺ
  ctx.fillStyle = "rgba(255,150,160,.6)";
  ctx.beginPath(); ctx.arc(-9,-4.5, 2.4, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-4.5, 2.4, 0, 6.29); ctx.fill();
  // 鼻(白ねこはピンク)
  if (type === "shiro"){
    ctx.fillStyle = "#ff9eb0";
    ctx.beginPath(); ctx.arc(0,-6.5, 1.5, 0, 6.29); ctx.fill();
  }
  // 口 ω
  ctx.strokeStyle = "#3a2c20"; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(-2,-4.2, 2, .2, 3); ctx.stroke();
  ctx.beginPath(); ctx.arc(2,-4.2, 2, .2, 3); ctx.stroke();
  // ひげ
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-13,-7); ctx.lineTo(-19,-8.5); ctx.moveTo(-13,-4.5); ctx.lineTo(-19,-4);
  ctx.moveTo(13,-7);  ctx.lineTo(19,-8.5);  ctx.moveTo(13,-4.5); ctx.lineTo(19,-4);
  ctx.stroke();
  ctx.restore();

  // 数字バッジ
  const label = String(num);
  ctx.font = "bold " + Math.round(17*s+4) + "px sans-serif";
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = "rgba(255,255,255,.92)";
  roundRect(x - tw/2 - 7, y - 48*s - 6, tw + 14, 22, 11);
  ctx.fill();
  ctx.strokeStyle = pal.body === "#fdfdfb" ? "#d8c9a8" : pal.body;
  ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = "#b06a2a";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(label, x, y - 48*s + 5);
}

const MOUSE_PAL = [
  { body:"#b7bcc7", belly:"#e9ebef", ear:"#ffb6c1", scale:1.0 },   // チュー助(グレー)
  { body:"#f3f1ec", belly:"#fdfcf9", ear:"#ffc2cc", scale:1.05 },  // シロチュー(しろ)
  { body:"#c79a6b", belly:"#f0dfc2", ear:"#ffb6a0", scale:1.35 },  // ネズミ大王(ちゃいろ・王冠)
];

function drawMouse(x, y, v, hurt, sway, hpRatio){
  const pal = MOUSE_PAL[v];
  const s = pal.scale;
  ctx.save();
  ctx.translate(x, y + Math.sin(sway*2.2)*7);
  if (hurt > 0) ctx.translate((Math.random()-0.5)*6, 0);
  ctx.scale(s, s);

  // しっぽ
  ctx.strokeStyle = "#e8a0a8"; ctx.lineWidth = 4; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(28, 34);
  ctx.quadraticCurveTo(58, 30 + Math.sin(sway*3)*8, 52, 6);
  ctx.stroke();

  // 耳(おおきくてまるい)
  ctx.fillStyle = pal.body;
  ctx.beginPath(); ctx.arc(-26, -38, 17, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(26, -38, 17, 0, 6.29); ctx.fill();
  ctx.fillStyle = pal.ear;
  ctx.beginPath(); ctx.arc(-26, -38, 10, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(26, -38, 10, 0, 6.29); ctx.fill();

  // 体
  ctx.fillStyle = hurt > 0 ? "#ffffff" : pal.body;
  ctx.beginPath(); ctx.ellipse(0, 16, 34, 30, 0, 0, 6.29); ctx.fill();
  ctx.fillStyle = pal.belly;
  ctx.beginPath(); ctx.ellipse(0, 24, 20, 18, 0, 0, 6.29); ctx.fill();

  // 頭
  ctx.fillStyle = hurt > 0 ? "#ffffff" : pal.body;
  ctx.beginPath(); ctx.ellipse(0, -14, 30, 26, 0, 0, 6.29); ctx.fill();

  // 目(おおきくキラキラ)
  ctx.fillStyle = "#3a2c30";
  ctx.beginPath(); ctx.arc(-11, -16, 4.6, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(11, -16, 4.6, 0, 6.29); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-9.6, -17.6, 1.8, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(12.4, -17.6, 1.8, 0, 6.29); ctx.fill();

  // 鼻とくち、まえば
  ctx.fillStyle = "#ff8aa0";
  ctx.beginPath(); ctx.arc(0, -6, 3.4, 0, 6.29); ctx.fill();
  ctx.strokeStyle = "#3a2c30"; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(-3, -2.5, 2.6, .3, 2.9); ctx.stroke();
  ctx.beginPath(); ctx.arc(3, -2.5, 2.6, .3, 2.9); ctx.stroke();
  ctx.fillStyle = "#fff";
  ctx.fillRect(-3.6, 0, 3.2, 5);
  ctx.fillRect(0.4, 0, 3.2, 5);
  ctx.strokeStyle = "#ddd"; ctx.lineWidth = .8;
  ctx.strokeRect(-3.6, 0, 3.2, 5);
  ctx.strokeRect(0.4, 0, 3.2, 5);

  // ほっぺ
  ctx.fillStyle = "rgba(255,150,160,.55)";
  ctx.beginPath(); ctx.arc(-20, -8, 4.6, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(20, -8, 4.6, 0, 6.29); ctx.fill();

  // ひげ
  ctx.strokeStyle = "#888"; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-22,-8); ctx.lineTo(-32,-10); ctx.moveTo(-22,-5); ctx.lineTo(-32,-4);
  ctx.moveTo(22,-8);  ctx.lineTo(32,-10);  ctx.moveTo(22,-5);  ctx.lineTo(32,-4);
  ctx.stroke();

  // 王冠(ネズミ大王だけ)
  if (v === 2){
    ctx.fillStyle = "#ffd34d";
    ctx.beginPath();
    ctx.moveTo(-14,-46); ctx.lineTo(-14,-58); ctx.lineTo(-7,-50); ctx.lineTo(0,-60);
    ctx.lineTo(7,-50); ctx.lineTo(14,-58); ctx.lineTo(14,-46);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#e0a800"; ctx.lineWidth = 1.5; ctx.stroke();
  }
  ctx.restore();

  // HPバー(あたまの上)
  const bw = 84 * s;
  ctx.fillStyle = "rgba(255,255,255,.6)";
  roundRect(x - bw/2, y - 74*s, bw, 9, 4.5); ctx.fill();
  ctx.fillStyle = "#e2603f";
  roundRect(x - bw/2, y - 74*s, bw*Math.max(0,hpRatio), 9, 4.5); ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
  roundRect(x - bw/2, y - 74*s, bw, 9, 4.5); ctx.stroke();
}

function drawCheese(x, y){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.sin(y*0.05)*0.4);
  ctx.fillStyle = "#ffce4d";
  ctx.beginPath();
  ctx.moveTo(-13, 9); ctx.lineTo(13, 9); ctx.lineTo(0, -12);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#e0a800"; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = "#f5b82e";
  ctx.beginPath(); ctx.arc(-4, 3, 2.2, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(5, 5, 1.7, 0, 6.29); ctx.fill();
  ctx.beginPath(); ctx.arc(1, -3, 1.5, 0, 6.29); ctx.fill();
  ctx.restore();
}

/* ================= 描画:背景・オブジェクト ================= */
function drawTree(x, y, s){
  ctx.fillStyle = "#a07850";
  ctx.fillRect(x-4*s, y, 8*s, 16*s);
  ctx.fillStyle = "#8fcf8f";
  for (let i = 0; i < 3; i++){
    ctx.beginPath();
    ctx.moveTo(x, y - (34 + i*16)*s);
    ctx.lineTo(x - (20 - i*3)*s, y - i*14*s);
    ctx.lineTo(x + (20 - i*3)*s, y - i*14*s);
    ctx.closePath(); ctx.fill();
  }
}

function drawBackground(){
  const sky = ctx.createLinearGradient(0,0,0,H);
  // ステージごとに空の色を少し変える
  const skyTops = ["#bfe9f7","#bfe9f7","#ffe3c9","#e7d6f5","#ffd1d9","#c9e9ff","#ffe9b8","#d9c9f5","#ffc9d4","#b8c4e8"];
  sky.addColorStop(0, skyTops[stageIdx]);
  sky.addColorStop(.5, "#d8f3e8");
  sky.addColorStop(1, "#e8f7d8");
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = "#fffdf5";
  ctx.fillRect(ROAD_L, 0, ROAD_R-ROAD_L, H);
  ctx.fillStyle = "#f3ecdc";
  const off = traveled % 120;
  for (let y = -120 + off; y < H; y += 120){
    ctx.fillRect(ROAD_L, y, ROAD_R-ROAD_L, 46);
  }
  ctx.fillStyle = "#cfe8b8";
  ctx.fillRect(ROAD_L-8, 0, 8, H);
  ctx.fillRect(ROAD_R, 0, 8, H);

  const toff = (traveled*0.7) % 150;
  for (let y = -150 + toff; y < H + 60; y += 150){
    drawTree(26, y, 1);
    drawTree(W-26, y+70, 1.1);
  }
}

function drawObjects(){
  for (const o of objects){
    if (o.done && o.type !== "gate") continue;
    const sy = PLAYER_Y - (o.dist - traveled);
    if (sy < -90 || sy > H + 60) continue;

    if (o.type === "pedestal" && !o.done){
      ctx.fillStyle = "#b388eb";
      roundRect(o.x-34, sy-26, 68, 56, 9); ctx.fill();
      ctx.fillStyle = "#9b6dd6";
      roundRect(o.x-34, sy+14, 68, 16, 7); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.5)";
      roundRect(o.x-28, sy-38, 56, 7, 3.5); ctx.fill();
      ctx.fillStyle = "#ff7e4f";
      roundRect(o.x-28, sy-38, 56*Math.max(0,o.hp/o.hpMax), 7, 3.5); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 22px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(Math.max(0, Math.ceil(o.hp)), o.x, sy+2);
      drawCat(o.x, sy-52, .8, o.catNum, performance.now()/300 + o.x, o.catType);
    }
    else if (o.type === "gate" && !o.done){
      const g = o.gate;
      ctx.fillStyle = g.good ? "rgba(120,210,140,.42)" : "rgba(235,110,110,.42)";
      roundRect(o.x - o.w/2, sy-66, o.w, 70, 8); ctx.fill();
      ctx.strokeStyle = g.good ? "#4caf6d" : "#d64550";
      ctx.lineWidth = 3;
      roundRect(o.x - o.w/2, sy-66, o.w, 70, 8); ctx.stroke();
      ctx.fillStyle = g.good ? "#2e7d4f" : "#b03040";
      ctx.font = "bold 17px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(g.label, o.x, sy-31);
    }
    else if (o.type === "spikes" && !o.done){
      ctx.fillStyle = o.move ? "#f59e42" : "#f5c542";
      roundRect(o.x - o.w/2, sy-6, o.w, 18, 5); ctx.fill();
      ctx.fillStyle = "#e2603f";
      const n = Math.max(2, Math.floor(o.w/26));
      for (let i = 0; i < n; i++){
        const px = o.x - o.w/2 + (i+0.5)*(o.w/n);
        ctx.beginPath();
        ctx.moveTo(px-9, sy-4); ctx.lineTo(px, sy-26); ctx.lineTo(px+9, sy-4);
        ctx.closePath(); ctx.fill();
      }
      if (o.move){
        ctx.fillStyle = "#b03040";
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("◀ うごく! ▶", o.x, sy+22);
      }
    }
  }
}

function drawHUD(){
  ctx.fillStyle = "rgba(74,63,53,.85)";
  roundRect(W/2-150, 14, 300, 44, 22); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  if (state === "run"){
    ctx.fillText("ST." + (stageIdx+1), W/2-110, 37);
    ctx.fillText("⏱ " + Math.ceil(runTimer) + "秒", W/2-38, 37);
    ctx.fillText("🐱 パワー " + squadPower(), W/2+72, 37);
  } else if (state === "boss" || state === "result"){
    ctx.fillText("ST." + (stageIdx+1) + " 🐭 ボス戦! のこり " + Math.max(0,Math.ceil(bossTimer)) + "秒", W/2, 37);
  }
}

function draw(){
  ctx.save();
  if (shake > 0){
    ctx.translate((Math.random()-0.5)*shake*22, (Math.random()-0.5)*shake*22);
  }
  drawBackground();
  if (state === "run") drawObjects();

  ctx.fillStyle = "#ffd166";
  for (const b of bullets){
    if (b.dmg <= 0) continue;
    ctx.beginPath(); ctx.ellipse(b.x, b.y, 5, 9, 0, 0, 6.29); ctx.fill();
  }

  if (state === "boss" || state === "result"){
    for (const m of mice){
      if (m.hp > 0) drawMouse(m.x, m.y, m.v, m.hurt, m.sway, m.hp/m.hpMax);
    }
  }
  for (const f of cheeses) drawCheese(f.x, f.y);

  for (const c of cats) drawCat(c.x, c.y, 1, c.num, c.phase, c.type);

  for (const p of particles){
    ctx.globalAlpha = Math.max(0, p.life*2);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 6.29); ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (const t of floatTexts){
    ctx.globalAlpha = Math.min(1, t.life*1.6);
    ctx.font = "bold 21px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 5;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  if (state !== "title") drawHUD();
  ctx.restore();
}

/* ================= メインループ ================= */
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= 画面ボタン ================= */
function refreshStageButtons(){
  const row = document.getElementById("stageRow");
  row.innerHTML = "";
  for (let i = 0; i < STAGES.length; i++){
    const b = document.createElement("button");
    b.className = "stageBtn";
    b.textContent = (i+1);
    b.disabled = i > unlocked;
    b.addEventListener("click", () => { stageIdx = i; startPlay(); });
    row.appendChild(b);
  }
}
function startPlay(){
  if (!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  resetGame();
}
document.getElementById("startBtn").addEventListener("click", () => { stageIdx = Math.min(unlocked, STAGES.length-1); startPlay(); });
document.getElementById("retryBtn").addEventListener("click", startPlay);
document.getElementById("nextBtn").addEventListener("click", () => { stageIdx = Math.min(STAGES.length-1, stageIdx+1); startPlay(); });
refreshStageButtons();
</script>
