<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ネコと とけいの れんしゅう</title>
<!-- v1.0 -->
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic UI',system-ui,sans-serif;
  background:linear-gradient(#e8f8e0,#fdf6e8);
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
header{
  position:sticky;top:0;z-index:50;
  min-height:52px;display:flex;align-items:center;gap:6px;padding:6px 8px;flex-wrap:wrap;
  background:linear-gradient(#6fbf6a,#54a850);box-shadow:0 2px 6px #0002;
}
header h1{font-size:15px;color:#fff;text-shadow:0 1px 2px #0004;flex:1;white-space:nowrap}
.hudbtn{
  border:none;border-radius:14px;background:#fff;color:#3a7d3a;font-weight:700;
  font-size:13px;padding:7px 10px;box-shadow:0 2px 0 #3f8a3f;cursor:pointer;font-family:inherit;
}
.hudbtn:active{transform:translateY(2px);box-shadow:none}
#lvlName{width:100%;text-align:center;color:#fff;font-size:12px;font-weight:700;opacity:.95;margin-top:-2px}
#qdots{color:#fff;font-size:13px;letter-spacing:2px;background:#0002;border-radius:12px;padding:6px 10px;white-space:nowrap}
#stage{max-width:520px;margin:0 auto;padding:10px 10px 30px}
#speech{
  text-align:center;font-size:16px;font-weight:800;color:#3a7d3a;background:#ffffffcc;
  border-radius:16px;padding:9px 12px;margin-bottom:6px;box-shadow:0 2px 6px #0001;
}
#speech .target{color:#e8632a;font-size:22px}
#clockWrap{display:flex;justify-content:center;margin:2px 0 4px}
#clockWrap svg{width:min(88vw,330px);height:auto;display:block}
#nowRead{
  text-align:center;font-size:15px;font-weight:800;color:#5a8ab0;background:#ffffffb0;
  border-radius:12px;padding:5px 10px;margin-bottom:8px;min-height:30px;
}
#answers{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.ansbtn{
  border:none;border-radius:16px;background:#fff;color:#3a7d3a;font-weight:900;font-family:inherit;
  font-size:19px;min-width:100px;padding:13px 10px;box-shadow:0 4px 0 #3f8a3f;cursor:pointer;
}
.ansbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #3f8a3f}
.ansbtn.ok{background:#7bc258;color:#fff;box-shadow:0 4px 0 #558a3a}
.ansbtn.ng{background:#f0a0a0;color:#fff;box-shadow:0 4px 0 #c07070;animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#rewardBar{
  display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap;
  margin-top:12px;background:#ffffffb0;border-radius:14px;padding:6px 10px;min-height:40px;
}
#rewardBar .rlabel{font-size:12px;font-weight:800;color:#8a6a45}
#rewardBar svg{width:26px;height:26px}
.overlay{
  position:fixed;inset:0;background:rgba(40,30,60,.55);z-index:100;display:none;
  align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px 8px 30px;
}
.overlay.show{display:flex}
#selectCard{background:#f2fbee;border-radius:18px;max-width:560px;width:100%;padding:14px 12px 20px;box-shadow:0 8px 30px #0006}
#selectCard h2{color:#3a7d3a;font-size:18px;text-align:center;margin:4px 0 2px}
#selectCard p.sub{color:#6a9a6a;font-size:12px;text-align:center;margin-bottom:10px}
.lvlCard{
  display:flex;align-items:center;gap:10px;background:#fff;border:3px solid #d5ecd0;border-radius:14px;
  padding:10px 12px;margin-bottom:9px;cursor:pointer;box-shadow:0 2px 5px #0002;
}
.lvlCard:active{transform:scale(.98)}
.lvlCard .lnum{
  width:44px;height:44px;border-radius:50%;background:#54a850;color:#fff;font-size:22px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.lvlCard.hard .lnum{background:#e8834a}
.lvlCard .ltxt{flex:1}
.lvlCard .lname{font-size:15px;font-weight:800;color:#345}
.lvlCard .ldesc{font-size:11px;color:#7aa07a}
.lvlCard .lstar{font-size:15px}
#winOverlay{z-index:120;align-items:center}
#winCard{background:#fffdf5;border-radius:22px;padding:24px 22px;text-align:center;box-shadow:0 10px 40px #0007;max-width:340px;width:90%}
#winCard .big{font-size:30px;font-weight:900;color:#54a850;text-shadow:0 2px 0 #d5ecd0}
#winStars{font-size:34px;letter-spacing:4px;margin:6px 0}
#winCatBox{margin:4px auto}
#winInfo{color:#8a6a45;font-weight:700;margin-bottom:10px;font-size:13px}
#winCard button{display:block;width:100%;margin-top:9px;border:none;border-radius:14px;padding:12px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer}
#btnNext{background:#54a850;color:#fff;box-shadow:0 3px 0 #3f8a3f}
#btnAgain{background:#e2f4dc;color:#3a7d3a;box-shadow:0 3px 0 #b8d8b0}
#btnChoose{background:#ffe3c2;color:#b06020;box-shadow:0 3px 0 #e0bb8c}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:130}
#toast{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);background:#333c;color:#fff;
  font-size:13px;font-weight:700;padding:8px 16px;border-radius:20px;z-index:140;display:none;white-space:nowrap;
}
</style>
</head>
<body>
<header>
  <h1>🐱 ネコと とけいの れんしゅう</h1>
  <div id="qdots"></div>
  <button class="hudbtn" id="btnSelect">📚 レベル</button>
  <div id="lvlName"></div>
</header>
<div id="stage">
  <div id="speech"></div>
  <div id="clockWrap"></div>
  <div id="nowRead"></div>
  <div id="answers"></div>
  <div id="rewardBar"><span class="rlabel">ごほうびの おさかな：</span><span id="rewardFish"></span></div>
</div>

<div class="overlay" id="selectOverlay">
  <div id="selectCard">
    <h2>⏰ どれで あそぶ？</h2>
    <p class="sub">とけいを よんだり、はりを まわして あわせたり してみよう！</p>
    <div id="lvlList"></div>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div id="winCard">
    <div class="big">よくできました！</div>
    <div id="winStars">⭐⭐⭐</div>
    <div id="winCatBox"></div>
    <div id="winInfo"></div>
    <button id="btnNext">つぎの レベルへ ▶</button>
    <button id="btnAgain">もういちど</button>
    <button id="btnChoose">レベルを えらぶ</button>
  </div>
</div>
<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
"use strict";
const r2=v=>Math.round(v*100)/100;
function catFace(cx,cy,r,fur,opts){
  const o=Object.assign({earIn:'#ffb6c9',line:'#3a2a20',blush:'#ffb0a0',happy:false},opts||{});
  let s='';
  s+=`<path d="M${r2(cx-r*0.9)},${r2(cy-r*0.35)} L${r2(cx-r*1.02)},${r2(cy-r*1.45)} L${r2(cx-r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx+r*0.9)},${r2(cy-r*0.35)} L${r2(cx+r*1.02)},${r2(cy-r*1.45)} L${r2(cx+r*0.15)},${r2(cy-r*0.92)} Z" fill="${fur}"/>`;
  s+=`<path d="M${r2(cx-r*0.76)},${r2(cy-r*0.55)} L${r2(cx-r*0.85)},${r2(cy-r*1.18)} L${r2(cx-r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<path d="M${r2(cx+r*0.76)},${r2(cy-r*0.55)} L${r2(cx+r*0.85)},${r2(cy-r*1.18)} L${r2(cx+r*0.32)},${r2(cy-r*0.8)} Z" fill="${o.earIn}"/>`;
  s+=`<ellipse cx="${r2(cx)}" cy="${r2(cy)}" rx="${r2(r)}" ry="${r2(r*0.9)}" fill="${fur}"/>`;
  const ey=cy-r*0.08,ex=r*0.42;
  if(o.happy){
    s+=`<path d="M${r2(cx-ex-r*0.14)},${r2(ey+r*0.05)} q${r2(r*0.14)},${r2(-r*0.18)} ${r2(r*0.28)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.07))}" fill="none" stroke-linecap="round"/>`;
    s+=`<path d="M${r2(cx+ex-r*0.14)},${r2(ey+r*0.05)} q${r2(r*0.14)},${r2(-r*0.18)} ${r2(r*0.28)},0" stroke="${o.line}" stroke-width="${r2(Math.max(1.6,r*0.07))}" fill="none" stroke-linecap="round"/>`;
  }else{
    s+=`<ellipse cx="${r2(cx-ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
    s+=`<ellipse cx="${r2(cx+ex)}" cy="${r2(ey)}" rx="${r2(r*0.13)}" ry="${r2(r*0.19)}" fill="${o.line}"/>`;
    s+=`<circle cx="${r2(cx-ex+r*0.045)}" cy="${r2(ey-r*0.06)}" r="${r2(r*0.045)}" fill="#fff"/>`;
    s+=`<circle cx="${r2(cx+ex+r*0.045)}" cy="${r2(ey-r*0.06)}" r="${r2(r*0.045)}" fill="#fff"/>`;
  }
  s+=`<path d="M${r2(cx-r*0.09)},${r2(cy+r*0.2)} h${r2(r*0.18)} l${r2(-r*0.09)},${r2(r*0.13)} Z" fill="#e8768a"/>`;
  s+=`<path d="M${r2(cx)},${r2(cy+r*0.33)} q${r2(-r*0.12)},${r2(r*0.17)} ${r2(-r*0.28)},${r2(r*0.05)} M${r2(cx)},${r2(cy+r*0.33)} q${r2(r*0.12)},${r2(r*0.17)} ${r2(r*0.28)},${r2(r*0.05)}" stroke="${o.line}" stroke-width="${r2(Math.max(1.5,r*0.05))}" fill="none" stroke-linecap="round"/>`;
  return s;
}
function iconSakana(x,y,s){
  const cs=['#5fc0e8','#ff8a65','#ffb300','#7bc258','#ff90b3'];const c=cs[Math.floor(Math.random()*cs.length)];
  return `<ellipse cx="${x}" cy="${y}" rx="${r2(s*0.42)}" ry="${r2(s*0.26)}" fill="${c}"/>`+
    `<path d="M${r2(x+s*0.4)},${y} l${r2(s*0.3)},${r2(-s*0.18)} l${r2(-s*0.07)},${r2(s*0.18)} l${r2(s*0.07)},${r2(s*0.18)} Z" fill="${c}" opacity="0.85"/>`+
    `<circle cx="${r2(x-s*0.18)}" cy="${r2(y-s*0.06)}" r="${r2(s*0.05)}" fill="#333"/>`;
}
/* ---------- サウンド ---------- */
let AC=null;
function initAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==='suspended')AC.resume();
}
function tone(freq,start,dur,type,vol){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,AC.currentTime+start);
  g.gain.exponentialRampToValueAtTime(vol||0.18,AC.currentTime+start+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+start+dur);
  o.connect(g);g.connect(AC.destination);
  o.start(AC.currentTime+start);o.stop(AC.currentTime+start+dur+0.05);
}
function popSound(){tone(660,0,0.09,'sine',0.2);tone(990,0.06,0.12,'sine',0.16);}
function tickSound(){tone(880,0,0.04,'square',0.04);}
function buzzSound(){tone(160,0,0.16,'square',0.07);}
function fanfare(){[523,659,784,1047,1319].forEach((f,i)=>{tone(f,i*0.13,0.3,'triangle',0.15);});tone(1568,0.7,0.5,'triangle',0.12);}

/* ---------- 時刻ユーティリティ ---------- */
const ri=n=>Math.floor(Math.random()*n);
function fmtMin(m){
  if(m===0)return '';
  if(m===30)return 'はん';
  const p=(m%10===2||m%10===5||m%10===7||m%10===9)?'ふん':'ぷん';
  return m+p;
}
function fmtTime(h,m,useHan){
  if(m===0)return h+'じ';
  if(m===30&&useHan)return h+'じはん';
  if(m===30)return h+'じ30ぷん';
  return h+'じ'+fmtMin(m);
}
/* ---------- レベル ---------- */
const LEVELS=[
  {name:'なんじ かな？',desc:'「◯じ」を よもう',type:'read',mins:[0],useHan:true,q:8},
  {name:'なんじはん かな？',desc:'「◯じ」と「◯じはん」',type:'read',mins:[0,30],useHan:true,q:8},
  {name:'はりを あわせよう①',desc:'「◯じ」に あわせる',type:'set',mins:[0],useHan:true,q:6},
  {name:'はりを あわせよう②',desc:'「◯じはん」も あわせる',type:'set',mins:[0,30],useHan:true,q:6},
  {name:'よみとり むずかしい！',desc:'5ふん きざみで よもう',type:'read',mins:[5,10,15,20,25,35,40,45,50,55],useHan:false,hard:true,q:8},
];
const $=id=>document.getElementById(id);
function loadProg(){try{return JSON.parse(localStorage.getItem('nekoTokeiV1')||'{}');}catch(e){return{};}}
function saveProg(p){try{localStorage.setItem('nekoTokeiV1',JSON.stringify(p));}catch(e){}}
let prog=loadProg();
let cur=0,qIdx=0,missTotal=0,fishCount=0,curQ=null,answered=false;
let totalMin=0; // 0..719 いまの とけい
function makeQuestion(lv){
  const h=1+ri(12);
  const m=lv.mins[ri(lv.mins.length)];
  return {h,m,target:(h%12)*60+m};
}
function makeChoices(q,lv){
  const set=new Map();
  const key=t=>t.h+':'+t.m;
  set.set(key(q),q);
  let guard=0;
  while(set.size<4&&guard++<200){
    const kind=ri(3);
    let h=q.h,m=q.m;
    if(kind===0){h=1+((q.h-1+1+ri(2)*10)%12);} // h±1ぽい
    else if(kind===1&&lv.mins.length>1){m=lv.mins[ri(lv.mins.length)];}
    else{h=1+ri(12);}
    if(h===q.h&&m===q.m)continue;
    set.set(h+':'+m,{h,m});
  }
  return [...set.values()].sort(()=>Math.random()-0.5);
}
/* ---------- とけいの絵 ---------- */
function buildClock(){
  const W=300,H=345,cx=150,cy=185,R=128;
  let s=`<svg id="clockSvg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // ねこみみ
  s+=`<path d="M52,80 L38,18 L108,44 Z" fill="#f5a04a"/><path d="M60,70 L52,32 L96,49 Z" fill="#ffb6c9"/>`;
  s+=`<path d="M248,80 L262,18 L192,44 Z" fill="#f5a04a"/><path d="M240,70 L248,32 L204,49 Z" fill="#ffb6c9"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R+14}" fill="#f5a04a"/>`;
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="#fffdf2" stroke="#e8c87a" stroke-width="3"/>`;
  // めもり
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180;
    const long=i%5===0;
    const r1=R-(long?16:8),rr=R-3;
    s+=`<line x1="${r2(cx+Math.sin(a)*r1)}" y1="${r2(cy-Math.cos(a)*r1)}" x2="${r2(cx+Math.sin(a)*rr)}" y2="${r2(cy-Math.cos(a)*rr)}" stroke="${long?'#b08a55':'#d8c8a8'}" stroke-width="${long?4:2}" stroke-linecap="round"/>`;
  }
  // すうじ
  for(let n=1;n<=12;n++){
    const a=n*30*Math.PI/180;
    s+=`<text x="${r2(cx+Math.sin(a)*(R-34))}" y="${r2(cy-Math.cos(a)*(R-34)+9)}" font-size="27" font-weight="bold" text-anchor="middle" fill="#5a4632" font-family="inherit">${n}</text>`;
  }
  // ふんのすうじ（そとがわ、小さく）
  for(let n=1;n<=12;n++){
    const a=n*30*Math.PI/180;
    s+=`<text x="${r2(cx+Math.sin(a)*(R+8))}" y="${r2(cy-Math.cos(a)*(R+8)+4)}" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.95">${n*5===60?0:n*5}</text>`;
  }
  // はり
  s+=`<g id="hourHand"><line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-64}" stroke="#e0453a" stroke-width="12" stroke-linecap="round"/></g>`;
  s+=`<g id="minHand"><line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-100}" stroke="#3f7fd4" stroke-width="8" stroke-linecap="round"/><circle cx="${cx}" cy="${cy-100}" r="7" fill="#3f7fd4"/></g>`;
  // まんなかの ねこ
  s+=`<g>${catFace(cx,cy+4,17,'#f5a04a')}</g>`;
  s+=`</svg>`;
  $('clockWrap').innerHTML=s;
}
function setHands(tm){
  const mAng=(tm%60)*6;
  const hAng=(tm/720)*360%360;
  const cx=150,cy=185;
  document.getElementById('minHand').setAttribute('transform',`rotate(${r2(mAng)} ${cx} ${cy})`);
  document.getElementById('hourHand').setAttribute('transform',`rotate(${r2(hAng)} ${cx} ${cy})`);
}
function readOut(tm){
  let h=Math.floor(tm/60)%12;if(h===0)h=12;
  return fmtTime(h,tm%60,true);
}
/* ---------- ドラッグ（set レベル） ---------- */
let dragging=false,lastAng=null,lastSnap=null;
function clockAngle(ev,svg){
  const rect=svg.getBoundingClientRect();
  const x=(ev.clientX-rect.left)/rect.width*300;
  const y=(ev.clientY-rect.top)/rect.height*345;
  return Math.atan2(x-150,-(y-185))*180/Math.PI; // 0=うえ
}
function attachDrag(){
  const svg=document.getElementById('clockSvg');
  svg.style.cursor='grab';
  svg.style.touchAction='none';
  svg.addEventListener('pointerdown',ev=>{
    if(LEVELS[cur].type!=='set'||answered)return;
    initAudio();ev.preventDefault();
    dragging=true;lastAng=clockAngle(ev,svg);
    svg.setPointerCapture(ev.pointerId);
  });
  svg.addEventListener('pointermove',ev=>{
    if(!dragging)return;
    ev.preventDefault();
    const a=clockAngle(ev,svg);
    let d=a-lastAng;
    if(d>180)d-=360;if(d<-180)d+=360;
    lastAng=a;
    totalMin=(totalMin+d/6+720)%720;
    const snap=Math.round(totalMin/5)*5%720;
    if(snap!==lastSnap){tickSound();lastSnap=snap;}
    setHands(totalMin);
    $('nowRead').textContent='いま ▶ '+readOut(snap);
  });
  const up=ev=>{
    if(!dragging)return;
    dragging=false;
    totalMin=Math.round(totalMin/5)*5%720;
    setHands(totalMin);
    $('nowRead').textContent='いま ▶ '+readOut(totalMin);
    if(totalMin===curQ.target){
      answered=true;
      popSound();fishCount++;addRewardFish();
      $('nowRead').textContent='🎉 ぴったり！ '+readOut(totalMin)+' だね！';
      setTimeout(nextQ,1100);
    }
  };
  svg.addEventListener('pointerup',up);
  svg.addEventListener('pointercancel',up);
}
/* ---------- しゅつだい ---------- */
function showQuestion(){
  answered=false;
  const lv=LEVELS[cur];
  curQ=makeQuestion(lv);
  buildClock();
  if(lv.type==='read'){
    totalMin=curQ.target;
    setHands(totalMin);
    $('speech').innerHTML='とけいは なんじ かな？';
    $('nowRead').textContent='';
    const ch=makeChoices(curQ,lv);
    $('answers').innerHTML='';
    ch.forEach(t=>{
      const b=document.createElement('button');
      b.className='ansbtn';
      b.textContent=fmtTime(t.h,t.m,lv.useHan);
      b.addEventListener('click',()=>{initAudio();onAnswer(b,t);});
      $('answers').appendChild(b);
    });
  }else{
    do{totalMin=(1+ri(12))%12*60+lv.mins[ri(lv.mins.length)];}while(totalMin===curQ.target);
    setHands(totalMin);
    $('speech').innerHTML='はりを まわして <span class="target">'+fmtTime(curQ.h,curQ.m,lv.useHan)+'</span> に あわせてね';
    $('nowRead').textContent='いま ▶ '+readOut(totalMin);
    $('answers').innerHTML='';
    attachDrag();
  }
  updateDots();
}
function onAnswer(btn,t){
  if(answered)return;
  if(t.h===curQ.h&&t.m===curQ.m){
    answered=true;
    btn.classList.add('ok');
    popSound();fishCount++;addRewardFish();
    setTimeout(nextQ,900);
  }else{
    missTotal++;
    btn.classList.add('ng');
    buzzSound();
    setTimeout(()=>btn.classList.remove('ng'),450);
  }
}
function nextQ(){
  qIdx++;
  if(qIdx>=LEVELS[cur].q)win();
  else showQuestion();
}
function addRewardFish(){
  const sp=document.createElement('span');
  sp.innerHTML=`<svg viewBox="0 0 40 40">${iconSakana(18,20,34)}</svg>`;
  $('rewardFish').appendChild(sp.firstChild);
}
function updateDots(){
  const lv=LEVELS[cur];
  let d='';
  for(let i=0;i<lv.q;i++)d+=i<qIdx?'●':'○';
  $('qdots').textContent=d;
}
function startLevel(i){
  cur=i;qIdx=0;missTotal=0;fishCount=0;
  $('rewardFish').innerHTML='';
  $('lvlName').textContent=(i+1)+'. '+LEVELS[i].name+'（'+LEVELS[i].desc+'）';
  $('winOverlay').classList.remove('show');
  $('selectOverlay').classList.remove('show');
  showQuestion();
  window.scrollTo(0,0);
}
function stars(){
  if(missTotal<=1)return 3;
  if(missTotal<=3)return 2;
  return 1;
}
function win(){
  const st=stars();
  prog[cur]=Math.max(prog[cur]||0,st);
  saveProg(prog);
  $('winStars').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
  $('winCatBox').innerHTML=`<svg viewBox="0 0 200 110" style="width:170px"><g>${catFace(70,60,38,'#f5a04a',{happy:true})}${iconSakana(150,60,60)}</g></svg>`;
  $('winInfo').textContent='「'+LEVELS[cur].name+'」クリア！ おさかな '+fishCount+'ひき（おてつき '+missTotal+'回）';
  $('btnNext').style.display=cur<LEVELS.length-1?'block':'none';
  $('winOverlay').classList.add('show');
  fanfare();confettiBurst();buildLevels();
}
function confettiBurst(){
  const cv=$('confetti');
  cv.width=innerWidth;cv.height=innerHeight;
  const g=cv.getContext('2d');
  const cols=['#ff5f6d','#ffb347','#ffe74d','#7bc258','#5fa8ff','#c78bff','#ff90b3'];
  const ps=[];
  for(let i=0;i<130;i++){
    ps.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.5,vx:(Math.random()-0.5)*2.4,vy:2+Math.random()*3.4,r:4+Math.random()*6,c:cols[i%cols.length],a:Math.random()*Math.PI,va:(Math.random()-0.5)*0.25});
  }
  const t0=performance.now();
  function step(now){
    g.clearRect(0,0,cv.width,cv.height);
    for(const p of ps){
      p.x+=p.vx;p.y+=p.vy;p.a+=p.va;
      g.save();g.translate(p.x,p.y);g.rotate(p.a);
      g.fillStyle=p.c;g.fillRect(-p.r,-p.r*0.6,p.r*2,p.r*1.2);
      g.restore();
    }
    if(now-t0<3800)requestAnimationFrame(step);
    else g.clearRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(step);
}
function buildLevels(){
  const list=$('lvlList');
  list.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const c=document.createElement('div');
    c.className='lvlCard'+(lv.hard?' hard':'');
    const st=prog[i]?'⭐'.repeat(prog[i]):'';
    c.innerHTML=`<div class="lnum">${i+1}</div><div class="ltxt"><div class="lname">${lv.name}</div><div class="ldesc">${lv.desc}・ぜんぶで${lv.q}もん</div></div><div class="lstar">${st}</div>`;
    c.addEventListener('click',()=>startLevel(i));
    list.appendChild(c);
  });
}
$('btnSelect').addEventListener('click',()=>{buildLevels();$('selectOverlay').classList.add('show');});
$('selectOverlay').addEventListener('click',ev=>{if(ev.target===$('selectOverlay'))$('selectOverlay').classList.remove('show');});
$('btnNext').addEventListener('click',()=>startLevel(Math.min(cur+1,LEVELS.length-1)));
$('btnAgain').addEventListener('click',()=>startLevel(cur));
$('btnChoose').addEventListener('click',()=>{$('winOverlay').classList.remove('show');buildLevels();$('selectOverlay').classList.add('show');});
buildLevels();
startLevel(0);
$('selectOverlay').classList.add('show');
</script>
</body>
</html>
